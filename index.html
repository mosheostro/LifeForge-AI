<!DOCTYPE html>
<html lang="en" data-theme="dark" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="LifeForge AI — Premium AI-powered personal development ecosystem.">
  <title>LifeForge AI · Human Potential System</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%23E8C880'/><stop offset='1' stop-color='%239A7E4A'/></linearGradient></defs><circle cx='16' cy='16' r='14' fill='url(%23g)'/><text x='16' y='22' text-anchor='middle' font-family='Georgia' font-size='17' fill='%230D0B08' font-weight='600'>L</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Frank+Ruhl+Libre:wght@300;400;500;700&family=Heebo:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0A0907;--bg-alt:#110E0A;--surface:#18140E;--surface-2:#211C14;
      --text-1:#F0EBE0;--text-2:#AAA49A;--text-3:#6B6660;
      --border:rgba(240,235,224,.08);--border-md:rgba(240,235,224,.16);
      --gold:#D4B27A;--gold-h:#E8C68E;--gold-dim:#9A7E4A;--gold-f:rgba(212,178,122,.10);
      --indigo:#7E8EC8;--sage:#6EA080;--purple:#B07ECC;--amber:#C8946E;--platinum:#C8D4E0;
      --shadow:rgba(0,0,0,.70);--nav-bg:rgba(10,9,7,.88);
      --glass-bg:rgba(24,20,14,.52);--glass-br:rgba(240,235,224,.10);
      --font-d:'Cormorant Garamond',Georgia,serif;
      --font-b:'DM Sans',system-ui,sans-serif;
      --r:12px;--r2:20px;
    }
    [data-theme="light"]{
      --bg:#FAF7EF;--bg-alt:#F2EFE5;--surface:#FFFFFF;--surface-2:#EDE9DE;
      --text-1:#1A160E;--text-2:#56524C;--text-3:#989188;
      --border:rgba(24,20,14,.08);--border-md:rgba(24,20,14,.16);
      --gold:#8B6520;--gold-h:#6E4F12;--gold-dim:#B08030;--gold-f:rgba(139,101,32,.08);
      --indigo:#5068B8;--sage:#3E7058;--purple:#8050AC;--amber:#A06040;--platinum:#5878A0;
      --shadow:rgba(24,20,14,.10);--nav-bg:rgba(250,247,239,.92);
      --glass-bg:rgba(255,255,255,.60);--glass-br:rgba(24,20,14,.10);
    }
    [lang="he"]{--font-d:'Frank Ruhl Libre',Georgia,serif;--font-b:'Heebo',system-ui,sans-serif}

    html{scroll-behavior:smooth}
    body{font-family:var(--font-b);background:var(--bg);color:var(--text-1);line-height:1.65;overflow-x:hidden;-webkit-font-smoothing:antialiased;transition:background .4s,color .4s}
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-track{background:var(--bg)}
    ::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:2px}
    ::selection{background:rgba(212,178,122,.22)}
    a{color:inherit;text-decoration:none}
    button{font-family:var(--font-b)}
    img{display:block;max-width:100%}

    /* ── PARTICLE CANVAS ── */
    #particle-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.55}
    [data-theme="light"] #particle-canvas{opacity:.22}

    /* ── AMBIENT ORBS ── */
    .orbs{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
    .orb{position:absolute;border-radius:50%;filter:blur(100px);transition:opacity 1s}
    .o1{top:-8%;left:-6%;width:600px;height:600px;background:radial-gradient(circle,rgba(212,178,122,.28),transparent 68%)}
    .o2{bottom:-18%;right:-8%;width:700px;height:700px;background:radial-gradient(circle,rgba(126,142,200,.18),transparent 68%)}
    .o3{top:38%;right:22%;width:420px;height:420px;background:radial-gradient(circle,rgba(110,160,128,.14),transparent 68%)}
    .o4{top:60%;left:30%;width:350px;height:350px;background:radial-gradient(circle,rgba(176,126,204,.10),transparent 68%)}
    [data-theme="light"] .orb{opacity:.45}

    /* ── LAYOUT ── */
    .sp{padding:clamp(64px,10vw,128px) clamp(22px,7vw,100px);position:relative;z-index:1}
    .sp2{padding:clamp(48px,7vw,96px) clamp(22px,7vw,100px);position:relative;z-index:1}
    .mw{max-width:1320px;margin:0 auto}

    /* ── REVEAL ── */
    .rv{opacity:0;transform:translateY(22px);transition:opacity .9s cubic-bezier(.2,0,.2,1),transform .9s cubic-bezier(.2,0,.2,1)}
    .rv.in{opacity:1;transform:none}
    .rvl{opacity:0;transform:translateX(-22px);transition:opacity .9s cubic-bezier(.2,0,.2,1),transform .9s cubic-bezier(.2,0,.2,1)}
    .rvl.in{opacity:1;transform:none}
    .rvr{opacity:0;transform:translateX(22px);transition:opacity .9s cubic-bezier(.2,0,.2,1),transform .9s cubic-bezier(.2,0,.2,1)}
    .rvr.in{opacity:1;transform:none}
    .d1{transition-delay:.07s}.d2{transition-delay:.16s}.d3{transition-delay:.25s}
    .d4{transition-delay:.34s}.d5{transition-delay:.44s}.d6{transition-delay:.54s}
    .d7{transition-delay:.64s}.d8{transition-delay:.74s}.d9{transition-delay:.84s}.d10{transition-delay:.94s}

    /* ── TYPOGRAPHY ── */
    .eyebrow{font-family:var(--font-b);font-size:.60rem;font-weight:500;letter-spacing:.26em;text-transform:uppercase;color:var(--gold)}
    [lang="he"] .eyebrow{letter-spacing:.04em}
    .tag{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;background:var(--gold-f);border:1px solid rgba(212,178,122,.18);border-radius:99px;font-size:.60rem;font-weight:500;letter-spacing:.20em;text-transform:uppercase;color:var(--gold)}

    /* ── BUTTONS ── */
    .btn-p{display:inline-flex;align-items:center;gap:8px;padding:13px 32px;background:var(--gold);color:#0A0907;font-family:var(--font-b);font-size:.72rem;font-weight:500;letter-spacing:.14em;text-transform:uppercase;border:none;border-radius:var(--r);cursor:pointer;text-decoration:none;transition:background .3s,transform .25s,box-shadow .3s}
    .btn-p:hover{background:var(--gold-h);transform:translateY(-2px);box-shadow:0 16px 48px rgba(212,178,122,.28)}
    [data-theme="light"] .btn-p{color:#FAF7EF}
    .btn-g{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;background:transparent;color:var(--text-2);font-family:var(--font-b);font-size:.72rem;font-weight:400;letter-spacing:.10em;text-transform:uppercase;border:1px solid var(--border-md);border-radius:var(--r);cursor:pointer;text-decoration:none;transition:border-color .3s,color .3s,background .3s}
    .btn-g:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-f)}
    .btn-accent{display:inline-flex;align-items:center;gap:7px;padding:11px 22px;background:transparent;color:inherit;font-family:var(--font-b);font-size:.70rem;font-weight:500;letter-spacing:.10em;text-transform:uppercase;border:1px solid currentColor;border-radius:var(--r);cursor:pointer;text-decoration:none;transition:all .3s;opacity:.82}
    .btn-accent:hover{opacity:1;transform:translateY(-1px);box-shadow:0 8px 28px rgba(0,0,0,.22)}

    /* ── NAV ── */
    nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 clamp(22px,7vw,100px);height:64px;display:flex;align-items:center;justify-content:space-between;transition:background .4s,box-shadow .4s,border-color .4s}
    nav.scrolled{background:var(--nav-bg);backdrop-filter:blur(28px) saturate(160%);-webkit-backdrop-filter:blur(28px) saturate(160%);box-shadow:0 1px 0 var(--border),0 8px 32px var(--shadow)}
    .nav-logo{display:flex;align-items:center;gap:10px;cursor:pointer}
    .nav-logo-mark{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--gold),var(--gold-dim));display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:18px;font-weight:600;color:#0A0907;flex-shrink:0;box-shadow:0 4px 14px rgba(212,178,122,.28)}
    .nav-logo-text{font-family:var(--font-d);font-size:1.18rem;font-weight:500;letter-spacing:.02em}
    .nav-logo-sub{font-size:.56rem;letter-spacing:.22em;text-transform:uppercase;color:var(--text-3);font-family:var(--font-b)}
    .nav-links{display:flex;align-items:center;gap:8px}
    .nav-link{padding:7px 14px;font-size:.70rem;letter-spacing:.08em;text-transform:uppercase;color:var(--text-2);border-radius:6px;cursor:pointer;transition:color .25s,background .25s;white-space:nowrap}
    .nav-link:hover{color:var(--text-1);background:rgba(240,235,224,.06)}
    .nav-controls{display:flex;align-items:center;gap:6px}
    .nav-lang{padding:6px 10px;font-size:.62rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);background:none;border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all .25s}
    .nav-lang.active,.nav-lang:hover{color:var(--gold);border-color:rgba(212,178,122,.28);background:var(--gold-f)}
    .nav-theme{width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:none;border:1px solid var(--border);border-radius:8px;cursor:pointer;color:var(--text-2);font-size:15px;transition:all .25s}
    .nav-theme:hover{color:var(--gold);border-color:rgba(212,178,122,.28);background:var(--gold-f)}
    .hamburger{display:none;width:36px;height:36px;align-items:center;justify-content:center;background:none;border:1px solid var(--border);border-radius:8px;cursor:pointer;color:var(--text-2);font-size:16px;transition:all .25s}

    /* ── HERO ── */
    .hero{min-height:100svh;display:flex;align-items:center;padding:80px clamp(22px,7vw,100px) clamp(64px,10vw,120px);position:relative;z-index:1}
    .hero-inner{max-width:1320px;margin:0 auto;width:100%}
    .hero-tag{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;background:var(--gold-f);border:1px solid rgba(212,178,122,.20);border-radius:99px;margin-bottom:32px}
    .hero-tag-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse-dot 2.4s ease-in-out infinite}
    @keyframes pulse-dot{0%,100%{box-shadow:0 0 0 0 rgba(212,178,122,.5)}50%{box-shadow:0 0 0 6px rgba(212,178,122,0)}}
    .hero-h{font-family:var(--font-d);font-size:clamp(3.2rem,8vw,7.5rem);font-weight:300;line-height:1.05;letter-spacing:-.01em;margin-bottom:28px}
    .hero-h em{font-style:italic;color:var(--gold)}
    .hero-sub{font-size:clamp(.95rem,1.8vw,1.18rem);color:var(--text-2);max-width:540px;line-height:1.72;margin-bottom:44px}
    .hero-ctas{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:64px}
    .hero-stats{display:flex;flex-wrap:wrap;gap:clamp(28px,4vw,56px)}
    .hero-stat-val{font-family:var(--font-d);font-size:clamp(1.8rem,3vw,2.6rem);font-weight:400;color:var(--gold);line-height:1}
    .hero-stat-lab{font-size:.65rem;letter-spacing:.16em;text-transform:uppercase;color:var(--text-3);margin-top:4px}
    @keyframes hero-in{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
    .h1{animation:hero-in .9s cubic-bezier(.2,0,.2,1) .2s both}
    .h2{animation:hero-in .9s cubic-bezier(.2,0,.2,1) .38s both}
    .h3{animation:hero-in .9s cubic-bezier(.2,0,.2,1) .54s both}
    .h4{animation:hero-in .9s cubic-bezier(.2,0,.2,1) .68s both}
    .h5{animation:hero-in .9s cubic-bezier(.2,0,.2,1) .80s both}
    .h6{animation:hero-in .9s cubic-bezier(.2,0,.2,1) .92s both}
    .scroll-hint{display:flex;align-items:center;gap:10px;color:var(--text-3);font-size:.62rem;letter-spacing:.20em;text-transform:uppercase;margin-top:48px}
    .scroll-arrow{width:18px;height:18px;border-right:1px solid var(--text-3);border-bottom:1px solid var(--text-3);transform:rotate(45deg);animation:s-drop 2.2s ease-in-out infinite}
    @keyframes s-drop{0%,100%{transform:rotate(45deg) translate(0,0);opacity:.4}50%{transform:rotate(45deg) translate(3px,3px);opacity:.9}}

    /* ── SECTION HEADER ── */
    .sec-head{margin-bottom:clamp(40px,6vw,72px);text-align:center}
    .sec-h{font-family:var(--font-d);font-size:clamp(2.2rem,4.5vw,3.6rem);font-weight:300;line-height:1.12;margin-top:12px}
    .sec-h em{font-style:italic;color:var(--gold)}
    .sec-sub{font-size:clamp(.88rem,1.4vw,.98rem);color:var(--text-2);max-width:560px;margin:14px auto 0;line-height:1.7}
    .divider{width:48px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:20px auto 0;opacity:.6}

    /* ── TOOLS GRID ── */
    .tools-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:auto;gap:20px}
    .tools-central{grid-column:1/-1}

    /* ── GLASS CARD ── */
    .glass{background:var(--glass-bg);backdrop-filter:blur(22px) saturate(140%);-webkit-backdrop-filter:blur(22px) saturate(140%);border:1px solid var(--glass-br);border-radius:var(--r2);position:relative;overflow:hidden}

    /* ── TOOL CARD ── */
    .tool-card{padding:clamp(24px,3vw,36px);cursor:pointer;transition:transform .35s cubic-bezier(.2,0,.2,1),border-color .35s,box-shadow .35s;position:relative;overflow:hidden;min-height:280px;display:flex;flex-direction:column;justify-content:space-between}
    .tool-card::before{content:'';position:absolute;inset:0;background:var(--card-glow,transparent);opacity:0;transition:opacity .35s;border-radius:inherit}
    .tool-card:hover{transform:translateY(-6px);box-shadow:0 24px 64px rgba(0,0,0,.28)}
    .tool-card:hover::before{opacity:1}
    .tool-card-shine{position:absolute;inset:0;border-radius:inherit;background:linear-gradient(135deg,rgba(255,255,255,.06) 0%,transparent 50%);pointer-events:none}
    .tool-art{width:72px;height:72px;margin-bottom:24px;flex-shrink:0}
    .tool-cat{font-size:.56rem;letter-spacing:.26em;text-transform:uppercase;color:var(--text-3);margin-bottom:8px}
    .tool-name{font-family:var(--font-d);font-size:clamp(1.5rem,2.5vw,1.9rem);font-weight:400;line-height:1.15;margin-bottom:10px}
    .tool-desc{font-size:.83rem;color:var(--text-2);line-height:1.65;flex:1}
    .tool-cta{display:flex;align-items:center;gap:8px;font-size:.68rem;font-weight:500;letter-spacing:.14em;text-transform:uppercase;margin-top:22px;opacity:.75;transition:opacity .25s,gap .25s}
    .tool-card:hover .tool-cta{opacity:1;gap:12px}
    .tool-cta svg{transition:transform .3s}
    .tool-card:hover .tool-cta svg{transform:translateX(3px)}
    .tool-badge{position:absolute;top:20px;right:20px;padding:4px 10px;border-radius:99px;font-size:.52rem;font-weight:500;letter-spacing:.16em;text-transform:uppercase;border:1px solid currentColor;opacity:.7}

    /* ── CENTRAL CARD ── */
    .central-card{padding:clamp(40px,5vw,64px);cursor:pointer;transition:transform .35s,box-shadow .35s;position:relative;overflow:hidden;min-height:260px}
    .central-card:hover{transform:translateY(-4px);box-shadow:0 32px 80px rgba(0,0,0,.32)}
    .central-inner{position:relative;z-index:2;display:grid;grid-template-columns:1fr 1fr;gap:clamp(32px,5vw,64px);align-items:center}
    .central-art{width:160px;height:160px;margin:0 auto}
    .central-badge{display:inline-flex;align-items:center;gap:8px;padding:5px 14px;background:rgba(200,212,224,.10);border:1px solid rgba(200,212,224,.20);border-radius:99px;margin-bottom:20px}
    .central-badge-dot{width:7px;height:7px;border-radius:50%;background:var(--platinum);animation:platinum-pulse 3s ease-in-out infinite}
    @keyframes platinum-pulse{0%,100%{opacity:.6;box-shadow:0 0 0 0 rgba(200,212,224,.5)}50%{opacity:1;box-shadow:0 0 0 8px rgba(200,212,224,0)}}
    .central-h{font-family:var(--font-d);font-size:clamp(2rem,3.5vw,3rem);font-weight:300;line-height:1.1;margin-bottom:16px}
    .central-h em{font-style:italic;color:var(--platinum)}
    .central-features{display:flex;flex-direction:column;gap:10px;margin:20px 0 28px}
    .central-feat{display:flex;align-items:center;gap:10px;font-size:.82rem;color:var(--text-2)}
    .central-feat-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
    .central-glow{position:absolute;inset:0;background:radial-gradient(ellipse at 70% 50%,rgba(200,212,224,.07),transparent 65%);pointer-events:none}
    .central-grid-lines{position:absolute;inset:0;opacity:.04;background-image:linear-gradient(rgba(200,212,224,.8) 1px,transparent 1px),linear-gradient(90deg,rgba(200,212,224,.8) 1px,transparent 1px);background-size:40px 40px}

    /* ── SPECIALISTS SECTION ── */
    .spec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
    .spec-card{padding:28px 24px;cursor:pointer;transition:transform .35s,box-shadow .35s,border-color .35s}
    .spec-card:hover{transform:translateY(-5px);box-shadow:0 20px 56px rgba(0,0,0,.25)}
    .spec-avatar{width:64px;height:64px;border-radius:50%;margin-bottom:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:1.6rem;font-weight:400;overflow:hidden}
    .spec-name{font-family:var(--font-d);font-size:1.25rem;font-weight:400;margin-bottom:4px}
    .spec-role{font-size:.64rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text-3);margin-bottom:12px}
    .spec-phil{font-size:.82rem;color:var(--text-2);line-height:1.62;margin-bottom:18px;font-style:italic}
    .spec-cta{display:inline-flex;align-items:center;gap:7px;font-size:.66rem;font-weight:500;letter-spacing:.14em;text-transform:uppercase;padding:8px 16px;border-radius:8px;border:1px solid currentColor;cursor:pointer;background:none;transition:all .3s}
    .spec-cta:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.20)}
    .spec-style-tag{font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;padding:3px 9px;border-radius:99px;border:1px solid currentColor;opacity:.6;display:inline-block;margin-top:8px}

    /* ── TOOL DETAIL PAGE ── */
    .detail-page{min-height:100svh;padding:100px clamp(22px,7vw,100px) clamp(64px,10vw,120px);position:relative;z-index:1}
    .detail-back{display:inline-flex;align-items:center;gap:8px;font-size:.70rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-3);cursor:pointer;margin-bottom:48px;transition:color .25s,gap .25s}
    .detail-back:hover{color:var(--text-2);gap:12px}
    .detail-header{margin-bottom:56px}
    .detail-h{font-family:var(--font-d);font-size:clamp(2.8rem,6vw,5.5rem);font-weight:300;line-height:1.06;margin:16px 0 20px}
    .detail-sub{font-size:clamp(.95rem,1.6vw,1.08rem);color:var(--text-2);max-width:600px;line-height:1.75}
    .detail-body{display:grid;grid-template-columns:1fr 1fr;gap:clamp(32px,5vw,64px);align-items:start;margin-bottom:56px}
    .detail-features{display:flex;flex-direction:column;gap:20px}
    .detail-feat{display:flex;gap:16px}
    .detail-feat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:17px}
    .detail-feat-title{font-family:var(--font-d);font-size:1.05rem;font-weight:400;margin-bottom:4px}
    .detail-feat-desc{font-size:.83rem;color:var(--text-2);line-height:1.65}

    /* ── PYTHAGORAS CALCULATOR ── */
    .calc-wrap{padding:32px;border-radius:var(--r2);border:1px solid var(--border)}
    .calc-input-row{display:flex;gap:12px;margin:20px 0}
    .calc-input{flex:1;padding:13px 16px;background:var(--surface-2,rgba(255,255,255,.04));border:1px solid var(--border-md);border-radius:10px;color:var(--text-1);font-family:var(--font-b);font-size:.88rem;outline:none;transition:border-color .25s}
    .calc-input:focus{border-color:var(--gold)}
    .calc-submit{padding:13px 24px;background:var(--gold);color:#0A0907;border:none;border-radius:10px;font-family:var(--font-b);font-size:.75rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:background .25s,transform .2s}
    .calc-submit:hover{background:var(--gold-h);transform:translateY(-1px)}
    [data-theme="light"] .calc-submit{color:#FAF7EF}
    .pytha-grid{display:grid;grid-template-columns:repeat(3,60px);gap:8px;margin:24px auto;justify-content:center}
    .pytha-cell{width:60px;height:60px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:1.4rem;font-weight:400;border:1px solid var(--border)}

  <script>
    /* ── PARTICLE / CONSTELLATION BACKGROUND ── */
    (function(){
      const canvas = document.getElementById('particle-canvas');
      const ctx = canvas.getContext('2d');
      let W,H,pts=[];
      const N=88, CONN=120, SPEED=.28;
      function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;init()}
      function init(){
        pts=[];
        for(let i=0;i<N;i++) pts.push({
          x:Math.random()*W, y:Math.random()*H,
          vx:(Math.random()-.5)*SPEED, vy:(Math.random()-.5)*SPEED,
          r:Math.random()*1.4+.4
        });
      }
      function isDark(){return document.documentElement.getAttribute('data-theme')!=='light'}
      function draw(){
        ctx.clearRect(0,0,W,H);
        const dark=isDark();
        const pc=dark?'rgba(212,178,122,':'rgba(139,101,32,';
        const lc=dark?'rgba(212,178,122,':'rgba(139,101,32,';
        pts.forEach(p=>{
          p.x+=p.vx; p.y+=p.vy;
          if(p.x<0||p.x>W)p.vx*=-1;
          if(p.y<0||p.y>H)p.vy*=-1;
        });
        for(let i=0;i<N;i++){
          for(let j=i+1;j<N;j++){
            const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y;
            const d=Math.sqrt(dx*dx+dy*dy);
            if(d<CONN){
              ctx.beginPath();
              ctx.moveTo(pts[i].x,pts[i].y);
              ctx.lineTo(pts[j].x,pts[j].y);
              ctx.strokeStyle=lc+(1-d/CONN)*.22+')';
              ctx.lineWidth=.6;
              ctx.stroke();
            }
          }
        }
        pts.forEach(p=>{
          ctx.beginPath();
          ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
          ctx.fillStyle=pc+'.55)';
          ctx.fill();
        });
        requestAnimationFrame(draw);
      }
      window.addEventListener('resize',resize);
      resize();
      draw();
    })();
  </script>

    function sumD(n){let s=Math.abs(n).toString().split('').reduce((a,b)=>a+(+b),0);return s>9?sumD(s):s}
    function calcPytha(ds){
      const m=ds.trim().match(/^(\d{1,2})[.\-/](\d{1,2})[.\-/](\d{4})$/);
      if(!m)return null;
      const day=+m[1],month=+m[2],year=+m[3];
      if(day<1||day>31||month<1||month>12)return null;
      const digs=(m[1].padStart(2,'0')+m[2].padStart(2,'0')+m[3]).split('').map(Number);
      const w1=digs.reduce((a,b)=>a+b,0);
      const w2=sumD(w1);
      const fd=+m[1].padStart(2,'0')[0];
      const w3=day-2*fd;
      const w4=sumD(Math.abs(w3));
      const all=[...digs,w1,w2,w3,w4];
      const cnt={};for(let i=1;i<=9;i++)cnt[i]=0;
      all.forEach(n=>{Math.abs(n).toString().split('').forEach(c=>{const d=+c;if(d>=1&&d<=9)cnt[d]++;})});
      const pos=[[7,8,9],[4,5,6],[1,2,3]];
      const matrix=pos.map(row=>row.map(n=>({n,c:cnt[n]})));
      return{w1,w2,w3,w4,cnt,matrix,digs};
    }

    };

    /* ── PROMPT COPY BLOCK ── */
    function PromptBlock({promptKey,accent,label}){
      const [copied,setCopied]=useState(false);
      const text=SYSTEM_PROMPTS[promptKey]||'';
      const copy=()=>{
        navigator.clipboard.writeText(text).then(()=>{
          setCopied(true);
          setTimeout(()=>setCopied(false),2200);
        });
      };
      return(
        <div className="glass" style={{borderRadius:'var(--r2)',overflow:'hidden',border:`1px solid ${accent}25`}}>
          <div style={{padding:'16px 20px',borderBottom:`1px solid ${accent}18`,display:'flex',alignItems:'center',justifyContent:'space-between',background:`${accent}08`}}>
            <div>
              <div style={{fontSize:'.62rem',letterSpacing:'.22em',textTransform:'uppercase',color:accent,marginBottom:2}}>{label||'AI System Prompt'}</div>
              <div style={{fontSize:'.78rem',color:'var(--text-2)'}}>Скопируй и вставь в Claude / ChatGPT / DeepSeek</div>
            </div>
            <button onClick={copy} style={{
              display:'flex',alignItems:'center',gap:7,padding:'9px 18px',
              background:copied?`${accent}22`:'transparent',
              color:copied?accent:'var(--text-2)',
              border:`1px solid ${copied?accent+'60':'var(--border-md)'}`,
              borderRadius:8,cursor:'pointer',fontSize:'.68rem',fontWeight:500,
              letterSpacing:'.12em',textTransform:'uppercase',transition:'all .25s',
              fontFamily:'var(--font-b)'
            }}>
              {copied?'✓ Скопировано':'⎘ Copy Prompt'}
            </button>
          </div>
          <div style={{
            padding:'20px',maxHeight:280,overflowY:'auto',
            fontFamily:'monospace',fontSize:'.72rem',lineHeight:1.7,
            color:'var(--text-2)',whiteSpace:'pre-wrap',wordBreak:'break-word'
          }}>
            {text}
          </div>
          <div style={{padding:'12px 20px',borderTop:`1px solid ${accent}12`,display:'flex',gap:8,flexWrap:'wrap'}}>
            {['Claude','ChatGPT','DeepSeek','Gemini'].map(ai=>(
              <span key={ai} style={{padding:'3px 10px',borderRadius:99,border:`1px solid ${accent}30`,
                fontSize:'.60rem',letterSpacing:'.14em',textTransform:'uppercase',color:'var(--text-3)'}}>
                {ai}
              </span>
            ))}
          </div>
        </div>
      );
    }

    /* ── PYTHAGORAS TOOL PAGE ── */
    function PythaCalc({lang}){
      const [val,setVal]=useState('');
      const [res,setRes]=useState(null);
      const [err,setErr]=useState('');
      const compute=()=>{
        const r=calcPytha(val);
        if(!r){setErr('Format: DD.MM.YYYY');setRes(null)}
        else{setRes(r);setErr('')}
      };
      const POS=[[7,8,9],[4,5,6],[1,2,3]];
      return(
        <div className="calc-wrap glass">
          <h3 style={{fontFamily:'var(--font-d)',fontSize:'1.5rem',fontWeight:400,marginBottom:8,color:'var(--gold)'}}>Pythagoras Square</h3>
          <p style={{fontSize:'.83rem',color:'var(--text-2)',marginBottom:4,lineHeight:1.6}}>Live calculator — Alexandrov method</p>
          <div className="calc-input-row">
            <input className="calc-input" placeholder="DD.MM.YYYY" value={val} onChange={e=>setVal(e.target.value)} onKeyDown={e=>e.key==='Enter'&&compute()}/>
            <button className="calc-submit" onClick={compute}>Calculate</button>
          </div>
          {err&&<div className="calc-error">{err}</div>}
          {res&&<>
            <div className="working-nums">
              {[{v:res.w1,l:'I'},{v:res.w2,l:'II'},{v:Math.abs(res.w3),l:'III'},{v:res.w4,l:'IV'}].map(w=>(
                <div key={w.l} className="wnum">
                  <div className="wnum-val">{w.v}</div>
                  <div className="wnum-lab">Working {w.l}</div>
                </div>
              ))}
            </div>
            <div className="pytha-grid">
              {POS.map((row,ri)=>row.map(n=>{
                const c=res.cnt[n]||0;
                const cls=c>=3?'hot':c>0?'has':'empty';
                return(
                  <div key={`${ri}-${n}`} className={`pytha-cell ${cls}`}>
                    {c>0?n.toString().repeat(c).slice(0,3):n}
                  </div>
                );
              }))}
            </div>
            <p className="calc-note">
              Diagonal 1-5-9: willpower axis. Diagonal 3-5-7: action axis. Diagonal 2-5-8: emotional axis.
            </p>
          </>}
        </div>
      );
    }

    /* ── TOOL DETAIL PAGE ── */
    function ToolDetail({tool,lang,onBack}){
      useReveal();
      return(
        <div className="detail-page">
          <div className="mw">
            <div className="detail-back rv" onClick={onBack}>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/></svg>
              Back to systems
            </div>
            <div className="detail-header rv">
              <div className="tag" style={{color:tool.accent,borderColor:`${tool.accent}30`}}>{tool.cat}</div>
              <h1 className="detail-h" style={{color:tool.accent}}>{tool.name}</h1>
              <p className="detail-sub">{tool.desc}</p>
            </div>
            <div className="detail-body">
              <div className="detail-features">
                {tool.feats.map((f,i)=>(
                  <div key={i} className={`detail-feat rv d${i+1}`}>
                    <div className="detail-feat-icon" style={{background:`${tool.accent}15`,color:tool.accent}}>
                      {['◎','△','☽','∑','⊕','✦'][i]||'◎'}
                    </div>
                    <div>
                      <div className="detail-feat-title">{f}</div>
                      <div className="detail-feat-desc">AI-powered analysis and personalized guidance for your journey.</div>
                    </div>
                  </div>
                ))}
              </div>
              <div className="rv d2">
                {(tool.id==='numer'||tool.id==='strategy')
                  ? <PythaCalc lang={lang}/>
                  : tool.id==='astro'
                  ? <PromptBlock promptKey="astro" accent={tool.accent} label="Astrology Oracle · System Prompt"/>
                  : <div className="glass" style={{padding:32,borderRadius:'var(--r2)',display:'flex',flexDirection:'column',gap:24}}>
                      <div style={{width:'100%',display:'flex',justifyContent:'center'}}>
                        <div style={{width:160,height:160}}>
                          {tool.id==='coach'&&<ArtCoach/>}
                          {tool.id==='biz'&&<ArtBiz/>}
                          {tool.id==='svarga'&&<ArtSvarga/>}
                        </div>
                      </div>
                      <button className="btn-p" style={{alignSelf:'flex-start'}}>Start Session →</button>
                    </div>
                }
              </div>
            </div>
            <div style={{textAlign:'center',marginTop:48}} className="rv">
              <button className="btn-p" onClick={onBack}>← Back to all systems</button>
            </div>
          </div>
        </div>
      );
    }

    /* ── FOOTER ── */
    function Footer({t,onNav}){
      return(
        <footer>
          <div className="mw">
            <div className="footer-grid">
              <div>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <div className="nav-logo-mark">L</div>
                  <div className="footer-brand-h">LifeForge <em style={{fontStyle:'italic'}}>AI</em></div>
                </div>
                <p className="footer-brand-sub" style={{marginTop:12}}>Premium AI-powered personal development ecosystem. Unlock your human potential.</p>
                <div className="footer-soc" style={{marginTop:20}}>
                  {['T','in','✦'].map(s=><div key={s} className="footer-soc-btn">{s}</div>)}
                </div>
              </div>
              <div>
                <div className="footer-col-h">{t.col1}</div>
                <div className="footer-links">
                  {['Personal Coaching','Business Coaching','Astrology','Numerology','Svarga System','Life Strategy'].map(l=><div key={l} className="footer-link">{l}</div>)}
                </div>
              </div>
              <div>
                <div className="footer-col-h">{t.col2}</div>
                <div className="footer-links">
                  {SPECIALISTS.slice(0,5).map(s=><div key={s.id} className="footer-link">{s.name}</div>)}
                </div>
              </div>
              <div>
                <div className="footer-col-h">{t.col3}</div>
                <div className="footer-links">
                  {['About LifeForge','How it works','Privacy Policy','Terms of Service','Contact'].map(l=><div key={l} className="footer-link">{l}</div>)}
                </div>
              </div>
            </div>
            <div className="footer-bottom">
              <div className="footer-copy">{t.copy}</div>
              <div className="footer-author">{t.author} <a href="https://georgiirivera.ai" target="_blank" rel="noopener">Georgii Rivera</a> · <a href="https://t.me/riverapeople" target="_blank" rel="noopener">@riverapeople</a></div>
            </div>
          </div>
        </footer>
      );
    }

    /* ── APP ── */
    function App(){
      const [lang,setLang]=useState('en');
      const [theme,setTheme]=useState('dark');
      const [view,setView]=useState('home');
      const [toolId,setToolId]=useState(null);
      const specialistsRef=useRef(null);
      const toolsRef=useRef(null);

      useEffect(()=>{
        document.documentElement.setAttribute('lang',lang);
        document.documentElement.setAttribute('dir',lang==='he'?'rtl':'ltr');
      },[lang]);

      useEffect(()=>{
        document.documentElement.setAttribute('data-theme',theme);
      },[theme]);

      const toggleTheme=()=>setTheme(t=>t==='dark'?'light':'dark');
      const t=T[lang]||T.en;
      const tools=TOOLS_DATA[lang]||TOOLS_DATA.en;
      const currentTool=toolId?tools.find(t=>t.id===toolId):null;

      const scrollToTools=()=>{
        if(view!=='home')setView('home');
        setTimeout(()=>document.getElementById('tools')?.scrollIntoView({behavior:'smooth'}),100);
      };
      const scrollToSpecs=()=>{
        if(view!=='home')setView('home');
        setTimeout(()=>document.getElementById('specialists')?.scrollIntoView({behavior:'smooth'}),100);
      };
      const onTool=id=>{setToolId(id);setView('tool');window.scrollTo(0,0)};
      const onBack=()=>{setView('home');setToolId(null);setTimeout(()=>document.getElementById('tools')?.scrollIntoView({behavior:'smooth'}),80)};
      const onNav=v=>{
        if(v==='home'){setView('home');window.scrollTo(0,0)}
        else if(v==='specialists')scrollToSpecs();
      };

      return(
        <>
          <Nav lang={lang} setLang={setLang} theme={theme} toggleTheme={toggleTheme} onNav={onNav} t={t.nav}/>
          {view==='home'&&(
            <>
              <Hero t={t.hero} onExplore={scrollToTools} onSpecialists={scrollToSpecs}/>
              <ToolsSection tools={tools} onTool={onTool} t={t.tools}/>
              <SpecialistsSection lang={lang} t={t.specialists}/>
              <Footer t={t.footer} onNav={onNav}/>
            </>
          )}
          {view==='tool'&&currentTool&&(
            <ToolDetail tool={currentTool} lang={lang} onBack={onBack}/>
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
