/* ─── Swarga Panel (was SvargaLayer) ────────────────────────────────────── */
function SwargaPanel({lang,depth,onSaveReport}){
  const t=T[lang];
  const dims=t.svarga_dims||[];
  const dimIcons=['🌿','🌬','⚡','🧠','🏃','💗','🌙','✨','🔮'];
  const [input,setInput]=useState('');
  const [loading,setLoading]=useState(false);
  const [results,setResults]=useState(null);
  const [saved,setSaved]=useState(false);
  function analyze(){
    if(!input.trim())return;
    setLoading(true);setSaved(false);
    setTimeout(()=>{
      setResults(generateSvarga(input,lang,depth));
      setLoading(false);
    },1600+Math.random()*700);
  }
  function reset(){setResults(null);setInput('');setSaved(false);}
  function handleSave(){
    if(onSaveReport)onSaveReport({type:'swarga',lang,summary:input.slice(0,120),depth});
    setSaved(true);
  }
  return(
    <div>
      <div className="sec-head rv" style={{marginBottom:28}}>
        <span className="tag" style={{background:'var(--purple-f)',borderColor:'rgba(176,126,204,.25)',color:'var(--purple)'}}>{t.svarga_title||'Swarga Approach'}</span>
        <p className="sec-sub">{t.svarga_sub}</p>
      </div>
      {!results&&!loading&&(
        <div className="svarga-input-wrap rv">
          <div className="glass" style={{padding:28}}>
            <textarea className="form-textarea" value={input} onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter'&&(e.metaKey||e.ctrlKey))analyze();}}
              placeholder={t.svarga_placeholder} style={{minHeight:140,marginBottom:16,
                background:'var(--surface-2)',border:'1px solid var(--border-md)',
                borderRadius:10,color:'var(--text-1)',width:'100%',padding:'12px 16px',
                fontFamily:'var(--font-b)',fontSize:'.9rem',outline:'none',resize:'vertical'}}/>
            <button className="cta-btn" style={{justifyContent:'center',background:'linear-gradient(135deg,var(--purple),#7E8EC8)',width:'100%'}}
              onClick={analyze} disabled={!input.trim()}>
              {t.svarga_submit}
            </button>
          </div>
        </div>
      )}
      {loading&&(
        <div className="svarga-loading">
          <div className="svarga-loader" style={{borderTopColor:'var(--purple)'}}/>
          <p className="svarga-loading-text">{t.svarga_analyzing}</p>
        </div>
      )}
      {results&&(
        <div>
          <div className="svarga-result">
            {results.map((block,i)=>(
              <div key={i} className="svarga-block glass">
                <div className="svarga-block-head">
                  <div className="svarga-block-icon">{dimIcons[i]||'✦'}</div>
                  <div><div className="svarga-block-title">{dims[i]||block.dim}</div></div>
                </div>
                <div className="svarga-block-body">{renderMD(block.text)}</div>
              </div>
            ))}
          </div>
          <div style={{display:'flex',gap:12,justifyContent:'center',marginTop:28,flexWrap:'wrap'}}>
            <button className="btn-g" onClick={reset}>↺ {t.svarga_new}</button>
            <button className={`save-report-btn${saved?' saved':''}`} onClick={handleSave}>
              {saved?(t.save_report_done||'Saved ✓'):(t.save_report||'Save to history')}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── Biohacking Panel ───────────────────────────────────────────────────── */
function BiohackingPanel({lang,depth,onSaveReport}){

/* ─── Auth Modal ─────────────────────────────────────────────────────────── */
function AuthModal({lang,onClose,onLogin}){
  const t=T[lang];
  const [tab,setTab]=useState('signin');
  const [name,setName]=useState('');
  const [email,setEmail]=useState('');
  const [pw,setPw]=useState('');
  const [err,setErr]=useState('');
  const isHe=lang==='he';
  function submit(e){
    e.preventDefault();
    if(!email.trim()||!pw.trim()){setErr('Please fill all required fields.');return;}
    if(tab==='signup'&&!name.trim()){setErr('Please enter your name.');return;}
    const existing=LS.getUser();
    if(tab==='signin'){
      if(!existing||existing.email!==email.trim()){setErr('No account found. Please create one.');return;}
      if(existing.pw!==btoa(pw)){setErr('Incorrect password.');return;}
      onLogin(existing);
    }else{
      const u={name:name.trim()||email.split('@')[0],email:email.trim(),pw:btoa(pw),created:new Date().toISOString()};
      onLogin(u);
    }
  }
  return(
    <div className="auth-modal-backdrop" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="auth-modal" dir={isHe?'rtl':'ltr'}>
        <button onClick={onClose} style={{position:'absolute',top:16,right:16,background:'none',border:'none',cursor:'pointer',color:'var(--text-3)',fontSize:18}}>✕</button>
        <div style={{fontFamily:'var(--font-d)',fontSize:'1.5rem',color:'var(--text-1)',marginBottom:6}}>LifeForge<em style={{color:'var(--gold)',fontStyle:'italic'}}>·</em>AI</div>
        <p style={{color:'var(--text-3)',fontSize:'.78rem',marginBottom:20}}>{tab==='signin'?(t.auth_welcome||'Welcome back'):(t.auth_welcome_new||'Welcome')}</p>
        <div className="auth-tabs">
          {[['signin',t.auth_signin||'Sign In'],['signup',t.auth_signup||'Create Account']].map(([id,label])=>(
            <button key={id} className={`auth-tab${tab===id?' active':''}`} onClick={()=>{setTab(id);setErr('');}}>{label}</button>
          ))}
        </div>
        <form onSubmit={submit}>
          {tab==='signup'&&(
            <div className="auth-field">
              <label className="auth-label">{t.auth_name||'Full Name'}</label>
              <input className="auth-input" value={name} onChange={e=>setName(e.target.value)} placeholder="Alexandra Smith" autoComplete="name"/>
            </div>
          )}
          <div className="auth-field">
            <label className="auth-label">{t.auth_email||'Email'}</label>
            <input className="auth-input" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com" autoComplete="email" required/>
          </div>
          <div className="auth-field">
            <label className="auth-label">{t.auth_pw||'Password'}</label>
            <input className="auth-input" type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••" autoComplete={tab==='signin'?'current-password':'new-password'} required/>
          </div>
          {err&&<p style={{color:'#E07070',fontSize:'.74rem',marginBottom:10}}>{err}</p>}
          <button type="submit" className="auth-btn">{tab==='signin'?(t.auth_signin_btn||'Sign In'):(t.auth_signup_btn||'Create Account')}</button>
        </form>
      </div>
    </div>
  );
}

/* ═══════════════ SCROLL TO TOP ══════════════════════════════════════════ */
function ScrollTop(){
  const [vis,setVis]=useState(false);
  useEffect(()=>{
    const h=()=>setVis(window.scrollY>320);
    window.addEventListener('scroll',h,{passive:true});
    return()=>window.removeEventListener('scroll',h);
  },[]);
  if(!vis)return null;
  return(
    <button onClick={()=>window.scrollTo({top:0,behavior:'smooth'})}
      aria-label="Scroll to top"
      style={{position:'fixed',bottom:28,right:28,zIndex:90,width:44,height:44,
        borderRadius:'50%',background:'var(--gold)',color:'#0A0907',border:'none',
        cursor:'pointer',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center',

  if(!doc)return(
    <div style={{textAlign:'center',padding:'80px 24px'}}>
      <p style={{color:'var(--text-2)'}}>Document not found.</p>
      <button className="btn-g" style={{marginTop:16}} onClick={onBack}>← Back</button>
    </div>
  );
  const title=doc.title[lang]||doc.title.en;
  const body=(doc.body[lang]||doc.body.en||'').split('\n\n');
  useEffect(()=>{window.scrollTo({top:0,behavior:'smooth'});},[]);
  return(
    <div style={{maxWidth:760,margin:'0 auto',padding:'90px 24px 60px'}}>
      <button className="detail-back" onClick={onBack}>← {lang==='ru'?'Назад':lang==='he'?'חזרה':lang==='es'?'Volver':lang==='it'?'Indietro':'Back'}</button>
      <h1 style={{fontFamily:'var(--font-d)',fontSize:'clamp(1.8rem,4vw,2.6rem)',fontWeight:400,marginBottom:8,color:'var(--text-1)'}}>{title}</h1>
      <div className="divider" style={{margin:'0 0 32px'}}/>
      <div className="glass" style={{padding:'28px 32px'}}>
        {body.map((para,i)=>{
          if(para.startsWith('**')&&para.endsWith('**')){
            return<h3 key={i} style={{fontFamily:'var(--font-d)',fontSize:'1.15rem',color:'var(--gold)',marginTop:i>0?20:0,marginBottom:10,fontWeight:500}}>{para.replace(/\*\*/g,'')}</h3>;
          }
          const parts=para.split(/\*\*([^*]+)\*\*/g);
          return(
            <p key={i} style={{fontSize:'.9rem',color:'var(--text-2)',lineHeight:1.8,marginBottom:12}}>
              {parts.map((p,j)=>j%2===1?<strong key={j} style={{color:'var(--gold)'}}>{p}</strong>:p)}
            </p>
          );
        })}
      </div>
    </div>
  );
}

/* ═══════════════ FULL FOOTER ════════════════════════════════════════════ */

  const t=T[lang];
  const ru=lang==='ru',es=lang==='es',it=lang==='it',he=lang==='he';
  const L={
    platform:ru?'Платформа':es?'Plataforma':it?'Piattaforma':he?'פלטפורמה':'Platform',
    legal:ru?'Правовая информация':es?'Legal':it?'Legale':he?'משפטי':'Legal',
    support:ru?'Поддержка':es?'Soporte':it?'Supporto':he?'תמיכה':'Support',
    privacy:ru?'Политика конфиденциальности':es?'Privacidad':it?'Privacy':he?'פרטיות':'Privacy Policy',
    terms:ru?'Условия использования':es?'Términos':it?'Termini':he?'תנאים':'Terms of Service',
    cookies:ru?'Cookies':es?'Cookies':it?'Cookie':he?'עוגיות':'Cookie Policy',
    disclaimer:ru?'Отказ от ответственности':es?'Descargo':it?'Disclaimer':he?'כתב ויתור':'Disclaimer',
    contact:ru?'Контакты':es?'Contacto':it?'Contatto':he?'צרו קשר':'Contact & Support',
    gdpr:ru?'GDPR / Защита данных':es?'Protección de Datos':it?'Protezione Dati':he?'הגנת מידע':'Data Protection',
    accessibility:ru?'Доступность':es?'Accesibilidad':it?'Accessibilità':he?'נגישות':'Accessibility',
    rights:ru?'Все права защищены':es?'Todos los derechos reservados':it?'Tutti i diritti riservati':he?'כל הזכויות שמורות':'All rights reserved',
    disclaimer_short:ru?'Весь контент предоставляется в информационных целях и не является профессиональной консультацией.':es?'Todo el contenido es solo informativo y no constituye asesoramiento profesional.':it?'Tutti i contenuti sono solo informativi.':he?'כל התוכן למטרות מידע בלבד ואינו מהווה ייעוץ מקצועי.':'All content is for informational purposes only and does not constitute professional advice.',
  };
  return(
    <footer>
      <div className="mw">
        <div className="footer-grid">
          {/* Brand */}
          <div>
            <div className="nav-logo-mark" style={{marginBottom:12,width:36,height:36,fontSize:16}}>L</div>
            <div className="footer-brand-h">LifeForge<em style={{fontStyle:'italic',color:'var(--gold)'}}>·</em>AI</div>
            <p className="footer-brand-sub">{t.footer_tagline}</p>
            <p style={{fontSize:'.72rem',color:'var(--text-3)',marginTop:10,lineHeight:1.6,maxWidth:240}}>{L.disclaimer_short}</p>
          </div>
          {/* Platform */}
          <div>
            <div className="footer-col-h">{L.platform}</div>
            <div className="footer-links">
              {[[t.nav_coaches,'coach'],[t.nav_esoteric,'esoteric'],[t.nav_svarga,'svarga']].map(([lbl,id])=>(
                <span key={id} className="footer-link" style={{cursor:'pointer'}} onClick={()=>onNavigate(id)}>{lbl}</span>
              ))}
            </div>
          </div>
          {/* Legal */}
          <div>
            <div className="footer-col-h">{L.legal}</div>
            <div className="footer-links">
              {[['privacy',L.privacy],['terms',L.terms],['cookies',L.cookies],['disclaimer',L.disclaimer]].map(([id,lbl])=>(
                <span key={id} className="footer-link" onClick={()=>onLegalOpen(id)} style={{cursor:'pointer'}}>{lbl}</span>
              ))}
            </div>
          </div>
          {/* Support */}
          <div>
            <div className="footer-col-h">{L.support}</div>
            <div className="footer-links">
              <span className="footer-link" onClick={()=>onLegalOpen('contact')} style={{cursor:'pointer'}}>{L.contact}</span>
              <span className="footer-link" onClick={()=>onLegalOpen('data_protection')} style={{cursor:'pointer'}}>{L.gdpr}</span>
              <span className="footer-link" onClick={()=>onLegalOpen('accessibility')} style={{cursor:'pointer'}}>{L.accessibility}</span>
              <a href="mailto:moshe.svarga@gmail.com" className="footer-link" style={{color:'var(--gold)'}}>moshe.svarga@gmail.com</a>
            </div>
          </div>
        </div>
        <div className="footer-bottom">
          <div className="footer-copy">© 2025 LifeForge AI. {L.rights}.</div>
          <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
            {[['privacy',L.privacy],['terms',L.terms],['disclaimer',L.disclaimer]].map(([id,lbl])=>(
              <span key={id} onClick={()=>onLegalOpen(id)}
                style={{fontSize:'.68rem',color:'var(--text-3)',cursor:'pointer',transition:'color .2s'}}
                onMouseEnter={e=>e.target.style.color='var(--gold)'}

/* ═══════════════ ROOT APP ═══════════════════════════════════════════════ */
function App(){
  const [lang,setLang]=useState('en');
  const [theme,setTheme]=useState('dark');
  const [layer,setLayer]=useState('coach');
  const [view,setView]=useState('home');
  const [selected,setSelected]=useState(null);
  const [legalDoc,setLegalDoc]=useState(null);
  const [depth,setDepth]=useState(()=>LS.getDepth());
  const [user,setUser]=useState(()=>LS.getUser());
  const [authOpen,setAuthOpen]=useState(false);
  const [profileOpen,setProfileOpen]=useState(false);

  useEffect(()=>{
    document.documentElement.setAttribute('data-theme',theme);
    document.documentElement.setAttribute('dir',lang==='he'?'rtl':'ltr');
    document.documentElement.setAttribute('lang',lang);
    document.documentElement.setAttribute('data-layer',layer);
    updateOrbs(layer);
  },[theme,lang,layer]);

  useReveal([layer,view,selected,lang,legalDoc]);

  const isFullscreen=view==='chat';

  /* single navigation entry-point — clears all overlay state */
  function navigate(newLayer,newView='home'){
    setLayer(newLayer);
    setView(newView);
    setSelected(null);
    setLegalDoc(null);
    updateOrbs(newLayer);
    window.scrollTo({top:0,behavior:'smooth'});
  }
  function openLegal(id){setLegalDoc(id);window.scrollTo({top:0,behavior:'smooth'});}
  function closeLegal(){setLegalDoc(null);}

  return(
    <React.Fragment>
      <Nav lang={lang} setLang={l=>setLang(l)} theme={theme} setTheme={setTheme}
        layer={layer} setLayer={l=>navigate(l)} setView={setView}
        depth={depth} setDepth={setDepth}
        user={user}
        onAuthOpen={()=>setAuthOpen(true)}
        onLogout={()=>{LS.clearUser();setUser(null);}}
        onProfileOpen={()=>setProfileOpen(true)}/>
      <main style={{minHeight:'100svh',paddingTop:66}}>
        {legalDoc?(
          <LegalPage docId={legalDoc} lang={lang} onBack={closeLegal}/>
        ):(
          <>
            {layer==='coach'&&view==='home'&&(
              <Hero lang={lang} setLayer={l=>navigate(l)}/>
            )}
            {!isFullscreen&&(
              <LayerTabs layer={layer} setLayer={l=>navigate(l)} lang={lang}/>
            )}
            {layer==='coach'&&(
              <CoachLayer lang={lang} view={view} setView={setView}
                selected={selected} setSelected={setSelected}/>
            )}
            {layer==='esoteric'&&<EsotericLayer lang={lang} depth={depth}/>}
            {layer==='svarga'&&<IntegralLayer lang={lang} depth={depth} user={user} onSaveReport={(entry)=>{LS.addHistory(entry);}}/>}
          </>
        )}
      </main>
      <Footer lang={lang} onLegalOpen={openLegal} onNavigate={l=>navigate(l)}/>
      <ScrollTop/>
      {authOpen&&<AuthModal lang={lang} onClose={()=>setAuthOpen(false)} onLogin={u=>{LS.setUser(u);setUser(u);setAuthOpen(false);}}/>}
      {profileOpen&&<ProfileModal lang={lang} user={user} onClose={()=>setProfileOpen(false)}/>}
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
