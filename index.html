    ru:["Ваше тело просит о согласовании между тем, что вы потребляете, и тем, что строите. Эта фаза требует противовоспалительных продуктов — листовая зелень, куркума, источники омега-3. Уменьшите рафинированный сахар. Утреннее увлажнение до любого стимулятора обязательно. Минимум три цвета на тарелке как правило питательного интеллекта.",
        "Ваш энергетический ритм предполагает перегрузку надпочечников. Введите адаптогенную поддержку: ашваганда, родиола регулируют кортизол без седации. Белок при каждом приёме пищи стабилизирует сахар крови и снижает тревожную петлю."],
    es:["Tu cuerpo pide alineación entre lo que consumes y lo que estás construyendo. Esta fase requiere alimentos antiinflamatorios: verduras de hoja verde, cúrcuma, fuentes de omega-3. Reduce el azúcar refinado. La hidratación matutina antes de cualquier estimulante es innegociable. Al menos tres colores en cada plato como regla de inteligencia nutricional.",
        "Tu ritmo energético sugiere sobrecarga suprarrenal. Introduce apoyo adaptogénico: ashwagandha y rhodiola regulan el cortisol sin sedación. La proteína en cada comida estabiliza el azúcar en sangre y reduce el ciclo de ansiedad derivado de la inestabilidad glucémica. El sistema digestivo es el segundo cerebro — trátalo en consecuencia."],
    it:["Il tuo corpo chiede allineamento tra ciò che consumi e ciò che stai costruendo. Questa fase richiede alimenti antinfiammatori: verdure a foglia verde, curcuma, fonti di omega-3. Riduci lo zucchero raffinato. L'idratazione mattutina prima di qualsiasi stimolante è non negoziabile. Almeno tre colori nel piatto come regola di intelligenza nutrizionale.",
        "Il tuo ritmo energetico suggerisce un sovraccarico surrenale. Introduci supporto adattogeno: ashwagandha e rhodiola regolano il cortisolo senza sedazione. Le proteine ad ogni pasto stabilizzano la glicemia e riducono il ciclo d'ansia. Il sistema digestivo è il secondo cervello — trattalo di conseguenza."],
    he:["גופך מבקש יישור בין מה שאתה צורך לבין מה שאתה בונה. שלב זה דורש מזונות נוגדי דלקת — ירקות עלים, כורכום, מקורות אומגה-3. הפחת סוכר מעובד. הידרציה בבוקר לפני כל ממריץ היא הכרחית. לפחות שלושה צבעים בצלחת כלל של אינטליגנציה תזונתית.",
        "קצב האנרגיה שלך מרמז על עומס יתר על בלוטות האדרנל. הכנס תמיכה אדפטוגנית: אשוואגנדה ורודיולה מווסתים קורטיזול ללא הרדמה. חלבון בכל ארוחה מייצב רמת סוכר בדם ומפחית את לולאת החרדה."]
  },
  breathing:{
    en:["The breath is the only autonomic function under conscious control — making it the master key to your nervous system. For your current state, try coherent breathing: inhale slowly through the nose for about 5–6 seconds, then exhale gently for the same count. Even 10 minutes daily makes a meaningful difference in how grounded and calm you feel.",
        "Many people breathe from the chest rather than the diaphragm — it's easy to drift into this pattern, especially during busy or tense periods. Try this: place one hand on your chest, one on your belly, and let the belly rise first. Diaphragmatic breathing becomes natural within two to three weeks of gentle practice. The benefit: a noticeably calmer, more regulated nervous system."],
    ru:["Дыхание — единственная автономная функция под сознательным контролем, что делает его главным ключом к вашей нервной системе. Попробуйте когерентное дыхание: медленный вдох через нос примерно на 5–6 счётов, затем спокойный выдох на то же время. Даже 10 минут ежедневно заметно улучшают ощущение устойчивости и спокойствия.",
        "Многие дышат грудью, а не диафрагмой — особенно в напряжённые периоды. Попробуйте: положите одну руку на грудь, другую на живот — пусть живот поднимается первым. Диафрагмальное дыхание становится естественным через 2–3 недели мягкой практики. Результат: заметно более спокойная, регулируемая нервная система."],
    es:["La respiración es la única función autónoma bajo control consciente — es la llave maestra de tu sistema nervioso. Para tu estado actual, prueba la respiración coherente: inhala suavemente por la nariz durante unos 5–6 segundos, luego exhala con calma el mismo tiempo. Incluso 10 minutos al día marcan una diferencia notable en cómo te sientes de centrado y tranquilo.",
        "Muchas personas respiran desde el pecho en lugar del diafragma — es fácil caer en este patrón, especialmente en momentos de tensión. Intenta esto: coloca una mano en el pecho y otra en el vientre, y deja que el vientre se eleve primero. La respiración diafragmática se vuelve natural con dos o tres semanas de práctica suave."],
    it:["Il respiro è l'unica funzione autonoma sotto controllo cosciente, rendendolo la chiave maestra del tuo sistema nervioso. Per il tuo stato attuale, prova la respirazione coerente: inspira lentamente dal naso per circa 5–6 secondi, poi espira con calma per lo stesso tempo. Anche solo 10 minuti al giorno fanno una differenza reale nel modo in cui ti senti radicato e sereno.",
        "Molte persone respirano dal petto invece che dal diaframma — è facile scivolare in questo schema, specialmente nei periodi intensi. Prova questo: metti una mano sul petto e una sulla pancia, e lascia che la pancia si sollevi per prima. La respirazione diaframmatica diventa naturale dopo due o tre settimane di pratica gentile."],
    he:["הנשימה היא הפונקציה האוטונומית היחידה בשליטה מודעת — מה שהופך אותה למפתח הראשי של מערכת העצבים שלך. עבור המצב הנוכחי שלך, נסה נשימה קוהרנטית: שאיפה רכה דרך האף למשך כ-5–6 ספירות, ואז נשיפה שקטה לאותו הזמן. אפילו 10 דקות ביום עושות הבדל ניכר בתחושת היציבות והרוגע שלך.",
        "אנשים רבים נושמים מהחזה ולא מהסרעפת — זה קל לקרות, במיוחד בתקופות עמוסות. נסה זאת: שים יד אחת על החזה ואחת על הבטן, ותן לבטן לעלות ראשונה. נשימה סרעפתית הופכת טבעית תוך שבועיים-שלושה של תרגול עדין."]
  },
  energy:{
    en:["Your energy patterns suggest an opportunity to reconnect with vitality at its source. Consider 15 minutes of natural sunlight in the morning — ideally before 10am, away from screens — alongside a brief physical practice that feels empowering rather than effortful. These simple anchors signal to your nervous system that you are resourced and present.",
        "Energy follows attention. You have been leaking life-force into situations that cannot be resolved by more mental engagement. The Vedic concept of prana requires protection: deliberately choose three things you will not give energy to this week. Not avoidance — conservation for what actually matters."],
    ru:["Ваша энергетическая сигнатура показывает истощение в солнечном сплетении — центре личной силы. Рецепт: 15 минут прямого воздействия солнца до 10 утра и ежедневный силовой жест.",
        "Энергия следует за вниманием. Вы утекаете жизненную силу в ситуации, которые не могут быть разрешены большим ментальным вовлечением. Намеренно выберите три вещи, которым не будете давать энергию на этой неделе."],
    es:["Tu firma energética muestra agotamiento en el plexo solar — el centro del poder personal. La prescripción: 15 minutos de exposición directa al sol antes de las 10am (sin pantalla intermediaria), y un gesto de poder diario — algo físico que señale a tu sistema nervioso que estás nutrido y eres capaz.",
        "La energía sigue a la atención. Has estado filtrando fuerza vital hacia situaciones que no pueden resolverse con más compromiso mental. El concepto védico de prana requiere protección: elige deliberadamente tres cosas a las que no darás energía esta semana. No es evitación — es conservación para lo que realmente importa."],
    it:["La tua firma energetica mostra esaurimento nel plesso solare — il centro del potere personale. La prescrizione: 15 minuti di esposizione diretta al sole prima delle 10 (senza intermediari come schermi), e un gesto di potere quotidiano — qualcosa di fisico che segnali al tuo sistema nervioso che sei dotato di risorse.",
        "L'energia segue l'attenzione. Hai perso forza vitale in situazioni che non possono essere risolte con maggiore coinvolgimento mentale. Il concetto vedico di prana richiede protezione: scegli deliberatamente tre cose a cui non darai energia questa settimana. Non è evitamento — è conservazione per ciò che conta davvero."],
    he:["החתימה האנרגטית שלך מציגה דלדול בפלקסוס השמשי — מרכז הכוח האישי. המרשם: 15 דקות של חשיפה ישירה לשמש לפני 10 בבוקר (ללא מסך ביניים), ומחווה כוח יומית — משהו פיזי שמאותת למערכת העצבים שלך שאתה מצויד ומסוגל.",
        "אנרגיה עוקבת אחרי תשומת לב. אתה מדלף כוח חיים למצבים שלא ניתן לפתור עם יותר מעורבות מנטלית. מושג הפרנה הוודי דורש הגנה: בחר במכוון שלושה דברים שלא תתן להם אנרגיה השבוע. זו לא הימנעות — זו שמירה לטובת מה שחשוב באמת."]
  },
  mental:{
    en:["The quality of your mental environment determines the quality of every output. Diagnosis: you are processing too much input with insufficient integration time. The 60-minute rule: for every hour of information consumption, take 10 minutes for reflection or writing. Your mind needs synthesis space, not more data.",
        "Cognitive loops — thoughts that return without resolution — are not a sign of importance; they signal incomplete processing. Scheduled worry: a 15-minute daily window where you actively engage the recurring thought on paper. Outside that window, you have permission to redirect. This technique has substantial empirical backing."],
    ru:["Качество вашей ментальной среды определяет качество каждого результата. Диагноз: вы обрабатываете слишком много входных данных с недостаточным временем интеграции. Правило 60 минут: на каждый час потребления информации — 10 минут рефлексии или письма.",
        "Когнитивные петли — мысли, возвращающиеся без разрешения — не признак важности; они сигнализируют о незавершённой обработке. Запланированное беспокойство: 15-минутное ежедневное окно."],
    es:["La calidad de tu entorno mental determina la calidad de cada resultado. Diagnóstico: estás procesando demasiada información con tiempo de integración insuficiente. La regla de los 60 minutos: por cada hora de consumo de información, toma 10 minutos de reflexión o escritura. Tu mente necesita espacio de síntesis, no más datos.",
        "Los bucles cognitivos — pensamientos que regresan sin resolución — no son una señal de importancia; señalan procesamiento incompleto. Preocupación programada: una ventana diaria de 15 minutos donde involucras activamente el pensamiento recurrente por escrito. Fuera de esa ventana, tienes permiso para redirigir."],
    it:["La qualità del tuo ambiente mentale determina la qualità di ogni output. Diagnosi: stai elaborando troppi input con tempo di integrazione insufficiente. La regola dei 60 minuti: per ogni ora di consumo di informazioni, prendi 10 minuti di riflessione o scrittura. La tua mente ha bisogno di spazio di sintesi, non di più dati.",
        "I loop cognitivi — pensieri che ritornano senza risoluzione — non sono un segno di importanza; segnalano un'elaborazione incompleta. Preoccupazione programmata: una finestra quotidiana di 15 minuti in cui coinvolgi attivamente il pensiero ricorrente su carta. Al di fuori di quella finestra, hai il permesso di reindirizzare."],
    he:["איכות הסביבה המנטלית שלך קובעת את איכות כל תוצאה. אבחון: אתה מעבד יותר מדי קלטים עם זמן אינטגרציה לא מספיק. כלל 60 הדקות: עבור כל שעה של צריכת מידע, קח 10 דקות לרפלקציה או כתיבה. מוחך צריך מרחב סינתזה, לא עוד נתונים.",
        "לולאות קוגניטיביות — מחשבות שחוזרות ללא פתרון — אינן סימן לחשיבות; הן מאותתות על עיבוד לא שלם. דאגה מתוזמנת: חלון יומי של 15 דקות שבו אתה מעורב באופן פעיל במחשבה החוזרת על נייר. מחוץ לחלון זה, יש לך רשות להפנות מחדש."]
  },
  body:{
    en:["Movement is medicine — but the kind matters. Your profile suggests over-engagement with high-intensity output and under-engagement with restorative movement. Add yoga nidra or yin yoga 3x per week. These are not passive — they are active nervous system recalibration with strong research backing.",
        "Your body has been carrying more tension than it processes. The fascia stores unresolved emotional content as chronic holding patterns. Daily bodywork — even 10 minutes of self-massage, foam rolling, or conscious stretching — begins to release what intellectual processing cannot reach. Start with the jaw, neck, and hip flexors."],
    ru:["Движение — это медицина, но важен его вид. Ваш профиль предполагает чрезмерную вовлечённость в высокоинтенсивный выход и недостаточную вовлечённость в восстановительное движение. Добавьте йога-нидру или инь-йогу 3 раза в неделю.",
        "Ваше тело несло больше напряжения, чем обрабатывает. Фасция хранит неразрешённое эмоциональное содержание. Ежедневный телесный уход — даже 10 минут самомассажа, пены-ролика или сознательной растяжки."],
    es:["El movimiento es medicina — pero el tipo importa. Tu perfil sugiere un exceso de compromiso con resultados de alta intensidad y un déficit de movimiento restaurador. Añade yoga nidra o yin yoga 3 veces por semana. No son pasivos — son recalibración activa del sistema nervioso respaldada por investigación sólida.",
        "Tu cuerpo ha estado cargando más tensión de la que procesa. La fascia almacena contenido emocional no resuelto como patrones crónicos de tensión. El trabajo corporal diario — incluso 10 minutos de automasaje o estiramiento consciente — comienza a liberar lo que el procesamiento intelectual no puede alcanzar."],
    it:["Il movimento è medicina — ma il tipo conta. Il tuo profilo suggerisce un eccessivo coinvolgimento con output ad alta intensità e un insufficiente coinvolgimento con il movimento rigenerativo. Aggiungi yoga nidra o yin yoga 3 volte a settimana. Non sono passivi — sono ricalibrazione attiva del sistema nervioso con forte supporto della ricerca.",
        "Il tuo corpo ha portato più tensione di quella che elabora. La fascia memorizza contenuto emotivo irrisolto come schemi cronici di tensione. Il lavoro corporeo quotidiano — anche solo 10 minuti di automassaggio o stretching consapevole — inizia a liberare ciò che l'elaborazione intellettuale non riesce a raggiungere."],
    he:["תנועה היא תרופה — אבל הסוג חשוב. הפרופיל שלך מרמז על מעורבות יתר בתפוקה בעצימות גבוהה ומעורבות חסרה בתנועה משחזרת. הוסף יוגה נידרה או יין יוגה 3 פעמים בשבוע. אלה לא פסיביים — הם כיול פעיל מחדש של מערכת העצבים עם גיבוי מחקרי חזק.",
        "גופך נשא יותר מתח ממה שהוא מעבד. הפשייה מאחסנת תוכן רגשי לא פתור כדפוסי אחיזה כרוניים. עבודת גוף יומית — אפילו 10 דקות של עיסוי עצמי או מתיחה מודעת — מתחילה לשחרר מה שעיבוד אינטלקטואלי לא יכול להגיע אליו."]
  },
  emotional:{
    en:["Emotional regulation is not suppression — it is the capacity to feel fully without being governed by the feeling. Your current state suggests an accumulation of unprocessed emotional charge. The practice: name the emotion precisely (granular labelling measurably reduces amygdala activation), locate it in the body, and breathe into that location for 90 seconds — the natural lifespan of an emotion's chemical wave when it is not fed by narrative.",
        "You are likely managing emotion through control rather than metabolism — holding the line instead of letting the wave move through. The somatic truth: emotions are energy in motion and require completion. Schedule a daily emotional discharge — vigorous movement, expressive writing, or vocal release — so the nervous system clears its charge instead of storing it as chronic tension."],
    ru:["Эмоциональная регуляция — это не подавление, а способность чувствовать полностью, не будучи управляемым чувством. Ваше состояние предполагает накопление непереработанного эмоционального заряда. Практика: точно назовите эмоцию, найдите её в теле и дышите в это место 90 секунд — естественная продолжительность химической волны эмоции, когда её не питает нарратив.",
        "Вероятно, вы управляете эмоциями через контроль, а не через метаболизм — держите оборону вместо того, чтобы позволить волне пройти. Запланируйте ежедневный эмоциональный разряд — интенсивное движение, экспрессивное письмо или голосовое освобождение — чтобы нервная система очищала заряд, а не хранила его как хроническое напряжение."],
    es:["La regulación emocional no es supresión — es la capacidad de sentir plenamente sin ser gobernado por el sentimiento. Tu estado actual sugiere una acumulación de carga emocional no procesada. La práctica: nombra la emoción con precisión, localízala en el cuerpo y respira hacia ese lugar durante 90 segundos — la vida natural de la onda química de una emoción cuando no se alimenta de narrativa.",
        "Probablemente gestionas la emoción mediante el control en lugar del metabolismo — sostienes la línea en vez de dejar que la ola atraviese. La verdad somática: las emociones son energía en movimiento y requieren completarse. Programa una descarga emocional diaria — movimiento vigoroso, escritura expresiva o liberación vocal — para que el sistema nervioso limpie su carga en lugar de almacenarla como tensión crónica."],
    it:["La regolazione emotiva non è soppressione — è la capacità di sentire pienamente senza essere governati dal sentimento. Il tuo stato attuale suggerisce un accumulo di carica emotiva non elaborata. La pratica: nomina l'emozione con precisione, localizzala nel corpo e respira in quel punto per 90 secondi — la vita naturale dell'onda chimica di un'emozione quando non è alimentata dalla narrazione.",
        "Probabilmente gestisci l'emozione attraverso il controllo anziché il metabolismo — tieni la linea invece di lasciare che l'onda attraversi. La verità somatica: le emozioni sono energia in movimento e richiedono completamento. Programma una scarica emotiva quotidiana — movimento vigoroso, scrittura espressiva o rilascio vocale — affinché il sistema nervoso ripulisca la sua carica invece di immagazzinarla come tensione cronica."],
    he:["ויסות רגשי אינו דיכוי — זו היכולת להרגיש במלואו מבלי להיות נשלט על ידי הרגש. מצבך הנוכחי מרמז על הצטברות מטען רגשי לא מעובד. התרגול: תן שם מדויק לרגש, אתר אותו בגוף ונשום לתוך אותו מקום במשך 90 שניות — אורך החיים הטבעי של הגל הכימי של רגש כשאינו ניזון מנרטיב.",
        "כנראה שאתה מנהל רגש דרך שליטה ולא דרך מטבוליזם — מחזיק את הקו במקום לתת לגל לעבור. האמת הסומטית: רגשות הם אנרגיה בתנועה והם דורשים השלמה. תזמן פריקה רגשית יומית — תנועה נמרצת, כתיבה אקספרסיבית או שחרור קולי — כדי שמערכת העצבים תנקה את המטען במקום לאחסן אותו כמתח כרוני."]
  },
  recovery:{
    en:["Recovery is where adaptation actually happens — growth is built in rest, not in effort. Your pattern suggests a recovery deficit: too much output, too little structured restoration. Non-negotiables for this phase: a consistent sleep-wake window (±30 min), a hard digital sunset 60 minutes before bed, and one full day per week with no optimisation agenda. Recovery is the multiplier on everything else.",
        "Your lifestyle architecture is leaking energy at the seams — the small daily frictions that compound invisibly. Audit your environment: light, noise, the first 30 minutes of your morning, the last 30 of your night. Redesign these four anchors and the rest of the day reorganises around them. Lifestyle is not willpower; it is design."],
    ru:["Восстановление — это место, где на самом деле происходит адаптация: рост строится в покое, а не в усилии. Ваш паттерн предполагает дефицит восстановления. Необходимое для этой фазы: постоянное окно сна и пробуждения (±30 мин), цифровой закат за 60 минут до сна и один полный день в неделю без повестки оптимизации. Восстановление — множитель для всего остального.",
        "Архитектура вашего образа жизни теряет энергию по швам — мелкие ежедневные трения, незаметно накапливающиеся. Проведите аудит среды: свет, шум, первые 30 минут утра, последние 30 минут ночи. Переработайте эти четыре якоря — и остальной день перестроится вокруг них. Образ жизни — это не сила воли, это дизайн."],
    es:["La recuperación es donde realmente ocurre la adaptación — el crecimiento se construye en el descanso, no en el esfuerzo. Tu patrón sugiere un déficit de recuperación. Innegociables para esta fase: una ventana de sueño-vigilia consistente (±30 min), un ocaso digital 60 minutos antes de dormir, y un día completo a la semana sin agenda de optimización. La recuperación es el multiplicador de todo lo demás.",
        "La arquitectura de tu estilo de vida pierde energía por las costuras — las pequeñas fricciones diarias que se acumulan invisiblemente. Audita tu entorno: luz, ruido, los primeros 30 minutos de tu mañana, los últimos 30 de tu noche. Rediseña estos cuatro anclajes y el resto del día se reorganiza en torno a ellos. El estilo de vida no es fuerza de voluntad; es diseño."],
    it:["Il recupero è dove avviene realmente l'adattamento — la crescita si costruisce nel riposo, non nello sforzo. Il tuo schema suggerisce un deficit di recupero. Non negoziabili per questa fase: una finestra sonno-veglia costante (±30 min), un tramonto digitale 60 minuti prima di dormire e un giorno intero a settimana senza agenda di ottimizzazione. Il recupero è il moltiplicatore di tutto il resto.",
        "L'architettura del tuo stile di vita perde energia dalle cuciture — le piccole frizioni quotidiane che si accumulano invisibilmente. Verifica il tuo ambiente: luce, rumore, i primi 30 minuti del mattino, gli ultimi 30 della notte. Riprogetta questi quattro ancoraggi e il resto della giornata si riorganizza attorno ad essi. Lo stile di vita non è forza di volontà; è progettazione."],
    he:["התאוששות היא המקום שבו ההסתגלות באמת מתרחשת — צמיחה נבנית במנוחה, לא במאמץ. הדפוס שלך מרמז על גירעון התאוששות. בלתי ניתנים למשא ומתן בשלב זה: חלון שינה-עירות עקבי (±30 דקות), שקיעה דיגיטלית 60 דקות לפני השינה, ויום שלם בשבוע ללא אג'נדת אופטימיזציה. התאוששות היא המכפיל של כל השאר.",
        "ארכיטקטורת אורח החיים שלך מדליפה אנרגיה בתפרים — החיכוכים היומיומיים הקטנים שמצטברים באופן בלתי נראה. בצע ביקורת על הסביבה שלך: אור, רעש, 30 הדקות הראשונות של הבוקר, 30 האחרונות של הלילה. עצב מחדש את ארבעת העוגנים הללו ושאר היום יתארגן סביבם. אורח חיים אינו כוח רצון; זה עיצוב."]
  },
  karma:{
    en:["At the karmic level, you are completing a cycle that began several years ago. What feels like struggle is not punishment — it is the final contraction before expansion. The soul curriculum for this phase is trust: not naive trust, but earned trust in your own resilience and capacity to navigate what arises.",
        "Karma is not fate — it is pattern. And patterns can be interrupted. The recurring dynamic you're experiencing is asking to be consciously completed rather than unconsciously repeated. Bring full awareness to the moment of choice within the pattern. The instant you see it clearly, you are no longer entirely run by it."],
    ru:["На кармическом уровне вы завершаете цикл, начавшийся несколько лет назад. То, что ощущается как борьба — не наказание, это финальное сжатие перед расширением. Программа души для этой фазы — доверие: не наивное, а заработанное.",
        "Карма — не судьба, это паттерн. И паттерны можно прервать. Повторяющаяся динамика, которую вы переживаете, просит быть сознательно завершённой. Принесите полное осознание к моменту выбора внутри паттерна."],
    es:["A nivel kármico, estás completando un ciclo que comenzó hace varios años. Lo que se siente como lucha no es un castigo — es la contracción final antes de la expansión. El currículo del alma para esta fase es la confianza: no la confianza ingenua, sino la confianza ganada en tu propia resiliencia y capacidad para navegar lo que surge.",
        "El karma no es destino — es patrón. Y los patrones pueden interrumpirse. La dinámica recurrente que estás experimentando pide ser completada conscientemente en lugar de repetida inconscientemente. Lleva plena conciencia al momento de elección dentro del patrón."],
    it:["A livello karmico, stai completando un ciclo iniziato diversi anni fa. Ciò che sembra lotta non è punizione — è la contrazione finale prima dell'espansione. Il curriculum dell'anima per questa fase è la fiducia: non la fiducia ingenua, ma la fiducia guadagnata nella propria resilienza.",
        "Il karma non è destino — è schema. E gli schemi possono essere interrotti. La dinamica ricorrente che stai vivendo chiede di essere completata consciamente piuttosto che ripetuta inconsciamente. Porta piena consapevolezza al momento della scelta all'interno dello schema."],
    he:["ברמה הקרמית, אתה משלים מחזור שהתחיל לפני מספר שנים. מה שמרגיש כמאבק הוא לא עונש — זו ההתכווצות הסופית לפני ההתרחבות. תכנית הלימודים של הנשמה לשלב זה היא אמון: לא אמון נאיבי, אלא אמון שהושג ביכולת ובחוסן שלך.",
        "קרמה היא לא גורל — זה דפוס. ודפוסים יכולים להיקטע. הדינמיקה החוזרת שאתה חווה מבקשת להיות מושלמת בצורה מודעת ולא לחזור על עצמה ללא מודעות. הבא מודעות מלאה לרגע הבחירה בתוך הדפוס."]
  }

/* markdown: **bold** → <strong>; plain strings get stripped */
function renderMD(text){
  if(!text)return null;
  return text.split(/\*\*([^*]+)\*\*/g).map((p,i)=>
    i%2===1?<strong key={i} style={{fontWeight:600,color:'var(--text-1)'}}>{p}</strong>:p
  );
}
function stripMD(text){return text?text.replace(/\*\*([^*]+)\*\*/g,'$1'):''}function generateSvarga(input,lang,depth=2){

  return applyDepthSvarga(raw,depth);
}

        "**Двигайтесь для энергии:** Прогулка 10–15 минут, особенно после еды, заметно улучшает энергию и когнитивную ясность. Тело создано для регулярного движения низкой интенсивности в течение дня.",
        "**Защищайте периоды восстановления:** Энергия производится в восстановлении. Каждый период высокой нагрузки нуждается в соответствующем периоде меньшей нагрузки. Краткие намеренные паузы между интенсивными задачами накапливаются значительно."],
      morning:"Утренний энергетический якорь: 10 минут лёгкого движения в первый час после пробуждения.",
      evening:"Вечернее восстановление: настоящий период успокоения перед сном — не экраны, а реальный отдых.",
      track:"Что отслеживать: паттерн энергии в течение дня — когда она достигает пика, когда падает, что предшествовало каждому."
    },
    es:{
      assessment:"La energía sostenible es el resultado de sistemas biológicos alineados, no de esforzarse más. Los problemas de energía casi siempre se remontan a uno o más de: sueño alterado, inestabilidad del azúcar en sangre, estrés crónico sin recuperación o patrones de movimiento empobrecidos.",
      protocol:["**Ancla tu curva de cortisol:** El cortisol es tu hormona de energía natural — alcanza su pico 30–45 minutos después de despertar. Programa tu trabajo más exigente en las primeras 4–6 horas.",
        "**Estabiliza el azúcar en sangre:** Los bajones de energía de media tarde casi siempre se deben a fluctuaciones de azúcar. Reduce los carbohidratos refinados, añade proteína y grasa saludable a cada comida.",
        "**Muévete para energizarte:** Una caminata de 10–15 minutos, especialmente después de las comidas, mejora notablemente la energía y la claridad cognitiva.",
        "**Protege tus ventanas de recuperación:** La energía se produce en la recuperación, no en el esfuerzo. Cada período de alta exigencia necesita un período de baja exigencia correspondiente."],
      morning:"Ancla matutina de energía: 10 minutos de movimiento ligero en la primera hora tras despertar.",
      evening:"Recuperación nocturna: un período genuino de descanso antes de dormir — no tiempo de pantalla sino descanso real.",
      track:"Qué notar: tu patrón de energía a lo largo del día — cuándo alcanza su pico, cuándo decae, qué lo precedió."
    },
    it:{
      assessment:"L'energia sostenibile è il risultato di sistemi biologici allineati, non di maggiore sforzo. I problemi energetici quasi sempre risalgono a uno o più fattori: sonno disturbato, instabilità glicemica, stress cronico senza recupero o schemi di movimento impoveriti.",
      protocol:["**Ancora la tua curva del cortisolo:** Il cortisolo è il tuo ormone naturale dell'energia — raggiunge il picco 30–45 minuti dopo il risveglio. Pianifica il lavoro più impegnativo nelle prime 4–6 ore.",
        "**Stabilizza la glicemia:** I cali energetici nel pomeriggio quasi sempre risalgono a oscillazioni glicemiche. Riduci i carboidrati raffinati, aggiungi proteine e grassi sani ad ogni pasto.",
        "**Muoviti per energizzarti:** Una camminata di 10–15 minuti, specialmente dopo i pasti, migliora notevolmente l'energia e la chiarezza cognitiva.",
        "**Proteggi le tue finestre di recupero:** L'energia si produce nel recupero, non nello sforzo. Ogni periodo ad alta richiesta necessita di un corrispondente periodo a bassa richiesta."],
      morning:"Ancora mattutina energetica: 10 minuti di movimento leggero nella prima ora dal risveglio.",
      evening:"Recupero serale: un periodo genuino di riposo prima di dormire — non tempo davanti agli schermi ma vero riposo.",
      track:"Cosa notare: il tuo schema energetico durante il giorno — quando raggiunge il picco, quando cala, cosa lo ha preceduto."
    },
    he:{
      assessment:"אנרגיה בת-קיימא היא תוצאה של מערכות ביולוגיות מיושרות — לא של דחיפה חזקה יותר. בעיות אנרגיה כמעט תמיד קשורות לאחד או יותר מ: שינה מופרעת, אי-יציבות של סוכר בדם, לחץ כרוני ללא התאוששות או דפוסי תנועה מדולדלים.",
      protocol:["**עגן את עקומת הקורטיזול שלך:** קורטיזול הוא הורמון האנרגיה הטבעי שלך — הוא מגיע לשיא 30–45 דקות לאחר ההשכמה. תזמן את העבודה הדורשנית ביותר שלך ב-4–6 השעות הראשונות לאחר ההשכמה.",
        "**ייצב את רמת הסוכר בדם:** ירידות אנרגיה בשעות אחר הצהריים כמעט תמיד קשורות לתנודות בסוכר. הפחת פחמימות מעובדות, הוסף חלבון ושומן בריא לכל ארוחה.",
        "**התנועע כדי להתאושש:** הליכה של 10–15 דקות, במיוחד לאחר ארוחות, משפרת באופן ניכר אנרגיה ובהירות קוגניטיבית.",
        "**הגן על חלונות ההתאוששות שלך:** אנרגיה מיוצרת בהתאוששות, לא במאמץ. כל תקופה של דרישה גבוהה צריכה תקופת דרישה נמוכה מקבילה."],
      morning:"עוגן בוקר לאנרגיה: 10 דקות של תנועה קלה בשעה הראשונה לאחר ההשכמה.",
      evening:"התאוששות ערב: תקופת הרגעה אמיתית לפני השינה — לא זמן מסך אלא מנוחה ממשית.",
      track:"מה לשים לב: דפוס האנרגיה שלך לאורך היום — מתי הוא מגיע לשיא, מתי הוא יורד, מה קדם לכל אחד."
    }

  stress:{
    en:{
      assessment:"Stress itself is not the problem — stress without adequate recovery is. The nervous system is designed to move between states of activation and rest. When it gets stuck in sustained activation, the downstream effects touch every aspect of wellbeing. The goal is not to eliminate stress but to develop a more responsive, resilient nervous system.",
      protocol:["**Physiological sigh on demand:** The fastest evidence-based way to downregulate the nervous system in real time: a double inhale through the nose (inhale, then a brief extra inhale to top up the lungs), followed by a long, slow exhale through the mouth. One or two cycles visibly shift autonomic state within seconds.",
        "**Cold exposure — gentle entry:** Brief cold water at the end of a shower (30 seconds, working up to 2–3 minutes over time) has solid research support for mood, resilience, and stress tolerance. The practice trains the nervous system to return to calm faster after activation.",
        "**Nature contact:** Even 20 minutes in a natural setting measurably lowers cortisol. This is not metaphor — it is a consistent physiological finding. Build in one genuine outdoor period daily, especially during high-demand phases.",
        "**Boundary your inputs:** Stress is significantly amplified by information overload and relentless availability. Designate 2–3 windows for checking messages per day rather than continuous monitoring. The quality of your attention improves; the perceived stress load reduces."],
      morning:"Morning regulation: 5 minutes of slow breathing or light movement before engaging with the day's demands.",
      evening:"Evening decompression: identify and name one source of stress from today — naming reduces physiological stress response.",
      track:"What to notice: where in the body you hold tension, and what reliably reduces it."
    },
    ru:{
      assessment:"Стресс сам по себе не является проблемой — проблемой является стресс без адекватного восстановления. Нервная система создана для перемещения между состояниями активации и покоя. Когда она застревает в длительной активации, последствия затрагивают каждый аспект благополучия.",
      protocol:["**Физиологический вздох по требованию:** Самый быстрый способ снизить тонус нервной системы в реальном времени: двойной вдох через нос (вдох, затем краткий дополнительный вдох), затем долгий медленный выдох через рот. Один-два цикла заметно меняют автономное состояние.",
        "**Мягкое воздействие холодом:** Короткое холодное облитие в конце душа (30 секунд, постепенно до 2–3 минут) имеет solid исследовательскую поддержку для настроения и устойчивости к стрессу.",
        "**Контакт с природой:** Даже 20 минут в естественной обстановке заметно снижают кортизол. Включите один настоящий период на открытом воздухе ежедневно.",
        "**Ограничьте входящие:** Стресс значительно усиливается перегрузкой информацией. Определите 2–3 окна для проверки сообщений в день вместо непрерывного мониторинга."],
      morning:"Утренняя регуляция: 5 минут медленного дыхания или лёгкого движения до встречи с дневными требованиями.",
      evening:"Вечерняя декомпрессия: назовите один источник стресса сегодняшнего дня — называние снижает физиологическую реакцию на стресс.",
      track:"Что отслеживать: где в теле вы держите напряжение и что надёжно снижает его."
    },
    es:{
      assessment:"El estrés en sí mismo no es el problema — el estrés sin recuperación adecuada sí lo es. El sistema nervioso está diseñado para moverse entre estados de activación y descanso. El objetivo no es eliminar el estrés sino desarrollar un sistema nervioso más responsivo y resiliente.",
      protocol:["**Suspiro fisiológico bajo demanda:** La forma más rápida de regular el sistema nervioso: una doble inhalación por la nariz (inhala, luego una breve inhalación extra), seguida de una larga exhalación lenta por la boca. Uno o dos ciclos cambian visiblemente el estado autonómico.",
        "**Exposición suave al frío:** Agua fría breve al final de la ducha (30 segundos, aumentando gradualmente) tiene sólido respaldo investigativo para el ánimo y la tolerancia al estrés.",
        "**Contacto con la naturaleza:** Incluso 20 minutos en un entorno natural reduce mediblemente el cortisol. Incorpora un período genuino al aire libre diariamente.",
        "**Delimita tus inputs:** El estrés se amplifica significativamente por la sobrecarga informativa. Designa 2–3 ventanas para revisar mensajes al día en lugar de monitoreo continuo."],
      morning:"Regulación matutina: 5 minutos de respiración lenta o movimiento ligero antes de enfrentarte a las exigencias del día.",
      evening:"Descompresión nocturna: identifica y nombra una fuente de estrés de hoy — nombrarla reduce la respuesta fisiológica al estrés.",
      track:"Qué notar: dónde en el cuerpo sostienes la tensión y qué la reduce de manera confiable."
    },
    it:{
      assessment:"Lo stress in sé non è il problema — lo stress senza adeguato recupero lo è. Il sistema nervioso è progettato per muoversi tra stati di attivazione e riposo. L'obiettivo non è eliminare lo stress ma sviluppare un sistema nervioso più responsivo e resiliente.",
      protocol:["**Sospiro fisiologico su richiesta:** Il modo più rapido per regolare il sistema nervioso: un doppio respiro dal naso (inspira, poi una breve inspirazione extra), seguito da una lunga, lenta espirazione dalla bocca.",
        "**Esposizione dolce al freddo:** Breve acqua fredda alla fine della doccia (30 secondi, aumentando gradualmente) ha solido supporto ricercato per umore e resilienza allo stress.",
        "**Contatto con la natura:** Anche 20 minuti in un ambiente naturale abbassa misurabilmente il cortisolo. Inserisci un genuino periodo all'aperto quotidianamente.",
        "**Delimita i tuoi input:** Lo stress è amplificato dall'overload informativo. Designa 2–3 finestre per controllare i messaggi al giorno invece del monitoraggio continuo."],
      morning:"Regolazione mattutina: 5 minuti di respirazione lenta o movimento leggero prima di affrontare le richieste del giorno.",
      evening:"Decompressione serale: identifica e nomina una fonte di stress di oggi — nominarla riduce la risposta fisiologica allo stress.",
      track:"Cosa notare: dove nel corpo tieni la tensione e cosa la riduce in modo affidabile."
    },
    he:{
      assessment:"לחץ בעצמו אינו הבעיה — לחץ ללא התאוששות מספקת הוא הבעיה. מערכת העצבים מעוצבת לנוע בין מצבי הפעלה ומנוחה. המטרה אינה לבטל לחץ אלא לפתח מערכת עצבים מגיבה וחסינה יותר.",
      protocol:["**אנחה פיזיולוגית לפי דרישה:** הדרך המהירה ביותר לווסת את מערכת העצבים: שאיפה כפולה דרך האף (שאיפה, ואז שאיפה קצרה נוספת), ואחריה נשיפה ארוכה ואיטית דרך הפה.",
        "**חשיפה עדינה לקור:** מים קרים קצרים בסוף המקלחת (30 שניות, תוך כדי עלייה הדרגתית) נתמכים היטב במחקרים לשיפור מצב הרוח וסובלנות ללחץ.",
        "**מגע עם הטבע:** אפילו 20 דקות בסביבה טבעית מורידות קורטיזול באופן מדיד. שלב תקופה אמיתית בחוץ מדי יום.",
        "**הגבל את הקלטים שלך:** לחץ מוגבר באופן משמעותי על ידי עומס מידע. ייחד 2–3 חלונות לבדיקת הודעות ביום במקום ניטור רציף."],
      morning:"ויסות בוקר: 5 דקות של נשימה איטית או תנועה קלה לפני מפגש עם דרישות היום.",
      evening:"פירוק לחץ ערב: זהה ושם מקור לחץ אחד מהיום — שמות מפחיתות את התגובה הפיזיולוגית ללחץ.",
      track:"מה לשים לב: היכן בגוף אתה מחזיק מתח ומה מפחית אותו באופן אמין."
    }
  },
  recovery:{
    en:{
      assessment:"Recovery is the invisible half of performance — it is where adaptation, integration, and growth actually occur. Most people treat recovery as passive (doing nothing) when effective recovery is active and structured. The body responds to what you do in recovery windows just as it responds to training.",
      protocol:["**Strategic deload days:** Build at least one genuine low-demand day into each week — not just low exercise, but genuinely lower cognitive and emotional demand. This is not laziness; it is the condition under which regeneration occurs.",
        "**Post-exertion protocol:** After intense physical or cognitive effort: 5–10 minutes of gentle movement (walking, stretching), followed by slow breathing. This deliberately closes the stress response loop and signals the nervous system that the demand period is complete.",
        "**Sleep as recovery priority:** All physical recovery happens during sleep — muscle repair, immune function, hormonal reset. Compressing sleep to get more done is reliably counterproductive over any meaningful time horizon.",
        "**Social recovery:** Genuine connection with people who energize rather than drain you is physiologically restorative. Even one meaningful conversation per day measurably affects biomarkers of stress and wellbeing."],
      morning:"Morning recovery check-in: on a scale of 1–10, how restored do you feel? Let the answer inform how you plan the day.",
      evening:"Evening recovery audit: what depleted you today, and what genuinely restored you? Adjust tomorrow accordingly.",
      track:"What to notice: your recovery rate — how quickly you return to feeling resourced after a demanding period."
    },
    ru:{
      assessment:"Восстановление — невидимая половина результативности — это место, где на самом деле происходят адаптация, интеграция и рост. Большинство людей считают восстановление пассивным (ничегонеделание), тогда как эффективное восстановление активно и структурировано.",
      protocol:["**Стратегические дни разгрузки:** Включите хотя бы один настоящий день с низкими требованиями в каждую неделю — не только меньше упражнений, но и реально более низкая когнитивная и эмоциональная нагрузка.",
        "**Протокол после нагрузки:** После интенсивных физических или когнитивных усилий: 5–10 минут мягкого движения, затем медленное дыхание. Это намеренно закрывает петлю стрессовой реакции.",
        "**Сон как приоритет восстановления:** Всё физическое восстановление происходит во сне. Сжатие сна ради большей продуктивности надёжно контрпродуктивно в долгосрочной перспективе.",
        "**Социальное восстановление:** Подлинная связь с людьми, которые вас заряжают, а не истощают, физиологически восстанавливает."],
      morning:"Утренняя проверка восстановления: по шкале 1–10, насколько отдохнувшим вы себя чувствуете? Позвольте ответу определить план дня.",
      evening:"Вечерний аудит восстановления: что истощило вас сегодня, и что по-настоящему восстановило? Скорректируйте завтра.",
      track:"Что отслеживать: скорость вашего восстановления — как быстро вы возвращаетесь к ощущению ресурсности после требовательного периода."
    },
    es:{
      assessment:"La recuperación es la mitad invisible del rendimiento — es donde realmente ocurren la adaptación, la integración y el crecimiento. La mayoría de las personas tratan la recuperación como pasiva cuando la recuperación efectiva es activa y estructurada.",
      protocol:["**Días de descarga estratégica:** Incluye al menos un día genuinamente de baja exigencia en cada semana — no solo menos ejercicio, sino genuinamente menor demanda cognitiva y emocional.",
        "**Protocolo post-esfuerzo:** Después de un esfuerzo físico o cognitivo intenso: 5–10 minutos de movimiento suave, seguido de respiración lenta. Esto cierra deliberadamente el bucle de respuesta al estrés.",
        "**El sueño como prioridad de recuperación:** Toda la recuperación física ocurre durante el sueño. Comprimir el sueño para hacer más es consistentemente contraproducente.",
        "**Recuperación social:** La conexión genuina con personas que te energizan en lugar de agotarte es fisiológicamente restauradora."],
      morning:"Check-in matutino de recuperación: en una escala del 1–10, ¿cómo de restaurado te sientes? Deja que la respuesta informe la planificación del día.",
      evening:"Auditoría nocturna de recuperación: ¿qué te agotó hoy y qué te restauró genuinamente? Ajusta mañana en consecuencia.",
      track:"Qué notar: tu tasa de recuperación — qué tan rápido regresas a sentirte con recursos después de un período exigente."
    },
    it:{
      assessment:"Il recupero è la metà invisibile delle prestazioni — è dove avvengono realmente adattamento, integrazione e crescita. La maggior parte delle persone tratta il recupero come passivo quando un recupero efficace è attivo e strutturato.",
      protocol:["**Giorni di scarico strategico:** Inserisci almeno un giorno genuinamente a bassa richiesta in ogni settimana — non solo meno esercizio, ma genuinamente minore richiesta cognitiva ed emotiva.",
        "**Protocollo post-sforzo:** Dopo uno sforzo fisico o cognitivo intenso: 5–10 minuti di movimento dolce, seguito da respirazione lenta. Questo chiude deliberatamente il loop di risposta allo stress.",
        "**Il sonno come priorità di recupero:** Tutto il recupero fisico avviene durante il sonno. Comprimere il sonno per fare di più è costantemente controproducente.",
        "**Recupero sociale:** La connessione genuina con persone che ti energizzano piuttosto che prosciugarti è fisiologicamente rigenerante."],
      morning:"Check-in mattutino di recupero: su una scala da 1–10, quanto ti senti ristabilito? Lascia che la risposta informi la pianificazione della giornata.",
      evening:"Audit serale di recupero: cosa ti ha esaurito oggi e cosa ti ha genuinamente ristabilito? Adatta domani di conseguenza.",
      track:"Cosa notare: il tuo tasso di recupero — quanto velocemente ritorni a sentirti con risorse dopo un periodo impegnativo."
    },
    he:{
      assessment:"התאוששות היא המחצית הבלתי נראית של ביצועים — זה המקום שבו ההסתגלות, האינטגרציה והצמיחה מתרחשות באמת. רוב האנשים מתייחסים להתאוששות כפסיבית כאשר התאוששות יעילה היא פעילה ומובנית.",
      protocol:["**ימי פריקה אסטרטגיים:** שלב לפחות יום אחד של דרישה נמוכה אמיתית בכל שבוע — לא רק פחות פעילות גופנית, אלא דרישה קוגניטיבית ורגשית נמוכה אמיתית.",
        "**פרוטוקול לאחר מאמץ:** לאחר מאמץ פיזי או קוגניטיבי אינטנסיבי: 5–10 דקות של תנועה עדינה, ואחריה נשימה איטית. זה סוגר באופן מכוון את לולאת תגובת הלחץ.",
        "**שינה כעדיפות להתאוששות:** כל ההתאוששות הפיזית מתרחשת במהלך השינה. דחיסת שינה כדי לעשות יותר היא עקבית לא פרודוקטיבית.",
        "**התאוששות חברתית:** קשר אמיתי עם אנשים שממלאים אותך ולא מרוקנים אותך הוא משחזר מבחינה פיזיולוגית."],
      morning:"בדיקת בוקר להתאוששות: בסולם 1–10, כמה משוחזר אתה מרגיש? תן לתשובה להנחות את תכנון היום.",
      evening:"ביקורת ערב להתאוששות: מה ריקן אותך היום ומה משחזר אותך באמת? התאם מחר בהתאם.",

const BIOHACK_AREAS=['sleep','focus','energy','stress','recovery','circadian'];

function generateBiohack(areaIdx,lang,depth=2){
  const area=BIOHACK_AREAS[areaIdx]||'sleep';
  const pool=BIOHACK_POOL[area];
  const d=pool[lang]||pool.en;
  if(depth===1){
    return{assessment:applyDepth(d.assessment,1),protocol:[d.protocol[0]],morning:d.morning,evening:d.evening,track:d.track};
  }
  if(depth===3){
    return{...d,protocol:d.protocol,synthesis:`**Expert integration:** The ${area} protocols above represent the highest-leverage, evidence-supported entry points for this domain. For maximum impact, implement one protocol at a time for 7–10 days before adding the next. Sustainable change is built sequentially, not simultaneously.`};
  }
  return{...d,protocol:d.protocol.slice(0,3)};
}
function coachReply(id,lang,idx){
  const c=COACHES.find(x=>x.id===id);
  if(!c)return'...';
  const r=c.responses[lang in c.responses?lang:'en'];
  return r[idx%r.length];
}

function getAstroReading(mode,lang){
  const pool=ASTRO_POOL[mode]||ASTRO_POOL.natal;
  return pick(pool[lang]||pool.en);
}

/* ═══════════════ VALIDATION UTILITIES ═══════════════════════════════════ */
function validateDOB(v){
  if(!v||!v.trim())return{ok:false,err:'Required'};
  const m=v.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
  if(!m)return{ok:false,err:'Format: DD.MM.YYYY'};
  const d=+m[1],mo=+m[2],y=+m[3];
  if(y<1900||y>2025)return{ok:false,err:'Year must be 1900–2025'};
  if(mo<1||mo>12)return{ok:false,err:'Invalid month (01–12)'};
  const maxD=[31,y%4===0&&(y%100!==0||y%400===0)?29:28,31,30,31,30,31,31,30,31,30,31][mo-1];
  if(d<1||d>maxD)return{ok:false,err:`Day must be 01–${maxD} for this month`};
  return{ok:true,err:''};
}
function validateTime(v){
  if(!v||!v.trim())return{ok:true,err:''};
  if(!/^\d{1,2}:\d{2}$/.test(v.trim()))return{ok:false,err:'Format: HH:MM (e.g. 14:30)'};
  const[h,m]=v.split(':').map(Number);
  if(h>23)return{ok:false,err:'Hour must be 00–23'};
  if(m>59)return{ok:false,err:'Minute must be 00–59'};
  return{ok:true,err:''};
}

    };
    prefix=prefixes[lang]||prefixes.en;
  }else if(mode==='transit'){
    const d=new Date();
    const locale={en:'en',ru:'ru',es:'es',it:'it',he:'he-IL'};
    const dateStr=d.toLocaleDateString(locale[lang]||'en',{month:'long',year:'numeric'});
    const prefixes={
      en:`Current transits for ${name||'your chart'} ${zodiac?`(${zodiac})`:''} as of ${dateStr}:\n\n`,

      es:`Tránsitos actuales para ${name||'tu carta'} ${zodiac?`(${zodiac})`:''} a fecha ${dateStr}:\n\n`,

      he:`מעברים נוכחיים עבור ${name||'הגרף שלך'} ${zodiac?`(${zodiac})`:''} נכון ל-${dateStr}:\n\n`
    };
    prefix=prefixes[lang]||prefixes.en;
  }else if(mode==='solar'){
    const prefixes={
      en:`Solar Return for ${name||'you'} ${zodiac?`(${zodiac}) `:''}this solar year:\n\n`,

function CoachAvatarFull({coach,size=88}){
  const svg=PORTRAITS[coach.id];
  return(
    <div className="coach-avatar" style={{width:size,height:size,'--accent':coach.color,
      boxShadow:`0 0 0 3px ${coach.color}44, 0 8px 28px rgba(0,0,0,.4)`}}>
      {svg||<span style={{fontFamily:'var(--font-d)',fontSize:size*.32,color:coach.color,fontWeight:600}}>
        {(coach.name.en||'').split(' ').map(w=>w[0]).join('').slice(0,2)}
      </span>}
      <div className="coach-avatar-status"/>
    </div>
  );
}

/* ═══════════════ NAV ═══════════════════════════════════════════════════ */
function Nav({lang,setLang,theme,setTheme,layer,setLayer,setView,depth,setDepth,user,onAuthOpen,onLogout,onProfileOpen}){
  const t=T[lang];
  const langs=['en','ru','es','it','he'];
  const [scrolled,setScrolled]=useState(false);
  const [langOpen,setLangOpen]=useState(false);
  const [drawerOpen,setDrawerOpen]=useState(false);
  const [userOpen,setUserOpen]=useState(false);
  useEffect(()=>{
    const h=()=>setScrolled(window.scrollY>20);
    window.addEventListener('scroll',h,{passive:true});
    return()=>window.removeEventListener('scroll',h);
  },[]);
  useEffect(()=>{
    if(drawerOpen)document.body.classList.add('drawer-open');
    else document.body.classList.remove('drawer-open');
    return()=>document.body.classList.remove('drawer-open');
  },[drawerOpen]);
  function navTo(id){setLayer(id);setView('home');updateOrbs(id);setDrawerOpen(false);}
  const drawerLabel={en:'Menu',ru:'Меню',es:'Menú',it:'Menu',he:'תפריט'}[lang]||'Menu';
  const themeLabel={en:'Theme',ru:'Тема',es:'Tema',it:'Tema',he:'ערכת נושא'}[lang]||'Theme';
  const langLabel={en:'Language',ru:'Язык',es:'Idioma',it:'Lingua',he:'שפה'}[lang]||'Language';
  return(
    <>
    <nav className={`topnav${scrolled?' scrolled':''}`}>
      <div className="nav-logo" onClick={()=>{setLayer('coach');setView('home');}}>
        <div className="nav-logo-mark">L</div>
        <div>
          <div className="nav-logo-text">LifeForge<em style={{fontStyle:'italic',color:'var(--gold)'}}>·</em>AI</div>
          <div className="nav-logo-sub">Human Potential System</div>
        </div>
      </div>
      {/* Desktop controls — hidden on mobile via CSS */}
      <div className="nav-controls" style={{direction:'ltr',gap:6,alignItems:'center',flexWrap:'nowrap'}}>
        {[
          {id:'coach',label:t.nav_coaches},
          {id:'esoteric',label:t.nav_esoteric},
          {id:'svarga',label:t.nav_svarga}
        ].map(({id,label})=>(
          <button key={id} className={`nav-lang${layer===id?' active':''}`}
            onClick={()=>{setLayer(id);setView('home');updateOrbs(id);}}>
            {label}
          </button>
        ))}
        <div style={{position:'relative'}}>
          <button className={`nav-lang${langOpen?' active':''}`} onClick={()=>setLangOpen(o=>!o)}>
            {lang.toUpperCase()} ▾

/* ═══════════════ STAR RATING ════════════════════════════════════════════ */
function StarRating({rating}){
  const stars=[];
  for(let i=1;i<=5;i++){
    const fill=Math.min(1,Math.max(0,rating-i+1));
    stars.push(
      <span key={i} style={{position:'relative',display:'inline-block',color:'var(--border-md)',fontSize:'1rem',lineHeight:1}}>
        ★
        <span style={{position:'absolute',left:0,top:0,overflow:'hidden',
          width:`${fill*100}%`,color:'var(--gold)',whiteSpace:'nowrap'}}>★</span>
      </span>
    );
  }
  return <span style={{display:'inline-flex',gap:1}}>{stars}</span>;
}

function ChatInterface({coach,lang,onBack}){
  const t=T[lang];

  const coachName=coach.name[lang]||coach.name.en;
  const greetings={
    en:`Hello. I'm ${coachName}. I'm here to support your growth. What's on your mind today?`,
    ru:`Здравствуйте. Я ${coachName}. Чем могу вам помочь сегодня?`,
    es:`Hola. Soy ${coachName}. Estoy aquí para apoyar tu crecimiento. ¿Qué tienes en mente hoy?`,
    it:`Ciao. Sono ${coachName}. Sono qui per supportare la tua crescita. Cosa hai in mente oggi?`,
    he:`שלום. אני ${coachName}. אני כאן לתמוך בצמיחה שלך. מה עולה לך בראש היום?`
  };
  const greeting=greetings[lang]||greetings.en;
  const [msgs,setMsgs]=useState([{role:'coach',text:greeting}]);
  const [input,setInput]=useState('');
  const [typing,setTyping]=useState(false);
  const [idx,setIdx]=useState(0);
  const msgsRef=useRef(null);
  useEffect(()=>{
    if(msgsRef.current)msgsRef.current.scrollTop=msgsRef.current.scrollHeight;
  },[msgs,typing]);

  function send(){
    const txt=input.trim();
    if(!txt||typing)return;
    setInput('');
    setMsgs(m=>[...m,{role:'user',text:txt}]);
    setTyping(true);
    setTimeout(()=>{
      setMsgs(m=>[...m,{role:'coach',text:coachReply(coach.id,lang,idx)}]);
      setIdx(i=>i+1);
      setTyping(false);
    },1200+Math.random()*700);
  }
  function newSession(){
    setMsgs([{role:'coach',text:greeting}]);
    setIdx(0);
  }
  return(
    <div className="detail-page" style={{display:'flex',flexDirection:'column',paddingTop:80}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
        <button className="detail-back" style={{marginBottom:0}} onClick={onBack}>← {t.chat_back}</button>
        <div style={{flex:1}}/>
        <button className="btn-g" style={{padding:'7px 16px',fontSize:'.68rem'}} onClick={newSession}>{t.chat_new_session}</button>
      </div>
      <div className="glass chat-wrap" style={{'--accent':coach.color}}>
        {/* header */}
        <div className="chat-header">
          <CoachAvatarFull coach={coach} size={44}/>
          <div className="chat-header-info">
            <div className="chat-header-name">{name}</div>
            <div className="chat-header-status">
              <span className="chat-status-dot"/>
              {t.chat_online}
            </div>
          </div>
        </div>
        {/* messages */}
        <div className="chat-msgs" ref={msgsRef}>
          {msgs.map((m,i)=>(
            <div key={i} className={`msg ${m.role}`}>
              {m.role==='coach'&&<CoachAvatarFull coach={coach} size={32}/>}
              <div className="msg-bubble">{renderMD(m.text)}</div>
            </div>
          ))}
          {typing&&(
            <div className="typing-indicator">
              <span/><span/><span/>
            </div>
          )}
        </div>
        {/* input */}
        <div className="chat-input-row">
          <textarea className="chat-input" rows={1} value={input}
            onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}
            placeholder={t.chat_placeholder}/>
          <button className="chat-send" onClick={send} disabled={!input.trim()||typing}>
            {t.chat_send}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════ SEGMENTED DATE INPUT ══════════════════════════════════ */
function DateInput({value,onChange,lang}){
  const r0=useRef(null),r1=useRef(null),r2=useRef(null);
  const refs=[r0,r1,r2];
  const L={en:['DD','MM','YYYY'],ru:['ДД','ММ','ГГГГ'],es:['DD','MM','AAAA'],it:['GG','MM','AAAA'],he:['DD','MM','YYYY']}[lang]||['DD','MM','YYYY'];
  const parse=v=>{
    if(v&&/^\d{2}\.\d{2}\.\d{4}$/.test(v)){const[a,b,c]=v.split('.');return[a,b,c];}
    return['','',''];
  };
  const [pts,setPts]=useState(()=>parse(value));
  const [foc,setFoc]=useState([false,false,false]);
  useEffect(()=>{setPts(parse(value));},[value]);
  function emit(p){
    if(p[0].length===2&&p[1].length===2&&p[2].length===4)onChange(p[0]+'.'+p[1]+'.'+p[2]);
    else onChange('');
  }
  function handleChange(i,maxLen,e){
    const v=e.target.value.replace(/\D/g,'').slice(0,maxLen);
    const next=[...pts];next[i]=v;setPts(next);emit(next);
    if(v.length===maxLen&&refs[i+1]?.current)refs[i+1].current.focus();
  }
  function handleKey(i,e){
    if(e.key==='Backspace'&&pts[i]===''&&i>0)refs[i-1].current?.focus();
    if(e.key==='ArrowRight'&&i<2)refs[i+1].current?.focus();
    if(e.key==='ArrowLeft'&&i>0)refs[i-1].current?.focus();
  }
  function handlePaste(e){
    const t=e.clipboardData.getData('text');
    const m=t.match(/(\d{1,2})[.\-\/](\d{1,2})[.\-\/](\d{2,4})/);
    if(m){e.preventDefault();const d=m[1].padStart(2,'0'),mo=m[2].padStart(2,'0'),y=m[3].length===2?'20'+m[3]:m[3];const p=[d,mo,y];setPts(p);onChange(d+'.'+mo+'.'+y);refs[2].current?.focus();}
  }
  const seg=(i)=>({flex:i===2?2:1,minWidth:0});
  const inp=(active)=>({width:'100%',padding:'11px 6px',background:'var(--surface-2)',
    border:`1px solid ${active?'var(--gold)':'var(--border-md)'}`,borderRadius:8,
    color:'var(--text-1)',fontSize:16,outline:'none',textAlign:'center',fontFamily:'var(--font-b)',
    caretColor:'var(--gold)',transition:'border-color .2s,box-shadow .2s',
    boxShadow:active?'0 0 0 3px rgba(212,178,122,.12)':'none'});
  const dot={color:'var(--text-3)',fontSize:'1.1rem',padding:'0 3px',lineHeight:'44px',flexShrink:0,userSelect:'none'};
  return(
    <div style={{display:'flex',gap:0,alignItems:'center'}} onPaste={handlePaste}>
      {[0,1,2].map(i=>(
        <React.Fragment key={i}>
          {i>0&&<span style={dot}>·</span>}
          <div style={seg(i)}>
            <input ref={refs[i]} value={pts[i]}
              onChange={e=>handleChange(i,[2,2,4][i],e)}
              onKeyDown={e=>handleKey(i,e)}
              onFocus={e=>{setFoc(f=>{const n=[...f];n[i]=true;return n;});e.target.select();}}
              onBlur={()=>setFoc(f=>{const n=[...f];n[i]=false;return n;})}
              inputMode="numeric" maxLength={[2,2,4][i]}
              placeholder={L[i]} style={inp(foc[i])}/>
          </div>
        </React.Fragment>
      ))}

/* ═══════════════ SEGMENTED TIME INPUT ══════════════════════════════════ */
function TimeInput({value,onChange,lang}){
  const r0=useRef(null),r1=useRef(null);
  const refs=[r0,r1];
  const PH={en:['HH','MM'],ru:['ЧЧ','ММ'],es:['HH','MM'],it:['OO','MM'],he:['שש','דד']}[lang]||['HH','MM'];
  const parse=v=>{
    if(v&&/^\d{2}:\d{2}$/.test(v)){const[h,m]=v.split(':');return[h,m];}
    return['',''];
  };
  const [pts,setPts]=useState(()=>parse(value));
  const [foc,setFoc]=useState([false,false]);
  useEffect(()=>{setPts(parse(value));},[value]);
  function emit(p){if(p[0].length===2&&p[1].length===2)onChange(p[0]+':'+p[1]);else onChange('');}
  function handleChange(i,e){
    const v=e.target.value.replace(/\D/g,'').slice(0,2);
    const next=[...pts];next[i]=v;setPts(next);emit(next);
    if(v.length===2&&i===0)refs[1].current?.focus();
  }
  function handleKey(i,e){
    if(e.key==='Backspace'&&pts[i]===''&&i>0)refs[0].current?.focus();
    if(e.key==='ArrowRight'&&i===0)refs[1].current?.focus();
    if(e.key==='ArrowLeft'&&i===1)refs[0].current?.focus();
  }
  const inp=(active)=>({width:'100%',padding:'11px 6px',background:'var(--surface-2)',
    border:`1px solid ${active?'var(--gold)':'var(--border-md)'}`,borderRadius:8,
    color:'var(--text-1)',fontSize:16,outline:'none',textAlign:'center',fontFamily:'var(--font-b)',
    caretColor:'var(--gold)',transition:'border-color .2s,box-shadow .2s',
    boxShadow:active?'0 0 0 3px rgba(212,178,122,.12)':'none'});
  const sep={color:'var(--text-3)',fontSize:'1.2rem',padding:'0 4px',lineHeight:'44px',flexShrink:0,fontWeight:500,userSelect:'none'};
  return(
    <div style={{display:'flex',gap:0,alignItems:'center'}}>
      {[0,1].map(i=>(
        <React.Fragment key={i}>
          {i>0&&<span style={sep}>:</span>}
          <div style={{flex:1}}>
            <input ref={refs[i]} value={pts[i]}
              onChange={e=>handleChange(i,e)}
              onKeyDown={e=>handleKey(i,e)}
              onFocus={e=>{setFoc(f=>{const n=[...f];n[i]=true;return n;});e.target.select();}}
              onBlur={()=>setFoc(f=>{const n=[...f];n[i]=false;return n;})}
              inputMode="numeric" maxLength={2}
              placeholder={PH[i]} style={inp(foc[i])}/>
          </div>
        </React.Fragment>
      ))}
    </div>
  );
}

/* ═══════════════ LABELED DATE / TIME FIELDS ════════════════════════════ */
function DateField({label,value,onChange,lang,errFn,required}){
  const [touched,setTouched]=useState(false);
  const err=errFn?errFn(value):(!required||value?'':'Required');
  const invalid=touched&&!!err;
  return(
    <div className="form-field" onBlur={()=>setTouched(true)}>
      <label className="form-label">{label}{required&&<span style={{color:'#C85050',marginLeft:3}}>*</span>}</label>
      <DateInput value={value} onChange={v=>{onChange(v);}} lang={lang}/>
      {invalid&&<p style={{fontSize:'.68rem',color:'#C85050',marginTop:4}}>{err}</p>}
    </div>
  );
}
function TimeField({label,value,onChange,lang}){
  return(
    <div className="form-field">
      <label className="form-label">{label}</label>
      <TimeInput value={value} onChange={onChange} lang={lang}/>
    </div>
  );
}

function Field({label,value,onChange,placeholder,errFn,required,type='text',inputMode}){
  const [touched,setTouched]=useState(false);
  const err=errFn?errFn(value):(!required||value.trim()?'':'Required');
  const invalid=touched&&!!err;
  const isNumeric=placeholder&&(placeholder.includes('DD')||placeholder.includes('ДД')||placeholder.includes('GG')||placeholder.includes('HH'));
  return(
    <div className="form-field">
      <label className="form-label">{label}{required&&<span style={{color:'#C85050',marginLeft:3}}>*</span>}</label>
      <input
        type={type}
        inputMode={inputMode||(isNumeric?'numeric':undefined)}
        value={value}
        onChange={e=>onChange(e.target.value)}
        onBlur={()=>setTouched(true)}
        placeholder={placeholder||'—'}
        style={{width:'100%',padding:'11px 14px',background:'var(--surface-2)',
          border:`1px solid ${invalid?'#C85050':'var(--border-md)'}`,borderRadius:10,
          color:'var(--text-1)',fontSize:'.88rem',outline:'none',fontFamily:'var(--font-b)',
          boxShadow:invalid?'0 0 0 3px rgba(200,80,80,.1)':'none',transition:'border-color .2s,box-shadow .2s'}}/>
      {invalid&&<p style={{fontSize:'.68rem',color:'#C85050',marginTop:4}}>{err}</p>}
    </div>
  );
}

function ArchetypeTool({lang}){
  const t=T[lang];
  const QS=[
    {q:t.arch_q1, opts:t.arch_a1},
    {q:t.arch_q2, opts:t.arch_a2},
    {q:t.arch_q3, opts:t.arch_a3},
  ];
  const [answers,setAnswers]=useState([]);
  const [result,setResult]=useState(null);
  function answer(i){
    const next=[...answers,i];

    if(next.length===3)setResult(scoreArchetype(next));

  if(result) return(
    <div className="archetype-result glass">

    <div className="quiz-q">

        ))}
      </div>
    </div>
  );
}

        "Профиль показывает **Коннектора-Архитектора**: черпает энергию от людей, но лучше работает в одиночестве. Редкий талант — читать невысказанную динамику. Вызов: вы отдаёте так последовательно, что ваши потребности остаются без внимания.",
        "Ваш паттерн — **Суверен**: независимый, самонаправленный, живущий в полную силу при полном владении областью. Вы не сложны — вы точны. Приглашение: привлекайте других к своему видению."],
    es:["Tu perfil revela un patrón de **Visionario-Analista**: intuición estructurada, pensamiento sistémico y una profunda frustración cuando la realidad se mueve más despacio que tu modelo interno. Fortaleza central: hacer legible lo invisible. Borde de crecimiento: soltar la necesidad de conocer la respuesta antes de hacer la pregunta.",
        "El perfil muestra un **Conector-Arquitecto**: obtiene energía de los demás mientras ejecuta mejor solo. Talento inusual para leer dinámicas no expresadas. Desafío: das tan consistentemente que el inventario de tus propias necesidades queda desatendido.",
        "Tu patrón coincide con el **Soberano**: independiente, autodirigido, más vivo cuando se le da plena propiedad de dominio. No eres difícil — eres preciso. La invitación: trae a otros a tu visión en lugar de ejecutarla solo."],
    it:["Il tuo profilo rivela un pattern di **Visionario-Analista**: intuizione strutturata, pensiero sistemico e una profonda frustrazione quando la realtà si muove più lentamente del tuo modello interno. Forza centrale: rendere leggibile l'invisibile. Bordo di crescita: lasciare andare il bisogno di conoscere la risposta prima di fare la domanda.",
        "Il profilo mostra un **Connettore-Architetto**: trae energia dagli altri mentre esegue meglio da solo. Talento insolito per leggere dinamiche non espresse. Sfida: dai così costantemente che l'inventario dei tuoi bisogni viene trascurato.",
        "Il tuo schema corrisponde al **Sovrano**: indipendente, autodiretto, più vivo quando gli viene data piena proprietà del dominio. Non sei difficile — sei preciso. L'invito: porta gli altri nella tua visione piuttosto che eseguirla da solo."],
    he:["הפרופיל שלך מגלה דפוס של **חוזה-אנליסט**: אינטואיציה מובנית, חשיבה מערכתית ותסכול עמוק כאשר המציאות נעה לאט יותר מהמודל הפנימי שלך. חוזק מרכזי: להפוך את הבלתי נראה לקריא. קצה צמיחה: לשחרר את הצורך לדעת את התשובה לפני שאלת השאלה.",
        "הפרופיל מציג **מחבר-אדריכל**: שואב אנרגיה מאחרים בעוד שמבצע בצורה הטובה ביותר לבד. כישרון יוצא דופן לקרוא דינמיקות שלא נאמרות. אתגר: אתה נותן כל כך באופן עקבי שמלאי הצרכים שלך עצמו מוזנח.",

  };
  function getInterpret(){
    return pick(interprets[lang]||interprets.en);
  }
  const [interpretation,setInterpretation]=useState('');
  function reveal(){setInterpretation(getInterpret());setRevealed(true);}
  return(
    <div>
      <div className="slider-stack" style={{marginBottom:20}}>

          <p style={{fontSize:'.88rem',color:'var(--text-2)',lineHeight:1.78}}>{renderMD(interpretation)}</p>
          <button className="btn-g" style={{marginTop:12,fontSize:'.68rem'}} onClick={reveal}>{t.persona_retake}</button>
        </div>
      )}
    </div>
  );
}

   desc:{en:'The most paradoxical tree — covered in thorns yet bearing the most beautiful blossoms. You are the keeper of profound contradictions: sharp and tender, guarded and deeply loving. This complexity is not confusion — it is your greatest source of creative and spiritual power.',ru:'Самое парадоксальное дерево — покрытое шипами, но несущее самые красивые цветы. Вы — хранитель глубоких противоречий: резкие и нежные, закрытые и глубоко любящие.',es:'El árbol más paradójico — cubierto de espinas pero con las flores más hermosas. Eres el guardián de profundas contradicciones: afilado y tierno, guardado y profundamente amoroso.',it:'L\'albero più paradossale — coperto di spine ma con i fiori più belli. Sei il custode di profonde contraddizioni: tagliente e tenero, riservato e profondamente amorevole.',he:'העץ הפרדוקסלי ביותר — מכוסה בקוצים אך נושא את הפרחים היפים ביותר. אתה שומר הסתירות העמוקות: חד ועדין, שמור ואוהב בעומק.'},

   desc:{en:'The king of trees. The Oak person carries the weight of sovereignty — not as burden but as birthright. You were built to endure, to provide shelter for entire ecosystems, and to stand when everything else bends. Your presence alone communicates strength.',ru:'Король деревьев. Личность Дуба несёт бремя суверенитета — не как груз, а как право рождения. Вы были созданы, чтобы выдерживать, давать приют целым экосистемам и стоять, когда всё остальное гнётся.',es:'El rey de los árboles. La persona Roble lleva el peso de la soberanía — no como carga sino como derecho de nacimiento. Fuiste construido para resistir, para dar refugio a ecosistemas enteros.',it:'Il re degli alberi. La persona Quercia porta il peso della sovranità — non come fardello ma come diritto di nascita. Sei stato costruito per resistere, per dare rifugio a interi ecosistemi.',he:'מלך העצים. אדם האלון נושא את משקל הריבונות — לא כנטל אלא כזכות לידה. נבנית לשאת, לספק מחסה לאקוסיסטמות שלמות ולעמוד כשהכל מתכופף.'},

   desc:{en:'Holly was used by ancient warriors and royalty — the evergreen that burns hot even in the darkest winter. You carry a natural authority that is felt before it is understood. You are built for challenge: in your highest expression, the harder the obstacle, the more alive you become.',ru:'Падуб использовался древними воинами и знатью — вечнозелёное растение, горящее жарко даже в самую тёмную зиму. Вы несёте природный авторитет, который ощущается раньше, чем понимается.',es:'El Acebo fue usado por guerreros y realeza antiguos — el perenne que arde incluso en el invierno más oscuro. Llevas una autoridad natural que se siente antes de entenderse.',it:'L\'Agrifoglio fu usato da antichi guerrieri e dalla regalità — il sempreverde che brucia caldo anche nell\'inverno più buio. Porti un\'autorità naturale che si sente prima di essere compresa.',he:'האלה שימשה אצל לוחמים ומלוכה עתיקים — הנצרי שבוער חם אפילו בחורף האפל ביותר. אתה נושא סמכות טבעית שמורגשת לפני שנבינה.'},

   desc:{en:'The Hazel is the tree of the Celtic bard — the keeper of all wisdom and the source of poetic inspiration. You carry an instinctive need to understand, to synthesise, and to translate the deep into the accessible. Your mind is your sacred instrument.',ru:'Лещина — дерево кельтских бардов, хранитель всей мудрости и источник поэтического вдохновения. Вы несёте инстинктивную потребность понимать, синтезировать и переводить глубокое в доступное.',es:'El Avellano es el árbol del bardo celta — el guardián de toda la sabiduría y la fuente de inspiración poética. Llevas una necesidad instintiva de entender, sintetizar y traducir lo profundo en lo accesible.',it:'Il Nocciolo è l\'albero del bardo celtico — il custode di tutta la saggezza e la fonte di ispirazione poetica. Porti un bisogno istintivo di capire, sintetizzare e tradurre il profondo nell\'accessibile.',he:'אגוז הלוז הוא עץ הבּרד הקלטי — שומר כל החכמה ומקור ההשראה השירית. אתה נושא צורך אינסטינקטיבי להבין, לסנתז ולתרגם את העמוק לנגיש.'},

   desc:{en:'The most unpredictable tree — Vine people shift between states with remarkable ease, moving from clarity to mystery, from exuberance to reflection. You carry prophetic gifts: an ability to taste the truth in a situation before the evidence accumulates.',ru:'Самое непредсказуемое дерево — люди Виноградника переключаются между состояниями с поразительной лёгкостью. Вы несёте пророческие дары: способность ощущать истину в ситуации до того, как накапливаются доказательства.',es:'El árbol más impredecible — las personas Vid cambian entre estados con notable facilidad. Llevas dones proféticos: la capacidad de saborear la verdad en una situación antes de que se acumule la evidencia.',it:'L\'albero più imprevedibile — le persone Vite passano tra stati con notevole facilità. Porti doni profetici: la capacità di assaporare la verità in una situazione prima che le prove si accumulino.',he:'העץ הבלתי-צפוי ביותר — אנשי הגפן עוברים בין מצבים בקלות מדהימה. אתה נושא מתנות נבואיות: יכולת לטעום את האמת במצב לפני שהראיות מצטברות.'},

   desc:{en:'Ivy persists where nothing else can — climbing walls, crossing ruins, threading through death to find light. You are the survivor archetype: your tenacity is not stubbornness but a fundamental life-force that simply will not accept limitation as permanent.',ru:'Плющ выживает там, где не может ничто другое — карабкается по стенам, пересекает руины, пробивается через смерть к свету. Вы — архетип выжившего: ваша стойкость — не упрямство, а фундаментальная жизненная сила.',es:'La Hiedra persiste donde nada más puede — trepando muros, cruzando ruinas. Eres el arquetipo del superviviente: tu tenacidad no es terquedad sino una fuerza vital fundamental que simplemente no acepta la limitación como permanente.',it:"L'Edera persiste dove niente altro può — scalando muri, attraversando rovine. Sei l'archetipo del sopravvissuto: la tua tenacia non è testardaggine ma una forza vitale fondamentale.",he:'הקיסוס שורד היכן שאף דבר אחר לא יכול — טיפוס קירות, חצייה חורבות. אתה ארכיטיפ הניצול: עקשנותך אינה עקשנות אלא כוח חיים בסיסי שפשוט לא מקבל הגבלה כקבועה.'},

   desc:{en:'The Reed makes music when hollow — only by surrendering what is unnecessary can it sing. You are the seeker of hidden truths, the one who can hear the melody inside the silence. Your depth of perception is directly proportional to your willingness to release.',ru:'Тростник создаёт музыку, когда полый — только отказавшись от ненужного, он может петь. Вы — искатель скрытых истин, способный слышать мелодию внутри тишины.',es:'El Junco hace música cuando está hueco — solo rendiendo lo innecesario puede cantar. Eres el buscador de verdades ocultas, el que puede escuchar la melodía dentro del silencio.',it:"La Canna fa musica quando è vuota — solo cedendo ciò che è superfluo può cantare. Sei il cercatore di verità nascoste, quello che può sentire la melodia nel silenzio.",he:'הקנה יוצר מוזיקה כשהוא חלול — רק על ידי ויתור על מה שמיותר הוא יכול לשיר. אתה המחפש אמיתות נסתרות, זה שיכול לשמוע את המנגינה בתוך הדממה.'},

function druidTree(dob){
  if(!dob||!/^\d{2}\.\d{2}\.\d{4}$/.test(dob))return null;
  const[d,m]=dob.split('.').map(Number);
  for(const t of DRUID_TREES){
    const[s,e]=t.dates.split('–');
    function parse(str){const p=str.trim().split(' ');const months={Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};return{d:parseInt(p[1]),m:months[p[0]]};}
    const st=parse(s),en=parse(e);
    if(st.m===en.m){if(m===st.m&&d>=st.d&&d<=en.d)return t;}
    else if(st.m<en.m){if((m===st.m&&d>=st.d)||(m>st.m&&m<en.m)||(m===en.m&&d<=en.d))return t;}
    else{if((m===st.m&&d>=st.d)||(m>st.m)||(m<en.m)||(m===en.m&&d<=en.d))return t;}
  }
  return DRUID_TREES[0];
}

function getIChingTheme(n){
  if(n===1)return'heaven';
  if(n===2)return'earth';
  if([29,48,59,60].includes(n))return'water';
  if([30,35,50,55].includes(n))return'fire';
  if([3,16,21,24,25,40,42,51,54,55,62].includes(n))return'thunder';
  if([15,22,23,26,27,31,33,39,52,53,56,62].includes(n))return'mountain';
  if([9,18,28,44,46,48,50,57,59,61].includes(n))return'wind';
  if([10,17,19,28,38,41,43,45,47,49,58,60,61].includes(n))return'lake';
  if(n<=32)return'water';
  return'thunder';
}

function castHexagram(){
  const lines=[];
  for(let i=0;i<6;i++){
    const coins=[Math.random()>.5?3:2,Math.random()>.5?3:2,Math.random()>.5?3:2];
    const sum=coins.reduce((a,b)=>a+b,0);
    lines.push({yang:sum===7||sum===9,changing:sum===6||sum===9});
  }
  const num=Math.floor(Math.random()*64)+1;
  return{lines,num,hex:ICHING_HEX[num-1]};
}

function IChingTool({lang}){
  const t=T[lang];
  const [question,setQuestion]=useState('');
  const [result,setResult]=useState(null);
  const [loading,setLoading]=useState(false);
  function cast(){
    setLoading(true);
    setTimeout(()=>{setResult(castHexagram());setLoading(false);},1800);
  }
  function HexLines({lines}){
    return(
      <div className="hexagram-lines">
        {[...lines].reverse().map((ln,i)=>(
          <div key={i} className={`hex-line${ln.changing?' changing':''}`}>
            {ln.yang
              ?<div className="hex-seg" style={{flex:1}}/>
              :<><div className="hex-seg" style={{flex:1}}/><div style={{width:10}}/><div className="hex-seg" style={{flex:1}}/></>

            {ln.changing&&<span style={{fontSize:9,color:'var(--amber)',marginLeft:4}}>○</span>}
          </div>
        ))}
      </div>
    );
  }
  if(result){
    const h=result.hex;
    const theme=getIChingTheme(result.num);
    const pool=ICHING_INTERP[theme]||ICHING_INTERP.water;
    const interp=pick(pool[lang]||pool.en);

    return(
      <div>
        <div className="iching-card rv">
          <div style={{display:'flex',alignItems:'flex-start',gap:20}}>
            <HexLines lines={result.lines}/>
            <div style={{flex:1}}>
              <div className="iching-num">{t.iching_hexagram} {h[0]}</div>
              <div className="iching-name">{h[2]}</div>
              <div style={{fontSize:'.78rem',color:'var(--text-3)',marginBottom:6}}>{h[1]} · {h[4]}</div>
              <div style={{fontSize:'.72rem',color:'var(--text-3)',letterSpacing:'.08em',fontFamily:'var(--font-b)'}}>{h[3]}</div>
            </div>
          </div>
          {question&&<p style={{fontSize:'.76rem',color:'var(--text-3)',margin:'12px 0 0',fontStyle:'italic',borderTop:'1px solid var(--border)',paddingTop:10}}>"{question}"</p>}
        </div>
        <div style={{background:'var(--surface-2)',border:'1px solid rgba(212,178,122,.15)',borderRadius:12,padding:'18px 20px',marginTop:14}}>
          <div className="eyebrow" style={{color:'var(--gold)',marginBottom:10}}>☯ {h[2]}</div>
          <p style={{fontSize:'.86rem',color:'var(--text-2)',lineHeight:1.78,margin:0}}>{renderMD(interp)}</p>
        </div>
        {changingCount>0&&(
          <div style={{background:'var(--surface-2)',border:'1px solid rgba(200,148,110,.2)',borderRadius:10,padding:'14px 18px',marginTop:10}}>
            <div style={{fontSize:'.65rem',letterSpacing:'.15em',textTransform:'uppercase',color:'var(--amber)',marginBottom:6}}>{t.iching_changing} ({changingCount})</div>
            <p style={{fontSize:'.80rem',color:'var(--text-3)',lineHeight:1.65,margin:0}}>
              {lang==='ru'?'Меняющиеся черты указывают на линии активной трансформации — энергии в движении внутри вашей ситуации. Где неустойчивость присутствует, там и скрыта наибольшая возможность.':
               lang==='es'?'Las líneas cambiantes indican líneas de transformación activa — energía en movimiento dentro de tu situación. Donde hay inestabilidad, también reside la mayor oportunidad.':
               lang==='it'?'Le linee mutanti indicano linee di trasformazione attiva — energia in movimento nella vostra situazione. Dove c\'è instabilità, risiede anche la maggiore opportunità.':
               lang==='he'?'הקווים המשתנים מציינים קווים של טרנספורמציה פעילה — אנרגיה בתנועה בתוך המצב שלך. היכן שיש חוסר יציבות, גם טמונה הזדמנות הגדולה ביותר.':
               'Changing lines indicate active transformation — energy in motion within your situation. Where instability is present, the greatest opportunity also resides.'}
            </p>
          </div>
        )}
        <button className="btn-g" style={{width:'100%',justifyContent:'center',marginTop:14}} onClick={()=>setResult(null)}>{t.iching_again}</button>
      </div>
    );
  }
  return(
    <form onSubmit={e=>{e.preventDefault();if(!loading)cast();}}>
      <p style={{fontSize:'.84rem',color:'var(--text-3)',marginBottom:16,lineHeight:1.65}}>

         lang==='es'?'Concéntrese en su pregunta o situación. Las monedas se lanzarán seis veces para formar su hexagrama.':
         lang==='it'?'Concentratevi sulla vostra domanda o situazione. Le monete verranno lanciate sei volte per formare il vostro esagramma.':
         lang==='he'?'התמקד בשאלה או במצב שלך. המטבעות יוטלו שש פעמים ליצירת ההקסגרמה שלך.':
         'Focus on your question or situation. The coins will be cast six times to form your hexagram.'}

      <Field label={t.iching_question} value={question} onChange={setQuestion}/>
      <button type="submit" className="cta-btn" style={{width:'100%',justifyContent:'center',marginTop:14,
