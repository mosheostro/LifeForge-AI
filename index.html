  terms:{
    title:{en:'Terms of Service',ru:'Условия использования',es:'Términos de Servicio',it:'Termini di Servizio',he:'תנאי שירות'},
    body:{
      en:`**Acceptance of Terms**\nBy accessing or using LifeForge AI, you agree to be bound by these Terms of Service. If you do not agree, please do not use the platform.\n\n**Description of Service**\nLifeForge AI provides an AI-powered personal development platform including coaching simulations, esoteric analysis tools, and wellness guidance systems. All content is for informational and entertainment purposes only.\n\n**Disclaimer**\nThe content generated by our AI systems — including astrological readings, numerological analyses, coaching responses, and wellness guidance — is for informational and educational purposes only. It does not constitute professional advice (medical, psychological, legal, or financial). Always consult qualified professionals for decisions affecting your health, relationships, or finances.\n\n**Intellectual Property**\nAll platform content, design, and code are the property of LifeForge AI. Unauthorised reproduction is prohibited.\n\n**Limitation of Liability**\nLifeForge AI shall not be liable for any indirect, incidental, or consequential damages arising from the use of this platform.\n\n**Governing Law**\nThese Terms are governed by applicable international digital service laws and the laws of the jurisdiction in which the platform operator is registered.\n\nLast updated: May 2025`,
      ru:`**Принятие условий**\nПолучая доступ к LifeForge AI или используя платформу, вы соглашаетесь с настоящими Условиями использования.\n\n**Описание услуги**\nLifeForge AI предоставляет платформу персонального развития на базе ИИ, включая коучинг-симуляции, инструменты эзотерического анализа и системы велнес-консультирования. Весь контент предназначен только для информационных и образовательных целей.\n\n**Отказ от ответственности**\nКонтент, генерируемый нашими системами ИИ, включая астрологические расклады, нумерологические анализы и консультации по велнесу, предназначен исключительно для информационных целей и не является профессиональной консультацией.\n\nПоследнее обновление: май 2025`,
      es:`**Aceptación de los Términos**\nAl acceder o usar LifeForge AI, acepta estar sujeto a estos Términos de Servicio.\n\n**Descripción del Servicio**\nLifeForge AI proporciona una plataforma de desarrollo personal impulsada por IA. Todo el contenido es solo para fines informativos y educativos.\n\n**Descargo de responsabilidad**\nEl contenido generado no constituye asesoramiento profesional médico, psicológico, legal o financiero.\n\nÚltima actualización: mayo 2025`,
      it:`**Accettazione dei Termini**\nAccedendo o utilizzando LifeForge AI, accetti di essere vincolato da questi Termini di Servizio.\n\n**Descrizione del Servizio**\nLifeForge AI fornisce una piattaforma di sviluppo personale basata sull'IA. Tutti i contenuti sono solo a scopo informativo ed educativo.\n\nUltimo aggiornamento: maggio 2025`,
      he:`**קבלת תנאים**\nבגישה לשימוש ב-LifeForge AI, אתה מסכים להיות מחויב לתנאי שירות אלה.\n\n**תיאור השירות**\nLifeForge AI מספקת פלטפורמת פיתוח אישי מבוססת בינה מלאכותית. כל התוכן הוא למטרות מידע וחינוך בלבד.\n\nעדכון אחרון: מאי 2025`

  cookies:{
    title:{en:'Cookie Policy',ru:'Политика Cookies',es:'Política de Cookies',it:'Informativa sui Cookie',he:'מדיניות עוגיות'},
    body:{
      en:`**What Are Cookies**\nCookies are small text files placed on your device to help us understand how you use our platform.\n\n**Cookies We Use**\nLifeForge AI is a client-side application. We use minimal, essential cookies only — primarily for theme and language preferences stored in your browser's local storage. We do not use tracking, advertising, or third-party analytics cookies.\n\n**Your Choices**\nYou can clear local storage at any time through your browser settings. Doing so will reset your preferences.\n\n**GDPR Compliance**\nAs we use only essential functional storage, explicit consent banners are not required under GDPR Article 5(1)(f). However, we are committed to full transparency.\n\nLast updated: May 2025`,
      ru:`**Что такое Cookies**\nCookies — небольшие текстовые файлы, сохраняемые на вашем устройстве.\n\n**Какие Cookies мы используем**\nLifeForge AI использует только необходимые функциональные cookies для хранения языковых предпочтений и темы оформления.\n\n**Соответствие GDPR**\nПоскольку мы используем только необходимые функциональные хранилища, явное согласие в соответствии со статьёй 5(1)(f) GDPR не требуется.\n\nПоследнее обновление: май 2025`,
      es:`**Cookies que usamos**\nLifeForge AI usa solo cookies esenciales para preferencias de idioma y tema. No utilizamos cookies de seguimiento ni publicidad.\n\nÚltima actualización: mayo 2025`,
      it:`**Cookie che utilizziamo**\nLifeForge AI utilizza solo cookie essenziali per le preferenze di lingua e tema.\n\nUltimo aggiornamento: maggio 2025`,
      he:`**עוגיות שבהן אנו משתמשים**\nLifeForge AI משתמשת רק בעוגיות חיוניות להעדפות שפה ועיצוב.\n\nעדכון אחרון: מאי 2025`

    body:{
      en:`**General Information Only**\nAll content on LifeForge AI — including AI-generated coaching responses, astrological readings, numerological analyses, archetype profiles, and wellness recommendations — is provided for informational, educational, and entertainment purposes only.\n\n**Not Professional Advice**\nNothing on this platform constitutes medical, psychological, psychiatric, legal, financial, or any other form of professional advice. The AI systems used by LifeForge AI are language models that generate responses based on patterns — they do not have access to professional certifications, your medical history, or live astrological data.\n\n**Consult Professionals**\nBefore making any significant life decision — health-related, financial, relationship, or otherwise — please consult a qualified professional in the relevant field.\n\n**No Liability**\nLifeForge AI accepts no responsibility or liability for decisions made based on platform content.\n\nLast updated: May 2025`,
      ru:`**Только общая информация**\nВесь контент на LifeForge AI — включая ответы коучей ИИ, астрологические расклады, нумерологические анализы и велнес-рекомендации — предоставляется исключительно в информационных, образовательных и развлекательных целях.\n\n**Не является профессиональной консультацией**\nНичто на этой платформе не является медицинской, психологической, юридической или финансовой консультацией.\n\n**Проконсультируйтесь со специалистами**\nПрежде чем принимать важные жизненные решения, пожалуйста, проконсультируйтесь с квалифицированным специалистом.\n\nПоследнее обновление: май 2025`,
      es:`Todo el contenido en LifeForge AI es solo para fines informativos y educativos. No constituye asesoramiento profesional médico, psicológico, legal o financiero.\n\nÚltima actualización: mayo 2025`,
      it:`Tutti i contenuti su LifeForge AI sono solo a scopo informativo. Non costituiscono consulenza professionale.\n\nUltimo aggiornamento: maggio 2025`,

  data_protection:{
    title:{en:'Data Protection (GDPR)',ru:'Защита Данных (GDPR)',es:'Protección de Datos (RGPD)',it:'Protezione dei Dati (GDPR)',he:'הגנת מידע (GDPR)'},
    body:{
      en:`**Your Rights Under GDPR**\nIf you are located in the European Economic Area (EEA), you have the following rights regarding your personal data:\n\n**Right of Access**\nYou may request a copy of the personal data we hold about you at any time, free of charge.\n\n**Right to Rectification**\nIf your personal data is inaccurate or incomplete, you have the right to request correction.\n\n**Right to Erasure ("Right to be Forgotten")**\nYou may request that we delete your personal data where there is no compelling reason for us to continue processing it.\n\n**Right to Restriction of Processing**\nYou may request that we restrict how we process your data in certain circumstances.\n\n**Right to Data Portability**\nYou have the right to receive your personal data in a structured, machine-readable format and to transmit it to another controller.\n\n**Right to Object**\nYou have the right to object to processing of your personal data based on our legitimate interests.\n\n**How We Process Your Data**\nLifeForge AI processes data entered into our tools (names, dates of birth, locations) exclusively within your browser session. This data is not transmitted to our servers or stored persistently unless you create an account. We use no third-party advertising networks.\n\n**Legal Basis for Processing**\nWe process your data under Article 6(1)(a) GDPR — your explicit consent, given when you enter data into our tools.\n\n**Data Transfers**\nAll processing occurs client-side. No international data transfers take place.\n\n**Supervisory Authority**\nIf you believe your data protection rights have been violated, you have the right to lodge a complaint with your national data protection supervisory authority.\n\n**Contact for Data Requests**\nTo exercise any of your rights, contact us at: moshe.svarga@gmail.com\nPlease include "GDPR DATA REQUEST" in the subject line.\n\nLast updated: May 2025`,
      ru:`**Ваши права по GDPR**\nЕсли вы находитесь в Европейской экономической зоне (ЕЭЗ), вы имеете следующие права в отношении ваших персональных данных:\n\n**Право на доступ**\nВы можете запросить копию ваших персональных данных, которые мы храним, бесплатно.\n\n**Право на исправление**\nЕсли ваши данные неточны или неполны, вы можете запросить их исправление.\n\n**Право на удаление ("Право быть забытым")**\nВы можете запросить удаление ваших персональных данных, если нет веских оснований для их дальнейшей обработки.\n\n**Право на переносимость данных**\nВы имеете право получить ваши данные в структурированном машиночитаемом формате.\n\n**Как мы обрабатываем данные**\nLifeForge AI обрабатывает данные, введённые в наши инструменты, исключительно в сессии вашего браузера. Данные не передаются на наши серверы.\n\n**Контакт для запросов данных**\nmoshe.svarga@gmail.com — укажите "ЗАПРОС ДАННЫХ GDPR" в теме письма.\n\nПоследнее обновление: май 2025`,
      es:`**Sus Derechos bajo el RGPD**\n\n**Derecho de Acceso**\nPuede solicitar una copia de sus datos personales en cualquier momento.\n\n**Derecho de Rectificación**\nPuede solicitar la corrección de datos inexactos.\n\n**Derecho de Supresión**\nPuede solicitar la eliminación de sus datos personales.\n\n**Derecho a la Portabilidad**\nTiene derecho a recibir sus datos en formato legible por máquina.\n\n**Contacto**\nmoshe.svarga@gmail.com — incluya "SOLICITUD RGPD" en el asunto.\n\nÚltima actualización: mayo 2025`,
      it:`**I Suoi Diritti ai Sensi del GDPR**\n\n**Diritto di Accesso**\nPuoi richiedere una copia dei tuoi dati personali in qualsiasi momento.\n\n**Diritto di Rettifica**\nPuoi richiedere la correzione di dati inesatti.\n\n**Diritto alla Cancellazione**\nPuoi richiedere la cancellazione dei tuoi dati personali.\n\n**Diritto alla Portabilità**\nHai il diritto di ricevere i tuoi dati in formato leggibile da macchina.\n\n**Contatto**\nmoshe.svarga@gmail.com — includi "RICHIESTA GDPR" nell'oggetto.\n\nUltimo aggiornamento: maggio 2025`,
      he:`**זכויותיך תחת GDPR**\n\n**זכות גישה**\nתוכל לבקש עותק של הנתונים האישיים שלך בכל עת.\n\n**זכות לתיקון**\nתוכל לבקש תיקון של נתונים שגויים.\n\n**זכות למחיקה**\nתוכל לבקש מחיקת הנתונים האישיים שלך.\n\n**זכות לניידות נתונים**\nיש לך זכות לקבל את הנתונים שלך בפורמט קריא מכונה.\n\n**יצירת קשר**\nmoshe.svarga@gmail.com — ציין "בקשת GDPR" בשורת הנושא.\n\nעדכון אחרון: מאי 2025`
    }
  },
  accessibility:{
    title:{en:'Accessibility Statement',ru:'Заявление о Доступности',es:'Declaración de Accesibilidad',it:'Dichiarazione di Accessibilità',he:'הצהרת נגישות'},
    body:{
      en:`**Our Commitment**\nLifeForge AI is committed to ensuring digital accessibility for people with disabilities. We continually improve the user experience for everyone and apply relevant accessibility standards.\n\n**Conformance Status**\nWe aim to conform to the Web Content Accessibility Guidelines (WCAG) 2.1 Level AA. These guidelines explain how to make web content more accessible to people with disabilities.\n\n**Measures We Take**\n- High-contrast theming with dark and light mode options\n- Semantic HTML structure for screen reader compatibility\n- Keyboard navigation support throughout the platform\n- Clear focus indicators on interactive elements\n- Sufficient colour contrast ratios for text and UI components\n- Text scaling support — the interface adapts to browser font size settings\n- RTL (right-to-left) language support for Hebrew users\n\n**Known Limitations**\nSome of our AI-generated content and complex visualisations may not be fully accessible. We are actively working to address these limitations.\n\n**Compatibility**\nLifeForge AI is designed to be compatible with the following assistive technologies:\n- Screen readers (NVDA, JAWS, VoiceOver)\n- Keyboard-only navigation\n- Browser zoom up to 200%\n\n**Feedback & Contact**\nWe welcome your feedback on the accessibility of LifeForge AI. If you experience accessibility barriers, please contact us:\n\nmoshe.svarga@gmail.com\n\nPlease include "ACCESSIBILITY" in the subject line. We aim to respond within 5 business days.\n\n**Formal Complaints**\nIf you are not satisfied with our response, you may contact your relevant national equality body or disability rights organisation.\n\nLast updated: May 2025`,
      ru:`**Наше обязательство**\nLifeForge AI стремится обеспечить цифровую доступность для людей с ограниченными возможностями.\n\n**Принятые меры**\n- Высококонтрастное оформление с тёмным и светлым режимами\n- Семантическая структура HTML для совместимости со скринридерами\n- Поддержка навигации с клавиатуры\n- Поддержка языков с написанием справа налево (иврит)\n- Адаптация к настройкам размера шрифта браузера\n\n**Обратная связь**\nmoshe.svarga@gmail.com — укажите "ДОСТУПНОСТЬ" в теме письма.\n\nПоследнее обновление: май 2025`,
      es:`**Nuestro Compromiso**\nLifeForge AI se compromete a garantizar la accesibilidad digital para personas con discapacidades.\n\n**Medidas que tomamos**\n- Tema de alto contraste con opciones de modo oscuro y claro\n- Soporte de navegación por teclado\n- Soporte de idioma RTL para usuarios de hebreo\n- Compatibilidad con lectores de pantalla\n\n**Comentarios**\nmoshe.svarga@gmail.com — incluya "ACCESIBILIDAD" en el asunto.\n\nÚltima actualización: mayo 2025`,
      it:`**Il Nostro Impegno**\nLifeForge AI si impegna a garantire l'accessibilità digitale per le persone con disabilità.\n\n**Misure adottate**\n- Tema ad alto contrasto con modalità scura e chiara\n- Supporto navigazione da tastiera\n- Compatibilità con lettori di schermo\n- Supporto RTL per utenti ebraici\n\n**Feedback**\nmoshe.svarga@gmail.com — includi "ACCESSIBILITÀ" nell'oggetto.\n\nUltimo aggiornamento: maggio 2025`,
      he:`**המחויבות שלנו**\nLifeForge AI מחויבת להבטיח נגישות דיגיטלית לאנשים עם מוגבלויות.\n\n**אמצעים שאנו נוקטים**\n- ערכת נושא בניגודיות גבוהה עם אפשרויות מצב כהה ובהיר\n- תמיכה בניווט מקלדת\n- תאימות לקוראי מסך\n- תמיכה ב-RTL עבור משתמשי עברית\n- התאמה להגדרות גודל גופן של הדפדפן\n\n**משוב**\nmoshe.svarga@gmail.com — ציין "נגישות" בשורת הנושא.\n\nעדכון אחרון: מאי 2025`
    }

      en:`**Get in Touch**\nWe are here to support your journey on LifeForge AI.\n\n**Email Support**\nFor questions, feedback, or data requests:\nmoshe.svarga@gmail.com\n\n**Response Time**\nWe aim to respond to all inquiries within 48–72 business hours.\n\n**Data Requests**\nFor GDPR data access, correction, or deletion requests, please include "DATA REQUEST" in your email subject line.\n\n**Accessibility**\nIf you encounter any accessibility barriers on our platform, please let us know. We are committed to making LifeForge AI accessible to everyone.\n\n**Feedback**\nYour feedback helps us improve. We read every message.`,

/* ═══════════════ LEGAL PAGE VIEW ════════════════════════════════════════ */
function LegalPage({docId,lang,onBack}){
  const doc=LEGAL_CONTENT[docId];
  if(!doc)return(
    <div style={{textAlign:'center',padding:'80px 24px'}}>
      <p style={{color:'var(--text-2)'}}>Document not found.</p>
      <button className="btn-g" style={{marginTop:16}} onClick={onBack}>← Back</button>
    </div>
  );
  const title=doc.title[lang]||doc.title.en;
  const body=(doc.body[lang]||doc.body.en||'').split('\n\n');
  useEffect(()=>{window.scrollTo({top:0,behavior:'smooth'});},[]);
  return(
    <div style={{maxWidth:760,margin:'0 auto',padding:'90px 24px 60px'}}>
      <button className="detail-back" onClick={onBack}>← {lang==='ru'?'Назад':lang==='he'?'חזרה':lang==='es'?'Volver':lang==='it'?'Indietro':'Back'}</button>
      <h1 style={{fontFamily:'var(--font-d)',fontSize:'clamp(1.8rem,4vw,2.6rem)',fontWeight:400,marginBottom:8,color:'var(--text-1)'}}>{title}</h1>
      <div className="divider" style={{margin:'0 0 32px'}}/>
      <div className="glass" style={{padding:'28px 32px'}}>
        {body.map((para,i)=>{
          if(para.startsWith('**')&&para.endsWith('**')){
            return<h3 key={i} style={{fontFamily:'var(--font-d)',fontSize:'1.15rem',color:'var(--gold)',marginTop:i>0?20:0,marginBottom:10,fontWeight:500}}>{para.replace(/\*\*/g,'')}</h3>;
          }
          const parts=para.split(/\*\*([^*]+)\*\*/g);
          return(
            <p key={i} style={{fontSize:'.9rem',color:'var(--text-2)',lineHeight:1.8,marginBottom:12}}>
              {parts.map((p,j)=>j%2===1?<strong key={j} style={{color:'var(--gold)'}}>{p}</strong>:p)}
            </p>
          );
        })}
      </div>
    </div>
  );
}

    gdpr:ru?'GDPR / Защита данных':es?'Protección de Datos':it?'Protezione Dati':he?'הגנת מידע':'Data Protection',
    accessibility:ru?'Доступность':es?'Accesibilidad':it?'Accessibilità':he?'נגישות':'Accessibility',
    rights:ru?'Все права защищены':es?'Todos los derechos reservados':it?'Tutti i diritti riservati':he?'כל הזכויות שמורות':'All rights reserved',
    disclaimer_short:ru?'Весь контент предоставляется в информационных целях и не является профессиональной консультацией.':es?'Todo el contenido es solo informativo y no constituye asesoramiento profesional.':it?'Tutti i contenuti sono solo informativi.':he?'כל התוכן למטרות מידע בלבד ואינו מהווה ייעוץ מקצועי.':'All content is for informational purposes only and does not constitute professional advice.',
  };
  return(
    <footer>
      <div className="mw">
        <div className="footer-grid">
          {/* Brand */}
          <div>
            <div className="nav-logo-mark" style={{marginBottom:12,width:36,height:36,fontSize:16}}>L</div>
            <div className="footer-brand-h">LifeForge<em style={{fontStyle:'italic',color:'var(--gold)'}}>·</em>AI</div>
            <p className="footer-brand-sub">{t.footer_tagline}</p>
            <p style={{fontSize:'.72rem',color:'var(--text-3)',marginTop:10,lineHeight:1.6,maxWidth:240}}>{L.disclaimer_short}</p>
          </div>
          {/* Platform */}
          <div>
            <div className="footer-col-h">{L.platform}</div>
            <div className="footer-links">
              {[[t.nav_coaches,'coach'],[t.nav_esoteric,'esoteric'],[t.nav_svarga,'svarga']].map(([lbl,id])=>(
                <span key={id} className="footer-link" style={{cursor:'pointer'}} onClick={()=>onNavigate(id)}>{lbl}</span>
              ))}
            </div>
          </div>
          {/* Legal */}
          <div>
            <div className="footer-col-h">{L.legal}</div>
            <div className="footer-links">
              {[['privacy',L.privacy],['terms',L.terms],['cookies',L.cookies],['disclaimer',L.disclaimer]].map(([id,lbl])=>(
                <span key={id} className="footer-link" onClick={()=>onLegalOpen(id)} style={{cursor:'pointer'}}>{lbl}</span>
              ))}
            </div>
          </div>
          {/* Support */}
          <div>
            <div className="footer-col-h">{L.support}</div>
            <div className="footer-links">
              <span className="footer-link" onClick={()=>onLegalOpen('contact')} style={{cursor:'pointer'}}>{L.contact}</span>
              <span className="footer-link" onClick={()=>onLegalOpen('data_protection')} style={{cursor:'pointer'}}>{L.gdpr}</span>
              <span className="footer-link" onClick={()=>onLegalOpen('accessibility')} style={{cursor:'pointer'}}>{L.accessibility}</span>
              <a href="mailto:moshe.svarga@gmail.com" className="footer-link" style={{color:'var(--gold)'}}>moshe.svarga@gmail.com</a>
            </div>
          </div>
        </div>
        <div className="footer-bottom">
          <div className="footer-copy">© 2025 LifeForge AI. {L.rights}.</div>
          <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
            {[['privacy',L.privacy],['terms',L.terms],['disclaimer',L.disclaimer]].map(([id,lbl])=>(
              <span key={id} onClick={()=>onLegalOpen(id)}
                style={{fontSize:'.68rem',color:'var(--text-3)',cursor:'pointer',transition:'color .2s'}}
                onMouseEnter={e=>e.target.style.color='var(--gold)'}
                onMouseLeave={e=>e.target.style.color='var(--text-3)'}>{lbl}</span>
            ))}
          </div>
        </div>
      </div>
    </footer>
  );
}

/* ═══════════════ ROOT APP ═══════════════════════════════════════════════ */
function App(){
  const [lang,setLang]=useState('en');
  const [theme,setTheme]=useState('dark');
  const [layer,setLayer]=useState('coach');
  const [view,setView]=useState('home');
  const [selected,setSelected]=useState(null);
  const [legalDoc,setLegalDoc]=useState(null);

  useEffect(()=>{
    document.documentElement.setAttribute('data-theme',theme);
    document.documentElement.setAttribute('dir',lang==='he'?'rtl':'ltr');
    document.documentElement.setAttribute('lang',lang);
    document.documentElement.setAttribute('data-layer',layer);
    updateOrbs(layer);
  },[theme,lang,layer]);

  useReveal([layer,view,selected,lang,legalDoc]);

  const isFullscreen=view==='chat';

  /* single navigation entry-point — clears all overlay state */
  function navigate(newLayer,newView='home'){
    setLayer(newLayer);
    setView(newView);
    setSelected(null);
    setLegalDoc(null);
    updateOrbs(newLayer);
    window.scrollTo({top:0,behavior:'smooth'});
  }
  function openLegal(id){setLegalDoc(id);window.scrollTo({top:0,behavior:'smooth'});}
  function closeLegal(){setLegalDoc(null);}

  return(
    <React.Fragment>
      <Nav lang={lang} setLang={l=>setLang(l)} theme={theme} setTheme={setTheme}
        layer={layer} setLayer={l=>navigate(l)} setView={setView}/>
      <main style={{minHeight:'100svh',paddingTop:66}}>
        {legalDoc?(
          <LegalPage docId={legalDoc} lang={lang} onBack={closeLegal}/>
        ):(
          <>
            {layer==='coach'&&view==='home'&&(
              <Hero lang={lang} setLayer={l=>navigate(l)}/>
            )}
            {!isFullscreen&&(
              <LayerTabs layer={layer} setLayer={l=>navigate(l)} lang={lang}/>
            )}
            {layer==='coach'&&(
              <CoachLayer lang={lang} view={view} setView={setView}
                selected={selected} setSelected={setSelected}/>
            )}
            {layer==='esoteric'&&<EsotericLayer lang={lang}/>}
            {layer==='svarga'&&<SvargaLayer lang={lang}/>}
          </>
        )}
      </main>
      <Footer lang={lang} onLegalOpen={openLegal} onNavigate={l=>navigate(l)}/>
      <ScrollTop/>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
