<!DOCTYPE html>
<html lang="en" data-theme="dark" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5">
<meta name="theme-color" content="#0A0907" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#FAF7EF" media="(prefers-color-scheme: light)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="description" content="LifeForge AI — Premium transformation ecosystem.">
<title>LifeForge AI · Human Potential System</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%23E8C880'/><stop offset='1' stop-color='%239A7E4A'/></linearGradient></defs><circle cx='16' cy='16' r='14' fill='url(%23g)'/><text x='16' y='22' text-anchor='middle' font-family='Georgia' font-size='17' fill='%230D0B08' font-weight='600'>L</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Frank+Ruhl+Libre:wght@300;400;500;700&family=Heebo:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0907;--bg-alt:#110E0A;--surface:#18140E;--surface-2:#211C14;
  --text-1:#F0EBE0;--text-2:#AAA49A;--text-3:#6B6660;
  --border:rgba(240,235,224,.08);--border-md:rgba(240,235,224,.16);
  --gold:#D4B27A;--gold-h:#E8C68E;--gold-dim:#9A7E4A;--gold-f:rgba(212,178,122,.10);
  --indigo:#7E8EC8;--indigo-f:rgba(126,142,200,.10);
  --sage:#6EA080;--purple:#B07ECC;--purple-f:rgba(176,126,204,.10);
  --amber:#C8946E;--platinum:#C8D4E0;
  --shadow:rgba(0,0,0,.7);--nav-bg:rgba(10,9,7,.88);
  --glass-bg:rgba(24,20,14,.52);--glass-br:rgba(240,235,224,.10);
  --font-d:'Cormorant Garamond',Georgia,serif;
  --font-b:'DM Sans',system-ui,sans-serif;
  --r:12px;--r2:20px;
}
[data-theme="light"]{
  --bg:#FAF7EF;--bg-alt:#F2EFE5;--surface:#FFFFFF;--surface-2:#EDE9DE;
  --text-1:#1A160E;--text-2:#56524C;--text-3:#989188;
  --border:rgba(24,20,14,.08);--border-md:rgba(24,20,14,.16);
  --gold:#8B6520;--gold-h:#6E4F12;--gold-dim:#B08030;--gold-f:rgba(139,101,32,.08);
  --indigo:#5068B8;--indigo-f:rgba(80,104,184,.08);
  --sage:#3E7058;--purple:#8050AC;--purple-f:rgba(128,80,172,.08);
  --amber:#A06040;--platinum:#5878A0;
  --shadow:rgba(24,20,14,.1);--nav-bg:rgba(250,247,239,.92);
  --glass-bg:rgba(255,255,255,.60);--glass-br:rgba(24,20,14,.10);
}
[lang="he"]{--font-d:'Frank Ruhl Libre',Georgia,serif;--font-b:'Heebo',system-ui,sans-serif}
html{scroll-behavior:smooth}
body{font-family:var(--font-b);background:var(--bg);color:var(--text-1);line-height:1.65;overflow-x:hidden;-webkit-font-smoothing:antialiased;transition:background .4s,color .4s}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:2px}
::selection{background:rgba(212,178,122,.22)}
a{color:inherit;text-decoration:none}
button{font-family:var(--font-b)}
input,textarea{font-family:var(--font-b)}
img{display:block;max-width:100%}

/* PARTICLE CANVAS */
#particle-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.55}
[data-theme="light"] #particle-canvas{opacity:.22}

/* ORBS */
.orbs{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(100px);transition:opacity 1s,background 1s}
.o1{top:-8%;left:-6%;width:620px;height:620px}
.o2{bottom:-18%;right:-8%;width:700px;height:700px;opacity:.6}
.o3{top:38%;right:22%;width:420px;height:420px;opacity:.4}

/* LAYOUT */
.sp{padding:clamp(56px,9vw,112px) clamp(22px,7vw,100px);position:relative;z-index:1}
.sp2{padding:clamp(40px,6vw,80px) clamp(22px,7vw,100px);position:relative;z-index:1}
.mw{max-width:1320px;margin:0 auto}

/* REVEAL — safety: auto-show after 1.5s even if observer never fires */
.rv{opacity:0;transform:translateY(22px);transition:opacity .85s cubic-bezier(.2,0,.2,1),transform .85s cubic-bezier(.2,0,.2,1);animation:rv-safety 0s linear 1.5s forwards}
.rv.in{opacity:1;transform:none;animation:none}
@keyframes rv-safety{to{opacity:1;transform:none}}
.d1{transition-delay:.06s}.d2{transition-delay:.14s}.d3{transition-delay:.22s}
.d4{transition-delay:.30s}.d5{transition-delay:.38s}.d6{transition-delay:.46s}

/* TYPOGRAPHY */
.eyebrow{font-size:.60rem;font-weight:500;letter-spacing:.26em;text-transform:uppercase;color:var(--gold)}
[lang="he"] .eyebrow{letter-spacing:.04em}
.tag{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;background:var(--gold-f);border:1px solid rgba(212,178,122,.18);border-radius:99px;font-size:.60rem;font-weight:500;letter-spacing:.20em;text-transform:uppercase;color:var(--gold)}

/* BUTTONS */
.btn-p{display:inline-flex;align-items:center;gap:8px;padding:13px 30px;background:var(--gold);color:#0A0907;font-size:.72rem;font-weight:500;letter-spacing:.14em;text-transform:uppercase;border:none;border-radius:var(--r);cursor:pointer;transition:all .3s}
.btn-p:hover{background:var(--gold-h);transform:translateY(-2px);box-shadow:0 16px 48px rgba(212,178,122,.28)}
[data-theme="light"] .btn-p{color:#FAF7EF}
.btn-g{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;background:transparent;color:var(--text-2);font-size:.72rem;font-weight:400;letter-spacing:.10em;text-transform:uppercase;border:1px solid var(--border-md);border-radius:var(--r);cursor:pointer;transition:all .3s}
.btn-g:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-f)}

/* NAV */
nav.topnav{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 clamp(22px,7vw,100px);height:66px;display:flex;align-items:center;justify-content:space-between;transition:background .4s,box-shadow .4s;gap:16px}
nav.topnav.scrolled{background:var(--nav-bg);backdrop-filter:blur(28px) saturate(160%);-webkit-backdrop-filter:blur(28px) saturate(160%);box-shadow:0 1px 0 var(--border),0 8px 32px var(--shadow)}
.nav-logo{display:flex;align-items:center;gap:10px;cursor:pointer;flex-shrink:0}
.nav-logo-mark{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--gold),var(--gold-dim));display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:18px;font-weight:600;color:#0A0907;box-shadow:0 4px 14px rgba(212,178,122,.28)}
.nav-logo-text{font-family:var(--font-d);font-size:1.18rem;font-weight:500}
.nav-logo-sub{font-size:.56rem;letter-spacing:.22em;text-transform:uppercase;color:var(--text-3)}
.nav-controls{display:flex;align-items:center;gap:6px;flex-shrink:0}
.nav-lang{padding:6px 10px;font-size:.62rem;font-weight:500;letter-spacing:.10em;text-transform:uppercase;color:var(--text-3);background:none;border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all .25s}
.nav-lang.active,.nav-lang:hover{color:var(--gold);border-color:rgba(212,178,122,.28);background:var(--gold-f)}
.nav-theme{width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:none;border:1px solid var(--border);border-radius:8px;cursor:pointer;color:var(--text-2);font-size:15px;transition:all .25s}
.nav-theme:hover{color:var(--gold);border-color:rgba(212,178,122,.28);background:var(--gold-f)}

/* LAYER TABS */
.layer-tabs{display:flex;gap:6px;padding:5px;background:var(--glass-bg);backdrop-filter:blur(20px) saturate(140%);border:1px solid var(--glass-br);border-radius:12px}
.layer-tab{padding:9px 20px;font-size:.70rem;font-weight:500;letter-spacing:.10em;text-transform:uppercase;color:var(--text-3);background:none;border:none;border-radius:8px;cursor:pointer;transition:all .3s;white-space:nowrap}
.layer-tab:hover{color:var(--text-1)}
.layer-tab.active{color:#0A0907;background:var(--gold);box-shadow:0 4px 14px rgba(212,178,122,.28)}
[data-theme="light"] .layer-tab.active{color:#FAF7EF}
.layer-tab.indigo.active{background:var(--indigo);color:#0A0907}
.layer-tab.purple.active{background:var(--purple);color:#0A0907}
[data-theme="light"] .layer-tab.indigo.active,[data-theme="light"] .layer-tab.purple.active{color:#FAF7EF}

/* HERO */
.hero{min-height:88svh;display:flex;align-items:center;padding:96px clamp(22px,7vw,100px) clamp(48px,8vw,96px);position:relative;z-index:1}
.hero-inner{max-width:1320px;margin:0 auto;width:100%}
.hero-tag{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;background:var(--gold-f);border:1px solid rgba(212,178,122,.20);border-radius:99px;margin-bottom:28px}
.hero-tag-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse-dot 2.4s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 0 0 rgba(212,178,122,.5)}50%{box-shadow:0 0 0 6px rgba(212,178,122,0)}}
.hero-h{font-family:var(--font-d);font-size:clamp(2.8rem,7vw,6.4rem);font-weight:300;line-height:1.05;letter-spacing:-.01em;margin-bottom:24px}
.hero-h em{font-style:italic;color:var(--gold)}
.hero-sub{font-size:clamp(.95rem,1.6vw,1.12rem);color:var(--text-2);max-width:580px;line-height:1.72;margin-bottom:38px}
.hero-ctas{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:56px}
.hero-stats{display:flex;flex-wrap:wrap;gap:clamp(24px,3.5vw,48px)}
.hero-stat-val{font-family:var(--font-d);font-size:clamp(1.7rem,2.8vw,2.4rem);font-weight:400;color:var(--gold);line-height:1}
.hero-stat-lab{font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:var(--text-3);margin-top:4px}

/* SECTION HEAD */
.sec-head{margin-bottom:clamp(36px,5vw,64px);text-align:center}
.sec-h{font-family:var(--font-d);font-size:clamp(2rem,4.2vw,3.3rem);font-weight:300;line-height:1.12;margin-top:12px}
.sec-h em{font-style:italic;color:var(--gold)}
.sec-sub{font-size:clamp(.86rem,1.3vw,.96rem);color:var(--text-2);max-width:580px;margin:14px auto 0;line-height:1.7}
.divider{width:48px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:20px auto 0;opacity:.6}

/* GLASS CARD */
.glass{background:var(--glass-bg);backdrop-filter:blur(22px) saturate(140%);-webkit-backdrop-filter:blur(22px) saturate(140%);border:1px solid var(--glass-br);border-radius:var(--r2);position:relative;overflow:hidden}

/* COACH CARD */
.coach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.coach-card{padding:28px;cursor:pointer;transition:all .35s cubic-bezier(.2,0,.2,1);position:relative;overflow:hidden;display:flex;flex-direction:column;gap:16px}
.coach-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 0% 100%,var(--card-accent,rgba(212,178,122,.08)),transparent 60%);opacity:0;transition:opacity .4s}
.coach-card:hover{transform:translateY(-6px);box-shadow:0 24px 56px rgba(0,0,0,.28);border-color:var(--accent,rgba(212,178,122,.4))}
.coach-card:hover::before{opacity:1}
.coach-avatar{width:88px;height:88px;border-radius:50%;flex-shrink:0;border:2px solid var(--accent,var(--gold));background:linear-gradient(135deg,var(--bg-alt),var(--surface));display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.coach-avatar-status{position:absolute;bottom:4px;right:4px;width:14px;height:14px;border-radius:50%;background:#6EA080;border:2px solid var(--bg);box-shadow:0 0 0 2px var(--bg)}
.coach-name{font-family:var(--font-d);font-size:1.45rem;font-weight:400;line-height:1.15}
.coach-title{font-size:.66rem;letter-spacing:.18em;text-transform:uppercase;color:var(--accent,var(--gold));margin-top:3px;margin-bottom:10px}
.coach-quote{font-size:.84rem;color:var(--text-2);line-height:1.65;font-style:italic;flex:1}
.coach-meta{display:flex;align-items:center;justify-content:space-between;padding-top:14px;border-top:1px solid var(--border)}
.coach-rating{display:flex;align-items:center;gap:4px;font-size:.72rem;color:var(--text-2)}
.coach-rating-star{color:var(--gold)}
.coach-sessions{font-size:.66rem;color:var(--text-3);letter-spacing:.10em;text-transform:uppercase}

/* COACH DETAIL */
.detail-page{min-height:100svh;padding:96px clamp(22px,7vw,100px) clamp(56px,8vw,100px);position:relative;z-index:1}
.detail-back{display:inline-flex;align-items:center;gap:8px;font-size:.70rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-3);cursor:pointer;margin-bottom:40px;transition:all .25s;background:none;border:none}
.detail-back:hover{color:var(--text-2);gap:12px}
.detail-grid{display:grid;grid-template-columns:380px 1fr;gap:48px;align-items:start}
.detail-profile{position:sticky;top:96px}
.detail-profile .coach-avatar{width:140px;height:140px;margin-bottom:20px}
.detail-profile-h{font-family:var(--font-d);font-size:2.2rem;font-weight:400;line-height:1.1;margin-bottom:6px}
.detail-profile-title{font-size:.72rem;letter-spacing:.20em;text-transform:uppercase;color:var(--accent,var(--gold));margin-bottom:18px}
.detail-profile-bio{font-size:.88rem;color:var(--text-2);line-height:1.72;margin-bottom:20px}
.detail-profile-phil{font-size:.86rem;font-style:italic;color:var(--text-1);line-height:1.7;padding:14px 18px;border-left:2px solid var(--accent,var(--gold));background:var(--gold-f);border-radius:0 8px 8px 0;margin-bottom:24px}
.detail-profile-specs{display:flex;flex-wrap:wrap;gap:6px}
.spec-pill{padding:4px 11px;border-radius:99px;font-size:.62rem;letter-spacing:.10em;text-transform:uppercase;border:1px solid var(--accent,var(--gold));color:var(--accent,var(--gold));opacity:.85}

/* CHAT */
.chat-wrap{display:flex;flex-direction:column;height:calc(100svh - 200px);min-height:520px}
.chat-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px}
.chat-header-info{flex:1}
.chat-header-name{font-family:var(--font-d);font-size:1.05rem;font-weight:500}
.chat-header-status{font-size:.66rem;letter-spacing:.10em;text-transform:uppercase;color:#6EA080;display:flex;align-items:center;gap:6px;margin-top:2px}
.chat-status-dot{width:6px;height:6px;border-radius:50%;background:#6EA080;animation:pulse-dot 2.4s ease-in-out infinite}
.chat-msgs{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:14px}
.msg{max-width:78%;padding:13px 18px;border-radius:14px;font-size:.88rem;line-height:1.62;animation:msg-in .35s ease-out}
@keyframes msg-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg.coach{align-self:flex-start;background:var(--surface-2);border:1px solid var(--border);color:var(--text-1);border-bottom-left-radius:4px}
.msg.user{align-self:flex-end;background:var(--gold);color:#0A0907;border-bottom-right-radius:4px}
[data-theme="light"] .msg.user{color:#FAF7EF}
.msg-meta{font-size:.60rem;letter-spacing:.10em;text-transform:uppercase;opacity:.55;margin-bottom:4px}
.typing-indicator{align-self:flex-start;display:flex;gap:5px;padding:14px 18px;background:var(--surface-2);border:1px solid var(--border);border-radius:14px;border-bottom-left-radius:4px}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--text-3);animation:typing 1.4s ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:.15s}
.typing-dot:nth-child(3){animation-delay:.30s}
@keyframes typing{0%,80%,100%{transform:scale(.7);opacity:.4}40%{transform:scale(1);opacity:1}}
.chat-input-row{padding:16px 20px;border-top:1px solid var(--border);display:flex;gap:10px}
.chat-input{flex:1;padding:13px 18px;background:var(--surface-2);border:1px solid var(--border-md);border-radius:10px;color:var(--text-1);font-size:.88rem;outline:none;transition:border-color .25s;resize:none;font-family:var(--font-b);line-height:1.5;min-height:48px;max-height:120px}
.chat-input:focus{border-color:var(--gold)}
.chat-send{padding:0 22px;background:var(--gold);color:#0A0907;border:none;border-radius:10px;font-size:.72rem;font-weight:500;letter-spacing:.10em;text-transform:uppercase;cursor:pointer;transition:all .25s}
.chat-send:hover{background:var(--gold-h);transform:translateY(-1px)}
.chat-send:disabled{opacity:.4;cursor:not-allowed;transform:none}
[data-theme="light"] .chat-send{color:#FAF7EF}

/* ESOTERIC TOOLS */
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px}
.tool-card{padding:24px;cursor:pointer;transition:all .35s;display:flex;flex-direction:column;gap:14px;min-height:200px}
.tool-card:hover{transform:translateY(-5px);box-shadow:0 20px 48px rgba(0,0,0,.25);border-color:var(--accent,var(--indigo))}
.tool-icon{width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:1.6rem;color:var(--accent,var(--indigo));background:var(--accent-bg,var(--indigo-f));border:1px solid var(--accent,var(--indigo))}
.tool-name{font-family:var(--font-d);font-size:1.32rem;font-weight:400;line-height:1.2}
.tool-desc{font-size:.82rem;color:var(--text-2);line-height:1.62;flex:1}
.tool-cta{display:flex;align-items:center;gap:7px;font-size:.66rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--accent,var(--indigo));margin-top:8px}

/* FORM */
.form-stack{display:flex;flex-direction:column;gap:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-field{display:flex;flex-direction:column;gap:6px}
.form-label{font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text-3)}
.form-input,.form-textarea{padding:12px 16px;background:var(--surface-2);border:1px solid var(--border-md);border-radius:10px;color:var(--text-1);font-size:.88rem;outline:none;transition:border-color .25s;font-family:var(--font-b)}
.form-input:focus,.form-textarea:focus{border-color:var(--gold)}
.form-textarea{min-height:120px;resize:vertical;line-height:1.6}

/* PYTHAGORAS */
.pytha-grid{display:grid;grid-template-columns:repeat(3,64px);gap:8px;margin:24px auto;justify-content:center}
.pytha-cell{width:64px;height:64px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:1.4rem;border:1px solid var(--border)}
.pytha-cell.has{border-color:rgba(212,178,122,.4);background:rgba(212,178,122,.08);color:var(--gold)}
.pytha-cell.hot{border-color:rgba(212,178,122,.7);background:rgba(212,178,122,.16);color:var(--gold-h);box-shadow:0 0 16px rgba(212,178,122,.18)}
.pytha-cell.empty{color:var(--text-3);opacity:.4}
.working-nums{display:flex;justify-content:center;gap:24px;margin:20px 0;flex-wrap:wrap}
.wnum{text-align:center}
.wnum-val{font-family:var(--font-d);font-size:1.7rem;color:var(--gold)}
.wnum-lab{font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:var(--text-3);margin-top:2px}

/* RUNES */
.runes-display{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin:30px 0}
.rune-card{padding:24px 18px;text-align:center;border:1px solid var(--glass-br);border-radius:14px;background:var(--glass-bg);position:relative;animation:rune-in .8s cubic-bezier(.2,0,.2,1) both}
.rune-card:nth-child(2){animation-delay:.18s}
.rune-card:nth-child(3){animation-delay:.36s}
@keyframes rune-in{from{opacity:0;transform:translateY(20px) rotateY(60deg)}to{opacity:1;transform:none}}
.rune-pos{font-size:.58rem;letter-spacing:.20em;text-transform:uppercase;color:var(--text-3);margin-bottom:14px}
.rune-symbol{font-size:3.4rem;color:var(--indigo);font-family:'Cormorant Garamond',serif;margin:0 0 12px;line-height:1;filter:drop-shadow(0 0 16px rgba(126,142,200,.4))}
.rune-name{font-family:var(--font-d);font-size:1.15rem;color:var(--text-1);margin-bottom:8px}
.rune-meaning{font-size:.78rem;color:var(--text-2);line-height:1.62}

/* ARCHETYPES */
.quiz-q{padding:24px;border-radius:14px;background:var(--glass-bg);border:1px solid var(--glass-br);margin-bottom:14px}
.quiz-q-text{font-family:var(--font-d);font-size:1.18rem;margin-bottom:18px;line-height:1.4}
.quiz-opts{display:flex;flex-direction:column;gap:8px}
.quiz-opt{padding:12px 18px;border:1px solid var(--border-md);border-radius:10px;background:transparent;color:var(--text-1);font-size:.86rem;cursor:pointer;text-align:left;transition:all .25s;font-family:var(--font-b)}
.quiz-opt:hover{border-color:var(--indigo);background:var(--indigo-f)}
.quiz-opt.sel{border-color:var(--indigo);background:var(--indigo-f);color:var(--indigo)}
.archetype-result{padding:32px;border-radius:var(--r2);text-align:center}
.archetype-name{font-family:var(--font-d);font-size:2.4rem;color:var(--indigo);margin-bottom:6px}
.archetype-sub{font-size:.66rem;letter-spacing:.20em;text-transform:uppercase;color:var(--text-3);margin-bottom:24px}
.archetype-desc{font-size:.95rem;color:var(--text-2);line-height:1.75;margin-bottom:22px}
.archetype-blocks{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;text-align:left}
.archetype-block{padding:14px;border-radius:10px;background:var(--surface-2);border:1px solid var(--border)}
.archetype-block-h{font-size:.60rem;letter-spacing:.20em;text-transform:uppercase;color:var(--indigo);margin-bottom:6px}
.archetype-block-t{font-size:.83rem;color:var(--text-2);line-height:1.6}

/* PERSONALITY SLIDERS */
.slider-stack{display:flex;flex-direction:column;gap:18px}
.slider-row{padding:16px 18px;border:1px solid var(--border-md);border-radius:12px;background:var(--surface-2)}
.slider-labels{display:flex;justify-content:space-between;font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px}
.slider-input{width:100%;-webkit-appearance:none;appearance:none;height:4px;background:var(--border-md);border-radius:2px;outline:none}
.slider-input::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--indigo);cursor:pointer;box-shadow:0 0 14px rgba(126,142,200,.4)}
.slider-input::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--indigo);cursor:pointer;border:none}

/* SVARGA */
.svarga-input-wrap{max-width:780px;margin:0 auto}
.svarga-loading{display:flex;flex-direction:column;align-items:center;padding:48px 24px;gap:18px}
.svarga-loader{width:48px;height:48px;border:2px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.svarga-loading-text{font-size:.82rem;color:var(--text-2);letter-spacing:.10em}
.svarga-result{display:flex;flex-direction:column;gap:14px;max-width:920px;margin:32px auto 0}
.svarga-block{padding:24px 28px;border-radius:14px;border:1px solid var(--glass-br);background:var(--glass-bg);transition:all .3s;animation:svarga-in .6s cubic-bezier(.2,0,.2,1) both}
.svarga-block:nth-child(1){animation-delay:.05s}
.svarga-block:nth-child(2){animation-delay:.15s}
.svarga-block:nth-child(3){animation-delay:.25s}
.svarga-block:nth-child(4){animation-delay:.35s}
.svarga-block:nth-child(5){animation-delay:.45s}
.svarga-block:nth-child(6){animation-delay:.55s}
@keyframes svarga-in{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.svarga-block:hover{border-color:rgba(176,126,204,.40);transform:translateX(4px)}
[dir="rtl"] .svarga-block:hover{transform:translateX(-4px)}
.svarga-block-head{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.svarga-block-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;background:var(--purple-f);border:1px solid rgba(176,126,204,.30);color:var(--purple);flex-shrink:0}
.svarga-block-title{font-family:var(--font-d);font-size:1.18rem;font-weight:500;line-height:1.25}
.svarga-block-sub{font-size:.60rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text-3);margin-top:2px}
.svarga-block-body{font-size:.88rem;color:var(--text-2);line-height:1.72;padding-left:56px}
[dir="rtl"] .svarga-block-body{padding-left:0;padding-right:56px}

/* FOOTER */
footer{padding:clamp(40px,6vw,72px) clamp(22px,7vw,100px) 32px;position:relative;z-index:1;border-top:1px solid var(--border)}
.footer-grid{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;gap:clamp(28px,4vw,56px);margin-bottom:clamp(36px,5vw,64px)}
.footer-brand-h{font-family:var(--font-d);font-size:1.4rem;margin:14px 0 10px}
.footer-brand-sub{font-size:.82rem;color:var(--text-3);line-height:1.65;max-width:260px}
.footer-col-h{font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:var(--text-3);margin-bottom:14px}
.footer-links{display:flex;flex-direction:column;gap:7px}
.footer-link{font-size:.82rem;color:var(--text-2);cursor:pointer;transition:color .25s}
.footer-link:hover{color:var(--gold)}
.footer-bottom{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding-top:28px;border-top:1px solid var(--border)}
.footer-copy{font-size:.72rem;color:var(--text-3)}
.footer-author{font-size:.70rem;color:var(--text-3)}
.footer-author a{color:var(--gold);transition:opacity .25s}
.footer-author a:hover{opacity:.75}

/* MOBILE */
@media(max-width:900px){
  .detail-grid{grid-template-columns:1fr}
  .detail-profile{position:static}
  .archetype-blocks{grid-template-columns:1fr}
  .runes-display{grid-template-columns:1fr}
  nav.topnav{flex-wrap:wrap;height:auto;padding:10px clamp(16px,5vw,32px);gap:8px}
  .nav-controls{order:3;width:100%;justify-content:flex-start;flex-wrap:wrap}
}
@media(max-width:640px){
  .form-row{grid-template-columns:1fr}
  .working-nums{gap:14px}
  .layer-tabs{width:100%;justify-content:space-between}
  .layer-tab{flex:1;padding:9px 8px;font-size:.62rem}
  .pytha-grid{grid-template-columns:repeat(3,54px)}
  .pytha-cell{width:54px;height:54px;font-size:1.2rem}
  .svarga-block-body{padding-left:0;padding-top:6px}
  [dir="rtl"] .svarga-block-body{padding-right:0}
}

/* ── COMPONENT ALIASES & NEW STYLES ─────────────────────────────────── */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 clamp(16px,4vw,60px);height:66px;display:flex;align-items:center;background:var(--nav-bg);backdrop-filter:blur(28px) saturate(160%);-webkit-backdrop-filter:blur(28px) saturate(160%);border-bottom:1px solid var(--glass-br)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:1200px;margin:0 auto;gap:1rem}
.nav-logo{font-family:var(--font-d);font-size:1.3rem;font-weight:500;cursor:pointer;text-decoration:none;color:var(--text-1)}
.nav-links{display:flex;gap:1.5rem;align-items:center}
.nav-link{background:none;border:none;color:var(--text-2);font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:color .25s;padding:.3rem 0;font-family:var(--font-b)}
.nav-link:hover,.nav-link.active{color:var(--gold)}
.cta-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 28px;background:linear-gradient(135deg,var(--gold),var(--gold-dim));color:#0A0907;font-size:.78rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;border:none;border-radius:var(--r);cursor:pointer;transition:all .3s;font-family:var(--font-b)}
.cta-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 16px 40px rgba(212,178,122,.3);filter:brightness(1.08)}
.cta-btn:disabled{opacity:.45;cursor:not-allowed}
[data-theme="light"] .cta-btn{color:#FAF7EF}
.pill-btn{display:inline-flex;align-items:center;justify-content:center;padding:8px 18px;background:transparent;border:1px solid var(--border-md);border-radius:999px;color:var(--text-2);font-size:.75rem;letter-spacing:.08em;cursor:pointer;transition:all .25s;font-family:var(--font-b)}
.pill-btn:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-f)}
.hero-title{font-family:var(--font-d);font-size:clamp(3rem,8vw,6rem);font-weight:300;line-height:1.05;letter-spacing:-.02em}
.section-title{font-family:var(--font-d);font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:300;line-height:1.1}
.coaches-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.coach-card{padding:28px;background:var(--glass-bg);backdrop-filter:blur(22px) saturate(140%);-webkit-backdrop-filter:blur(22px) saturate(140%);border:1px solid var(--glass-br);border-radius:var(--r2);transition:all .35s cubic-bezier(.2,0,.2,1);display:flex;flex-direction:column}
.coach-card:hover{transform:translateY(-6px);box-shadow:0 24px 56px rgba(0,0,0,.28)}
.tool-input{width:100%;padding:12px 16px;background:var(--surface-2);border:1px solid var(--border-md);border-radius:var(--r);color:var(--text-1);font-size:.9rem;outline:none;transition:border-color .25s;font-family:var(--font-b)}
.tool-input:focus{border-color:var(--gold)}
.esoteric-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px}
.send-btn{padding:0 18px;background:var(--gold);color:#0A0907;border:none;border-radius:var(--r);cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center;min-width:48px}
.send-btn:hover:not(:disabled){background:var(--gold-h);transform:translateY(-1px)}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
[data-theme="light"] .send-btn{color:#FAF7EF}
.typing-indicator{display:flex;gap:5px;padding:12px 16px;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;border-bottom-left-radius:4px;width:fit-content}
.typing-indicator span{width:7px;height:7px;border-radius:50%;background:var(--text-3);animation:typing 1.4s ease-in-out infinite}
.typing-indicator span:nth-child(2){animation-delay:.15s}
.typing-indicator span:nth-child(3){animation-delay:.30s}
.chat-input-row{padding:14px 16px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:flex-end}
.chat-msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px;min-height:300px;max-height:440px}
.msg{display:flex;gap:10px;align-items:flex-end;animation:msg-in .35s ease-out}
.msg.user{flex-direction:row-reverse}
.msg-bubble{max-width:78%;padding:11px 16px;border-radius:12px;font-size:.87rem;line-height:1.6}
.msg.coach .msg-bubble{background:var(--surface-2);border:1px solid var(--border);color:var(--text-1);border-bottom-left-radius:4px}
.msg.user .msg-bubble{background:var(--gold);color:#0A0907;border-bottom-right-radius:4px}
[data-theme="light"] .msg.user .msg-bubble{color:#FAF7EF}
.chat-input{flex:1;padding:11px 14px;background:var(--surface-2);border:1px solid var(--border-md);border-radius:var(--r);color:var(--text-1);font-size:.88rem;outline:none;transition:border-color .25s;line-height:1.5;min-height:44px;max-height:120px}
.chat-input:focus{border-color:var(--gold)}

/* ── RTL NAV FIX ─ nav controls always in fixed LTR order ─────────────── */
[dir="rtl"] nav.topnav{direction:ltr}
[dir="rtl"] nav.topnav .nav-logo-text,[dir="rtl"] nav.topnav .nav-logo-sub{direction:rtl}
/* Keep coach grid, tool cards, stats LTR-like but allow text to flow RTL */
[dir="rtl"] .hero-stats{flex-direction:row-reverse}
[dir="rtl"] .coach-meta{flex-direction:row-reverse}
[dir="rtl"] .detail-grid{direction:rtl}

/* ── PULSE ANIMATION for typing dots ──────────────────────────────────── */
@keyframes pulse{0%,100%{opacity:.4;transform:scale(.75)}50%{opacity:1;transform:scale(1)}}

/* ── BUTTON CONTRAST HARDENING ────────────────────────────────────────── */
/* Ensure all text on gold backgrounds is always dark */
.btn-p,.cta-btn,.chat-send,.send-btn,.layer-tab.active{color:#0A0907!important}
[data-theme="light"] .btn-p,[data-theme="light"] .cta-btn,
[data-theme="light"] .chat-send,[data-theme="light"] .send-btn{color:#FAF7EF!important}
/* Ghost/outline buttons always readable */
.btn-g{color:var(--text-2)}
.btn-g:hover{color:var(--gold)}
/* Pill buttons */
.pill-btn{color:var(--text-2)}
.pill-btn:hover{color:var(--gold)}
/* Nav lang buttons active state */
.nav-lang.active,.nav-lang:hover{color:var(--gold)!important}
/* Disabled states clearly dimmed */
button:disabled{opacity:.38!important;cursor:not-allowed!important}

/* ── QUIZ OPTIONS readable in both themes ─────────────────────────────── */
.quiz-opt{color:var(--text-1);background:var(--surface-2)}
.quiz-opt:hover{background:var(--indigo-f);color:var(--text-1);border-color:var(--indigo)}

/* ── TOOL CARD hover ──────────────────────────────────────────────────── */
.tool-card:hover .tool-icon{background:var(--indigo);color:#fff;border-color:var(--indigo)}
.tool-card:hover .tool-name{color:var(--indigo)}
.tool-card:hover .tool-cta{color:var(--text-1)}

/* ── COACH CARD full-card hover border colour ─────────────────────────── */
.coach-card:hover{border-color:var(--accent,rgba(212,178,122,.4))!important}

/* ── SPEC PILLS use accent CSS var ───────────────────────────────────────*/
.spec-pill{color:var(--accent,var(--gold));border-color:var(--accent,var(--gold))}

/* ── LANG DROPDOWN items readable ────────────────────────────────────────*/
.lang-item{padding:9px 16px;cursor:pointer;font-size:.72rem;font-family:var(--font-b);
  letter-spacing:.12em;text-transform:uppercase;transition:background .15s}
.lang-item:hover{background:var(--gold-f);color:var(--gold)}

/* ── FORM INPUTS consistent focus ring ───────────────────────────────────*/
input:focus,textarea:focus,.form-input:focus,.form-textarea:focus,.tool-input:focus{
  border-color:var(--gold)!important;box-shadow:0 0 0 3px rgba(212,178,122,.12)}

/* ── MOBILE nav wrap fix ─────────────────────────────────────────────────*/
@media(max-width:640px){
  nav.topnav .nav-logo-sub{display:none}
  nav.topnav .nav-lang{padding:5px 7px;font-size:.58rem}
}

/* ════════════════════════════════════════════════════════════════════════
   COMPREHENSIVE RESPONSIVE LAYER — mobile-first premium adaptation
   ═══════════════════════════════════════════════════════════════════════ */
:root{--safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px)}
html{-webkit-text-size-adjust:100%}
body{overflow-x:hidden}
*{-webkit-tap-highlight-color:rgba(212,178,122,.18)}

/* Hamburger button — desktop hidden by default */
.nav-burger{display:none;width:44px;height:44px;align-items:center;justify-content:center;
  background:none;border:1px solid var(--border);border-radius:8px;cursor:pointer;
  color:var(--text-1);padding:0;flex-shrink:0;transition:all .25s}
.nav-burger:hover{border-color:var(--gold);color:var(--gold)}
.nav-burger svg{width:22px;height:22px}

/* Mobile drawer */
.nav-drawer{position:fixed;top:0;right:0;bottom:0;width:min(320px,82vw);
  background:var(--surface);border-left:1px solid var(--border-md);z-index:300;
  transform:translateX(110%);transition:transform .32s cubic-bezier(.2,0,.2,1);
  padding:calc(20px + var(--safe-t)) 22px calc(28px + var(--safe-b));
  display:flex;flex-direction:column;gap:6px;
  overflow-y:auto;box-shadow:-12px 0 48px rgba(0,0,0,.45)}
.nav-drawer.open{transform:translateX(0)}
.nav-drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:299;opacity:0;
  pointer-events:none;transition:opacity .28s;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.nav-drawer-overlay.open{opacity:1;pointer-events:auto}
.nav-drawer-close{align-self:flex-end;width:40px;height:40px;border:1px solid var(--border);
  border-radius:8px;background:none;color:var(--text-2);cursor:pointer;font-size:18px;margin-bottom:8px}
.nav-drawer-h{font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--text-3);padding:14px 6px 6px}
.nav-drawer-item{display:flex;align-items:center;gap:10px;padding:14px;border-radius:10px;
  background:none;border:1px solid transparent;color:var(--text-1);font-size:.92rem;
  cursor:pointer;text-align:left;font-family:var(--font-b);letter-spacing:.04em;
  transition:all .2s;min-height:48px;width:100%}
.nav-drawer-item:hover,.nav-drawer-item.active{background:var(--gold-f);
  border-color:rgba(212,178,122,.28);color:var(--gold)}
.nav-drawer-row{display:flex;gap:6px;flex-wrap:wrap;padding:4px 0}
.nav-drawer-pill{flex:1;min-width:44px;padding:10px 8px;border-radius:8px;
  background:var(--surface-2);border:1px solid var(--border);color:var(--text-2);
  font-size:.7rem;letter-spacing:.10em;text-transform:uppercase;cursor:pointer;
  font-family:var(--font-b);transition:all .2s;min-height:44px}
.nav-drawer-pill.active{background:var(--gold-f);border-color:var(--gold);color:var(--gold)}

/* RTL drawer slides from left */
[dir="rtl"] .nav-drawer{right:auto;left:0;border-left:none;border-right:1px solid var(--border-md);
  transform:translateX(-110%);box-shadow:12px 0 48px rgba(0,0,0,.45)}
[dir="rtl"] .nav-drawer.open{transform:translateX(0)}

/* === TABLET 1024px === */
@media(max-width:1024px){
  .detail-grid{grid-template-columns:1fr;gap:32px}
  .detail-profile{position:static}
  .footer-grid{grid-template-columns:repeat(2,1fr);gap:36px}
  .coaches-grid{grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
}

/* === TABLET PORTRAIT / LARGE PHONE 768px === */
@media(max-width:768px){
  nav.topnav{padding:0 16px;height:60px;flex-wrap:nowrap}
  nav.topnav .nav-controls{display:none}
  .nav-burger{display:inline-flex}
  .nav-logo-sub{display:none}
  .nav-logo-mark{width:32px;height:32px;font-size:14px}
  .nav-logo-text{font-size:1.05rem}

  .hero-inner{padding-top:90px}
  .hero-ctas{flex-direction:column;align-items:stretch}
  .hero-ctas .cta-btn,.hero-ctas .btn-g,.hero-ctas .pill-btn{width:100%;justify-content:center}
  .hero-stats{justify-content:flex-start;gap:24px}

  .coaches-grid{grid-template-columns:1fr;gap:14px}
  .coach-card{padding:20px;border-radius:14px}
  .coach-name{font-size:1.2rem}
  .coach-meta{flex-direction:row;flex-wrap:wrap;gap:12px}

  .esoteric-grid{grid-template-columns:repeat(2,1fr);gap:12px}
  .tool-card{padding:18px;min-height:160px;border-radius:14px}

  .chat-wrap{height:calc(100svh - 140px);min-height:0;border-radius:14px}
  .chat-header{padding:14px 16px}
  .chat-msgs{padding:16px;max-height:none}
  .chat-input-row{padding:10px 12px;padding-bottom:calc(10px + var(--safe-b))}
  .msg-bubble{max-width:85%;font-size:.86rem}

  .footer-grid{grid-template-columns:1fr;gap:28px}
  .footer-bottom{flex-direction:column;gap:14px;text-align:center}

  .pytha-grid{grid-template-columns:repeat(3,52px);gap:6px;justify-content:center}
  .pytha-cell{width:52px;height:52px;font-size:1.15rem}

  .archetype-blocks{grid-template-columns:1fr}
  .runes-display{grid-template-columns:1fr;gap:14px}

  .svarga-block{padding:18px 20px;border-radius:12px}

  /* Touch-friendly tap targets */
  button,a.footer-link,.nav-link,.nav-lang,.layer-tab,
  .chat-send,.spec-pill,.pill-btn{min-height:44px}
  .spec-pill,.pill-btn,.nav-lang{padding-top:10px;padding-bottom:10px}
  .footer-link{display:inline-flex;align-items:center;min-height:36px;padding:6px 0}

  .section-title{font-size:clamp(1.5rem,5vw,2rem)}
  .sec-sub{font-size:.92rem}

  .layer-tabs{display:flex;width:100%;padding:6px;border-radius:12px;gap:4px}
  .layer-tab{flex:1;font-size:.62rem;padding:11px 6px;min-height:44px;letter-spacing:.06em}

  .detail-page{padding:80px 18px 60px}
}

/* === LARGE PHONE 640px === */
@media(max-width:640px){
  .hero-title{font-size:clamp(2.4rem,11vw,3.6rem)!important}
  .hero-sub{font-size:.95rem;margin-bottom:28px}
  .esoteric-grid{grid-template-columns:1fr}
  .working-nums{gap:10px;flex-wrap:wrap;justify-content:center}
  .coach-meta{align-items:flex-start}
  .coach-meta .pill-btn{width:100%;justify-content:center;margin-top:8px}

  /* Prevent iOS zoom on inputs */
  .form-row{grid-template-columns:1fr;gap:12px}
  .tool-input,.form-input,.chat-input,textarea.tool-input,textarea.chat-input{
    font-size:16px!important;padding:13px 16px;min-height:48px}
}

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>

<script>
(function(){
  const canvas=document.getElementById('particle-canvas');
  const ctx=canvas.getContext('2d');
  let W,H,pts=[];
  const N=78,CONN=130,SPEED=.26;
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;init()}
  function init(){pts=[];for(let i=0;i<N;i++)pts.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*SPEED,vy:(Math.random()-.5)*SPEED,r:Math.random()*1.4+.4})}
  function isDark(){return document.documentElement.getAttribute('data-theme')!=='light'}
  function layerColor(){
    const layer=document.documentElement.getAttribute('data-layer')||'coach';
    const dark=isDark();
    if(layer==='esoteric')return dark?'126,142,200':'80,104,184';
    if(layer==='svarga')return dark?'176,126,204':'128,80,172';
    return dark?'212,178,122':'139,101,32';
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    const c=layerColor();
    pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1});
    for(let i=0;i<N;i++)for(let j=i+1;j<N;j++){
      const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<CONN){ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.strokeStyle=`rgba(${c},${(1-d/CONN)*.22})`;ctx.lineWidth=.6;ctx.stroke()}
    }
    pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(${c},.55)`;ctx.fill()});
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);resize();draw();
})();
function updateOrbs(layer){
  const o1=document.getElementById('orb1'),o2=document.getElementById('orb2'),o3=document.getElementById('orb3');
  const colors={
    coach:['rgba(212,178,122,.32)','rgba(200,148,110,.18)','rgba(110,160,128,.14)'],
    esoteric:['rgba(126,142,200,.28)','rgba(126,142,200,.18)','rgba(110,160,128,.12)'],
    svarga:['rgba(176,126,204,.30)','rgba(126,142,200,.18)','rgba(176,126,204,.14)']
  };
  const c=colors[layer]||colors.coach;
  o1.style.background=`radial-gradient(circle,${c[0]},transparent 68%)`;
  o2.style.background=`radial-gradient(circle,${c[1]},transparent 68%)`;
  o3.style.background=`radial-gradient(circle,${c[2]},transparent 68%)`;
}
updateOrbs('coach');
</script>

 responses:{
  en:["Your instinct is directionally correct — but let's sharpen the edge. The pattern I see in high-stakes decision-making is optimising for comfort rather than clarity. What would you choose if failure were simply data — not a verdict on your worth? That reframe changes everything. When was the last time you made a decision from your values rather than your fears?",

      "The resistance you're feeling is not weakness — it's intelligence. Every high performer I've worked with experiences exactly this. The body knows when something is misaligned with identity. Let's reverse-engineer what alignment looks like here. Describe the outcome you'd be proud of in five years. Then the one you're afraid of. The gap between those two is your work."],
  ru:["Ваш инстинкт в правильном направлении — но давайте заострим. Паттерн в принятии решений с высокими ставками — оптимизация ради комфорта, а не ясности. Что бы вы выбрали, если бы провал был просто данными — а не приговором вашей ценности? Когда в последний раз вы принимали решение из своих ценностей, а не из страха?",
      "Стратегическая ясность не приходит от большего количества информации. Она приходит от лучших вопросов. Каковы ваши три «нельзя» в этой ситуации? Назовите их — и смотрите, как путь вперёд становится очевидным.",
      "Сопротивление, которое вы чувствуете — не слабость, это интеллект. Каждый высокоэффективный человек, с которым я работал, переживает именно это. Опишите результат, которым будете гордиться через пять лет. Затем тот, которого боитесь. Разрыв между ними — ваша работа."],
  es:["Tu instinto apunta en la dirección correcta — pero afilemos el filo. El patrón en la toma de decisiones de alto riesgo es optimizar para la comodidad en lugar de la claridad. ¿Qué elegirías si el fracaso fuera simplemente datos — no un veredicto sobre tu valor? ¿Cuándo fue la última vez que tomaste una decisión desde tus valores en lugar de tus miedos?",
      "La claridad estratégica no emerge de más información. Emerge de mejores preguntas. ¿Cuáles son tus tres absolutos en esta situación? Nómbralos y observa cómo el camino a seguir se vuelve evidente.",
      "La resistencia que sientes no es debilidad — es inteligencia. Describe el resultado del que estarías orgulloso en cinco años. Luego el que temes. La brecha entre esos dos es tu trabajo."],
  it:["Il tuo istinto è corretto nella direzione — ma affiliamo il taglio. Il pattern nel decision-making ad alto rischio è ottimizzare per il comfort invece che per la chiarezza. Cosa sceglieresti se il fallimento fosse semplicemente dati — non un verdetto sul tuo valore? Quando hai preso l'ultima decisione dai tuoi valori anziché dalle tue paure?",
      "La chiarezza strategica non emerge da più informazioni. Emerge da domande migliori. Quali sono i tuoi tre assoluti in questa situazione? Nominali e osserva come il percorso diventa ovvio.",
      "La resistenza che senti non è debolezza — è intelligenza. Descrivi il risultato di cui saresti orgoglioso tra cinque anni. Poi quello che temi. Il divario tra quei due è il tuo lavoro."],
  he:["האינסטינקט שלך מכוון נכון — אבל בואו נחדד. הדפוס בקבלת החלטות בסיכון גבוה הוא אופטימיזציה לנוחות במקום לבהירות. מה היית בוחר אם כישלון היה פשוט נתונים — לא פסיקה על ערכך? מתי בפעם האחרונה קיבלת החלטה מהערכים שלך ולא מהפחדים?",
      "בהירות אסטרטגית לא צומחת ממידע נוסף. היא צומחת משאלות טובות יותר. מהם שלושת הדברים הבלתי-מתפשרים שלך במצב זה? קרא להם בשם וצפה כיצד הדרך קדימה מתבהרת.",
