 specialties:{en:['Shadow Integration','Emotional Intelligence','Somatic Healing','Relationship Patterns','Trauma Resolution','Depth Psychology'],
  ru:['Интеграция тени','Эмоциональный интеллект','Соматическое исцеление','Паттерны отношений','Разрешение травмы','Глубинная психология'],
  es:['Integración de la Sombra','Inteligencia Emocional','Sanación Somática','Patrones de Relación','Resolución del Trauma','Psicología Profunda'],
  it:["Integrazione dell'Ombra","Intelligenza Emotiva","Guarigione Somatica","Schemi Relazionali","Risoluzione del Trauma","Psicologia Profonda"],
  he:['אינטגרציה של הצל','אינטליגנציה רגשית','ריפוי סומטי','דפוסי מערכות יחסים','פתרון טראומה','פסיכולוגיה עמוקה']},
 philosophy:{en:'Integration — not elimination — is the path to wholeness.',
  ru:'Интеграция — не устранение — путь к целостности.',
  es:'La integración — no la eliminación — es el camino hacia la plenitud.',
  it:"L'integrazione — non l'eliminazione — è il cammino verso la completezza.",
  he:'אינטגרציה — לא ביטול — היא הדרך לשלמות.'},
 approach:{en:'Elena works at the intersection of somatic awareness, shadow work, and neuroscience-informed therapy. She helps clients identify the repeating patterns that were once adaptive — and release them without self-judgment. Sessions feel both intellectually rigorous and deeply human.',
  ru:'Елена работает на пересечении соматического осознания, работы с тенью и нейронаучно обоснованной терапии. Сессии ощущаются как интеллектуально строгие и глубоко человечные.',
  es:'Elena trabaja en la intersección de la conciencia somática, el trabajo con la sombra y la terapia informada por neurociencias.',
  it:"Elena lavora all'intersezione di consapevolezza somatica, lavoro con l'ombra e terapia informata dalle neuroscienze.",
  he:'אלנה עובדת בצומת של מודעות סומטית, עבודת צל וטיפול מיודע מדעי מוח.'},
 responses:{
  en:["What you're describing lives in the body before it reaches the mind. The autonomic nervous system stores relational patterns as somatic memory. When you notice this feeling — where exactly do you feel it physically? That location is the doorway. Most people try to think their way through emotional patterns. The deeper path is to feel your way through — with precision and compassion, not willpower.",
      "The shadow isn't the enemy — it's the exile. Those parts of yourself locked away to stay acceptable, safe, loved. But exiles don't disappear; they find other ways to express. What you're experiencing is a communication from a part of you that has been waiting for witness. What story does this feeling have to tell you?",
      "Relationship patterns are never random. They are exquisitely precise repetitions of early attachment architecture. When you describe this dynamic, I hear a very specific template — one formed long before this relationship existed. The question isn't 'why do they do this?' but 'what in me recognises and recreates this?' That's where agency lives."],
  ru:["То, что вы описываете, живёт в теле до того, как достигает разума. Автономная нервная система хранит реляционные паттерны как соматическую память. Когда вы замечаете это чувство — где именно в теле вы его ощущаете? Это место — дверь. Большинство людей пытаются думать через эмоциональные паттерны. Более глубокий путь — чувствовать через них — с точностью и состраданием, без силы воли.",
      "Тень — не враг, это изгнанник. Те части вас, заперты ради того, чтобы оставаться приемлемым, в безопасности, любимым. Но изгнанники не исчезают. Что сообщает вам эта часть, которая ждала свидетеля?",
      "Паттерны отношений никогда не случайны. Они — точнейшие повторения ранней архитектуры привязанности. Вопрос не «почему они так делают?», а «что во мне узнаёт и воссоздаёт это?». Именно там живёт агентность."],
  es:["Lo que describes vive en el cuerpo antes de llegar a la mente. El sistema nervioso autónomo almacena patrones relacionales como memoria somática. Cuando notas esta sensación — ¿dónde exactamente la sientes físicamente? Ese lugar es la puerta. La mayoría intenta *pensar* a través de los patrones emocionales. El camino más profundo es *sentirlos* — con precisión y compasión.",
      "La sombra no es el enemigo — es el exiliado. Esas partes de ti encerradas para mantenerte aceptable, seguro, amado. Los exiliados no desaparecen; encuentran otras formas de expresarse. ¿Qué historia tiene este sentimiento que contarte?",
      "Los patrones relacionales nunca son aleatorios. Son repeticiones precisas de la arquitectura de apego temprana. La pregunta no es '¿por qué hacen esto?' sino '¿qué en mí reconoce y recrea esto?' Ahí vive la agencia."],
  it:["Quello che descrivi vive nel corpo prima di raggiungere la mente. Il sistema nervioso autonomo immagazzina schemi relazionali come memoria somatica. Quando noti questa sensazione — dove esattamente la senti fisicamente? Quel luogo è la porta. La maggior parte delle persone cerca di *pensare* attraverso i pattern emotivi. Il percorso più profondo è *sentirli* — con precisione e compassione.",
      "L'ombra non è il nemico — è l'esiliato. Quelle parti di te chiuse per restare accettabile, al sicuro, amato. Gli esiliati non scompaiono; trovano altri modi per esprimersi. Che storia ha questo sentimento da raccontarti?",
      "Gli schemi relazionali non sono mai casuali. Sono ripetizioni precise dell'architettura di attaccamento precoce. La domanda non è 'perché fanno così?' ma 'cosa in me riconosce e ricrea questo?' Lì vive l'agency."],
  he:["מה שאתה מתאר חי בגוף לפני שמגיע לנפש. המערכת העצבית האוטונומית מאחסנת דפוסים יחסיים כזיכרון סומטי. כשאתה מבחין בתחושה הזו — איפה בדיוק אתה מרגיש אותה פיזית? המקום הזה הוא הדלת. רוב האנשים מנסים *לחשוב* דרך הדפוסים הרגשיים. הדרך העמוקה יותר היא *להרגיש* דרכם — עם דיוק וחמלה.",
      "הצל אינו האויב — הוא הגולה. החלקים שלך שנסגרו כדי להישאר מקובל, בטוח, אהוב. גולים אינם נעלמים; הם מוצאים דרכים אחרות להתבטא. איזה סיפור יש לתחושה הזו לספר לך?",
      "דפוסי מערכות יחסים אינם אקראיים. הם חזרות מדויקות של ארכיטקטורת ההתקשרות הראשונית. השאלה אינה 'למה הם עושים זאת?' אלא 'מה בי מזהה ומשחזר זאת?' שם חיה האוטונומיה."]}
},
{id:'james',color:'#7E8EC8',accent:'#5870B8',
 name:{en:'James Hartley',ru:'Джеймс Хартли',es:'James Hartley',it:'James Hartley',he:'ג׳יימס הארטלי'},
 title:{en:'Peak Performance & Flow Coach',ru:'Коуч Пиковой Производительности и Потока',es:'Coach de Rendimiento Máximo y Flujo',it:'Coach di Peak Performance e Flow',he:'מאמן ביצועים מרביים וזרימה'},
 tagline:{en:'The mind follows the breath. Master that, and you master everything.',ru:'Разум следует за дыханием. Овладей этим — и ты овладеешь всем.',es:'La mente sigue a la respiración. Domina eso, y lo dominarás todo.',it:'La mente segue il respiro. Padroneggia quello, e padroneggerai tutto.',he:'המוח עוקב אחר הנשימה. שלוט בזה, ושלוט בכל.'},
 bio:{en:'Former Olympic athlete and neuroscience researcher at UCL. James developed the NeuroFlow Method — used by elite athletes, special forces operators, and high-stakes decision-makers. His work sits at the precise intersection of physiology, psychology, and performance science.',
  ru:'Бывший олимпийский атлет и исследователь нейронауки в UCL. Джеймс разработал метод NeuroFlow, используемый элитными атлетами, операторами специальных сил и принимающими сложные решения.',
  es:'Ex atleta olímpico e investigador de neurociencias en la UCL. James desarrolló el Método NeuroFlow — usado por atletas de élite, fuerzas especiales y tomadores de decisiones de alto riesgo.',
  it:'Ex atleta olimpico e ricercatore di neuroscienze alla UCL. James ha sviluppato il Metodo NeuroFlow — usato da atleti d\'élite, forze speciali e decision-maker ad alto rischio.',
  he:'ספורטאי אולימפי לשעבר וחוקר מדעי מוח ב-UCL. ג׳יימס פיתח את שיטת NeuroFlow — בשימוש ספורטאי עלית, כוחות מיוחדים ומקבלי החלטות.'},
 specialties:{en:['Flow State Engineering','Mental Resilience','Performance Anxiety','Athletic Psychology','Breath & Nervous System','High-Stakes Focus'],
  ru:['Проектирование состояния потока','Ментальная устойчивость','Тревога производительности','Спортивная психология','Дыхание и нервная система','Фокус в сложных ситуациях'],
  es:['Ingeniería del Estado de Flujo','Resiliencia Mental','Ansiedad de Rendimiento','Psicología Atlética','Respiración y Sistema Nervioso','Enfoque en Situaciones de Alto Riesgo'],
  it:['Ingegneria del Flusso','Resilienza Mentale','Ansia da Prestazione','Psicologia Atletica','Respiro e Sistema Nervoso','Focus in Situazioni Critiche'],
  he:['הנדסת מצב זרימה','חוסן מנטלי','חרדת ביצועים','פסיכולוגיה אתלטית','נשימה ומערכת עצבים','פוקוס בסיטואציות קריטיות']},
 philosophy:{en:'Flow state is not luck — it is a neurological condition you can engineer on demand.',
  ru:'Состояние потока — не удача, это неврологическое состояние, которое можно создать по требованию.',
  es:'El estado de flujo no es suerte — es una condición neurológica que puedes crear a demanda.',
  it:'Lo stato di flusso non è fortuna — è una condizione neurologica che puoi creare su richiesta.',
  he:'מצב זרימה הוא לא מזל — זוהי מצב נוירולוגי שאפשר להנדס לפי דרישה.'},
 approach:{en:'James works with the NeuroFlow protocol: regulating the autonomic nervous system first, then designing pre-performance rituals, then training the inner observer to quieten. The approach is physiological, measurable, and reproducible across any performance domain.',
  ru:'Джеймс работает с протоколом NeuroFlow: сначала регуляция автономной нервной системы, затем проектирование предперформационных ритуалов, затем тренировка внутреннего наблюдателя для его успокоения.',
  es:'James trabaja con el protocolo NeuroFlow: primero regulando el sistema nervioso autónomo, luego diseñando rituales pre-rendimiento, luego entrenando al observador interior para silenciarlo.',
  it:'James lavora con il protocollo NeuroFlow: prima regolando il sistema nervoso autonomo, poi progettando rituali pre-performance, poi addestrando l\'osservatore interiore a quietarsi.',
  he:'ג׳יימס עובד עם פרוטוקול NeuroFlow: תחילה ויסות מערכת העצבים האוטונומית, לאחר מכן עיצוב טקסים לפני ביצוע, ואז אימון המסתכל הפנימי להשתיק.'},
 responses:{
  en:["Every elite performer I've trained faces exactly this wall. The wall isn't an obstacle — it's a threshold. Your nervous system is protecting you from perceived novelty. Here's the immediate protocol: 4-7-8 breathing right now. Inhale 4 counts, hold 7, exhale 8. Three cycles. Notice what shifts. Then tell me: what are you *actually* afraid of beneath the surface goal?",
      "Flow state has three engineering variables: challenge slightly exceeding skill, clear immediate goals, and zero self-monitoring. You're breaking the third. The internal observer judging your performance in real time is the flow killer. Let's design a pre-performance ritual that silences it. What does your routine look like 30 minutes before your peak performance moment?",
      "Mental resilience is not the absence of breaking — it's the speed of recovery. The Navy calls it 'embracing the suck.' Not enjoying difficulty, but removing the story that difficulty is *wrong*. What narrative are you running about this situation? Because that narrative — not the situation itself — is what's costing you performance."],
  ru:["Каждый элитный исполнитель сталкивается именно с этой стеной. Стена — не препятствие, это порог. Ваша нервная система защищает вас от воспринимаемой новизны. Немедленный протокол: дыхание 4-7-8 прямо сейчас. Вдох 4 счёта, задержка 7, выдох 8. Три цикла. Что изменилось? Затем скажите: чего вы на самом деле боитесь под поверхностной целью?",
      "Состояние потока имеет три инженерные переменные: вызов слегка превышает навык, чёткие немедленные цели и нулевой самоконтроль. Вы нарушаете третью. Внутренний наблюдатель, судящий ваш перформанс в реальном времени — убийца потока. Давайте спроектируем предперформационный ритуал, который его заглушит.",
      "Ментальная устойчивость — не отсутствие срывов, это скорость восстановления. Какое повествование вы ведёте об этой ситуации? Потому что именно оно — а не сама ситуация — стоит вам производительности."],
  es:["Todo performer de élite que he entrenado enfrenta exactamente este muro. El muro no es un obstáculo — es un umbral. Protocolo inmediato: respiración 4-7-8 ahora mismo. Inhala 4 tiempos, retén 7, exhala 8. Tres ciclos. ¿Qué cambia? Dime: ¿de qué tienes *realmente* miedo debajo del objetivo superficial?",
      "El estado de flujo tiene tres variables de ingeniería: desafío que supera ligeramente la habilidad, metas inmediatas claras, y cero automonitoreo. Estás rompiendo la tercera. Diseñemos un ritual previo al rendimiento que lo silencie.",
      "La resiliencia mental no es la ausencia de quiebre — es la velocidad de recuperación. ¿Qué narrativa estás ejecutando sobre esta situación? Porque esa narrativa — no la situación en sí — es lo que te está costando rendimiento."],
  it:["Ogni performer d'élite che ho allenato affronta esattamente questo muro. Il muro non è un ostacolo — è una soglia. Protocollo immediato: respirazione 4-7-8 adesso. Inspira 4 tempi, tieni 7, espira 8. Tre cicli. Cosa cambia? Dimmi: di cosa hai *davvero* paura sotto l'obiettivo superficiale?",
      "Lo stato di flusso ha tre variabili ingegneristiche: sfida leggermente superiore alla skill, obiettivi immediati chiari, e zero automonitoraggio. Stai violando la terza. Progettiamo un rituale pre-performance che lo silenzi.",
      "La resilienza mentale non è l'assenza di cedimento — è la velocità di recupero. Quale narrativa stai eseguendo su questa situazione? Perché quella narrativa — non la situazione stessa — è ciò che ti sta costando performance."],
  he:["כל ספורטאי עלית שאימנתי עומד בדיוק בפני הקיר הזה. הקיר אינו מכשול — הוא סף. פרוטוקול מיידי: נשימת 4-7-8 עכשיו. שאף 4 ספירות, החזק 7, נשוף 8. שלושה מחזורים. מה משתנה? ספר לי: ממה אתה *באמת* מפחד מתחת למטרה השטחית?",
      "מצב הזרימה כולל שלושה משתנים: אתגר שעולה מעט על הכישרון, יעדים מיידיים ברורים, ואפס מעקב עצמי. אתה מפר את השלישי. בואו נתכנן טקס לפני ביצוע שישתיק אותו.",
      "חוסן מנטלי אינו היעדר שבירה — הוא מהירות ההתאוששות. איזה נרטיב אתה מריץ על המצב הזה? כי הנרטיב הזה — לא המצב עצמו — הוא מה שעולה לך בביצועים."]}
},
{id:'sophie',color:'#C8946E',accent:'#A8703A',
 name:{en:'Sophie Laurent',ru:'Софи Лоран',es:'Sophie Laurent',it:'Sophie Laurent',he:'סופי לוראן'},
 title:{en:'Life Design Architect',ru:'Архитектор Жизненного Дизайна',es:'Arquitecta de Diseño de Vida',it:'Architetta di Life Design',he:'ארכיטקטית עיצוב חיים'},
 tagline:{en:"You don't find your purpose — you design it.",ru:'Ты не находишь своё предназначение — ты создаёшь его.',es:'No encuentras tu propósito — lo diseñas.',it:'Non trovi il tuo scopo — lo progetti.',he:'אתה לא מוצא את המטרה שלך — אתה מעצב אותה.'},
 bio:{en:'Stanford d.school graduate and founder of the Life Architecture Framework, used by 40,000+ clients across 28 countries. Sophie spent five years in Paris designing interiors before discovering that the most important space to design is a human life — specifically, the gap between who you are and who you are becoming.',
  ru:'Выпускница Stanford d.school и основатель Life Architecture Framework, используемого 40,000+ клиентами в 28 странах. Пять лет проектировала интерьеры в Париже, прежде чем обнаружила, что самое важное пространство для проектирования — это человеческая жизнь.',
  es:'Graduada de Stanford d.school y fundadora del Life Architecture Framework, usado por 40,000+ clientes en 28 países. Pasó cinco años en París diseñando interiores antes de descubrir que el espacio más importante a diseñar es una vida humana.',
  it:'Laureata alla Stanford d.school e fondatrice del Life Architecture Framework, usato da 40,000+ clienti in 28 paesi. Ha trascorso cinque anni a Parigi a progettare interni prima di scoprire che lo spazio più importante da progettare è una vita umana.',
  he:'בוגרת Stanford d.school ומייסדת Life Architecture Framework, שנמצא בשימוש 40,000+ לקוחות ב-28 מדינות. בילתה חמש שנים בפריז בעיצוב פנים לפני שגילתה שהמרחב החשוב ביותר לעיצוב הוא חיי אדם.'},
 specialties:{en:['Life Architecture','Career Reinvention','Values Alignment','Purpose Design','Identity Transitions','Creative Reinvention'],
  ru:['Архитектура жизни','Переизобретение карьеры','Выравнивание ценностей','Дизайн предназначения','Переходы идентичности','Творческое переизобретение'],
  es:['Arquitectura de Vida','Reinvención de Carrera','Alineación de Valores','Diseño de Propósito','Transiciones de Identidad','Reinvención Creativa'],
  it:['Architettura di Vita','Reinvenzione della Carriera','Allineamento dei Valori','Design dello Scopo','Transizioni di Identità','Reinvenzione Creativa'],
  he:['ארכיטקטורת חיים','המצאה מחדש של קריירה','התאמת ערכים','עיצוב מטרה','מעברי זהות','המצאה מחדש יצירתית']},
 philosophy:{en:'A well-designed life is not the absence of difficulty — it is difficulty in the service of meaning.',
  ru:'Хорошо спроектированная жизнь — это не отсутствие трудностей, это трудности на службе смысла.',
  es:'Una vida bien diseñada no es la ausencia de dificultad — es la dificultad al servicio del significado.',
  it:'Una vita ben progettata non è l\'assenza di difficoltà — è la difficoltà al servizio del significato.',
  he:'חיים מעוצבים היטב אינם היעדר קושי — הם קושי בשירות משמעות.'},
 approach:{en:'Sophie uses design thinking applied to life: prototype, test, iterate. She guides clients through the Life Architecture Audit — mapping current reality against ideal design — and then helps them build intentional transitions rather than reactive changes.',
  ru:'Софи применяет дизайн-мышление к жизни: прототипировать, тестировать, итерировать. Она проводит клиентов через Life Architecture Audit — картирование текущей реальности относительно идеального дизайна.',
  es:'Sophie usa el pensamiento de diseño aplicado a la vida: prototipar, probar, iterar. Guía a los clientes a través del Life Architecture Audit.',
  it:'Sophie usa il design thinking applicato alla vita: prototipare, testare, iterare. Guida i clienti attraverso il Life Architecture Audit.',
  he:'סופי משתמשת בחשיבת עיצוב המיושמת על חיים: פרוטוטייפ, בדיקה, איטרציה.'},
 responses:{
  en:["What I'm hearing is a values conflict dressed as a strategy problem. You're asking 'what should I do?' — but the real question is 'who am I designing for?' Let's do the Life Architecture audit. In your ideal life five years from now — what do you *hear*? What do you *see*? What do you *feel*? Not what you're doing. What you're *experiencing*.",
      "Career reinvention isn't about changing jobs — it's about recovering authorship. Somewhere along the way, your life's story started being written by external expectations. The skills transfer. The network transfers. What doesn't transfer automatically is the *permission* to start over. I'm giving you that permission right now. What have you been pretending not to want?",
      "The values audit is the most revealing tool I use. Write your current top 5 priorities — how you actually spend your time. Then write your true top 5 values. The gap between those two lists is your design problem. Most people's calendars are autobiographies of other people's expectations. Let's write yours."],
  ru:["То, что я слышу — конфликт ценностей, замаскированный под стратегическую проблему. Вы спрашиваете «что мне делать?» — но настоящий вопрос «для кого я проектирую?». В вашей идеальной жизни через пять лет — что вы слышите? Что видите? Что чувствуете? Не что вы делаете. Что вы переживаете.",
      "Переизобретение карьеры — не смена работы, это восстановление авторства. По дороге история вашей жизни начала писаться внешними ожиданиями. Что вы притворялись, что не хотите?",
      "Аудит ценностей — самый показательный инструмент. Запишите 5 реальных приоритетов по тому, как вы тратите время. Затем 5 истинных ценностей. Разрыв между ними — ваша дизайн-проблема."],
  es:["Lo que escucho es un conflicto de valores disfrazado de problema estratégico. Preguntas '¿qué debo hacer?' — pero la pregunta real es '¿para quién estoy diseñando?' En tu vida ideal dentro de cinco años — ¿qué *escuchas*? ¿Qué *ves*? ¿Qué *sientes*? No lo que estás haciendo. Lo que estás *experimentando*.",
      "La reinvención de carrera no es cambiar de trabajo — es recuperar la autoría. Escribe tus cinco prioridades actuales — cómo gastas realmente tu tiempo. Luego tus cinco valores verdaderos. La brecha entre esas dos listas es tu problema de diseño.",
      "La mayoría de los calendarios son autobiografías de las expectativas de otras personas. Vamos a escribir el tuyo. ¿Qué has estado pretendiendo no querer?"],
  it:["Quello che sento è un conflitto di valori travestito da problema strategico. Chiedi 'cosa dovrei fare?' — ma la vera domanda è 'per chi sto progettando?' Nella tua vita ideale tra cinque anni — cosa *senti*? Cosa *vedi*? Cosa *provi*? Non cosa stai facendo. Cosa stai *vivendo*.",
      "La reinvenzione della carriera non è cambiare lavoro — è recuperare la paternità. Scrivi le tue cinque priorità attuali — come spendi davvero il tuo tempo. Poi i tuoi cinque valori veri. Il divario tra quelle due liste è il tuo problema di design.",
      "La maggior parte dei calendari sono autobiografie delle aspettative degli altri. Scriviamo il tuo. Cosa hai finto di non volere?"],
  he:["מה שאני שומעת הוא קונפליקט ערכים מחופש לבעיה אסטרטגית. אתה שואל 'מה עלי לעשות?' — אבל השאלה האמיתית היא 'בשביל מי אני מתכנן?' בחיים האידיאליים שלך בעוד חמש שנים — מה אתה *שומע*? מה אתה *רואה*? מה אתה *מרגיש*? לא מה אתה עושה. מה אתה *חווה*.",
      "המצאה מחדש של קריירה אינה החלפת עבודה — היא שחזור היוצרות. כתוב את חמשת סדרי העדיפויות הנוכחיים שלך — כיצד אתה מבלה את הזמן שלך בפועל. ואז את חמשת הערכים האמיתיים שלך. הפער בין שתי הרשימות הוא בעיית העיצוב שלך.",
      "רוב לוחות השנה הם אוטוביוגרפיות של ציפיות של אחרים. בואו נכתוב את שלך. מה העמדת פנים שאינך רוצה?"]}
},
{id:'cyrus',color:'#6EB89A',accent:'#4E9878',
 name:{en:'Dr. Cyrus Tehrani',ru:'Д-р Кирус Техрани',es:'Dr. Cyrus Tehrani',it:'Dott. Cyrus Tehrani',he:'ד״ר קירוס טהרני'},
 title:{en:'Spiritual Intelligence & Meaning Advisor',ru:'Советник по Духовному Интеллекту и Смыслу',es:'Asesor de Inteligencia Espiritual y Significado',it:'Consulente di Intelligenza Spirituale e Significato',he:'יועץ אינטליגנציה רוחנית ומשמעות'},
 tagline:{en:'Every crisis of meaning is a doorway. The question is whether you step through.',ru:'Каждый кризис смысла — это дверь. Вопрос в том, войдёте ли вы.',es:'Cada crisis de significado es una puerta. La pregunta es si la atraviesas.',it:'Ogni crisi di significato è una porta. La domanda è se la attraversi.',he:'כל משבר משמעות הוא דלת. השאלה היא האם אתה עובר דרכה.'},
 bio:{en:'Scholar of comparative mysticism, transpersonal psychology, and philosophy of mind. Cyrus holds doctorates from Tehran University and the University of Zurich. He has guided seekers through spiritual emergence, existential crisis, and the integration of profound experiences for over two decades.',
  ru:'Учёный в области сравнительного мистицизма, трансперсональной психологии и философии разума. Кирус имеет докторские степени Тегеранского университета и Университета Цюриха.',
  es:'Estudioso del misticismo comparado, la psicología transpersonal y la filosofía de la mente. Cyrus tiene doctorados de la Universidad de Teherán y la Universidad de Zúrich.',
  it:'Studioso di misticismo comparato, psicologia transpersonale e filosofia della mente. Cyrus ha dottorati all\'Università di Teheran e all\'Università di Zurigo.',
  he:'חוקר של מיסטיקה השוואתית, פסיכולוגיה טרנספרסונלית ופילוסופיה של השכל. לקירוס דוקטורטים מאוניברסיטת טהרן ומאוניברסיטת ציריך.'},
 specialties:{en:['Spiritual Crisis Navigation','Meaning & Purpose','Mystical Experience Integration','Cross-Tradition Wisdom','Existential Inquiry','Inner Life Development'],
  ru:['Навигация духовного кризиса','Смысл и предназначение','Интеграция мистического опыта','Мудрость разных традиций','Экзистенциальное исследование','Развитие внутренней жизни'],
  es:['Navegación de Crisis Espiritual','Significado y Propósito','Integración de Experiencias Místicas','Sabiduría Intercultural','Indagación Existencial','Desarrollo de la Vida Interior'],
  it:['Navigazione della Crisi Spirituale','Significato e Scopo','Integrazione di Esperienze Mistiche','Saggezza Interculturale','Indagine Esistenziale','Sviluppo della Vita Interiore'],
  he:['ניווט משבר רוחני','משמעות ומטרה','אינטגרציה של חוויה מיסטית','חוכמת מסורות שונות','חקירה קיומית','פיתוח חיים פנימיים']},
 philosophy:{en:'The dark night of the soul is not the absence of the sacred — it is its most intimate presence.',
  ru:'Тёмная ночь души — не отсутствие священного, а его наиболее интимное присутствие.',
  es:'La noche oscura del alma no es la ausencia de lo sagrado — es su presencia más íntima.',
  it:"La notte oscura dell'anima non è l'assenza del sacro — è la sua presenza più intima.",
  he:'הלילה האפל של הנשמה אינו היעדר הקדוש — זוהי נוכחותו האינטימית ביותר.'},
 approach:{en:"Cyrus draws on Sufi tradition, Vedantic philosophy, and Jungian depth psychology — not as beliefs to adopt, but as maps of interior territory. Sessions blend philosophical dialogue with guided reflection, helping clients distinguish between spiritual emergency and spiritual emergence.",
  ru:'Кирус опирается на суфийскую традицию, веданту и юнгианскую глубинную психологию — не как убеждения для принятия, а как карты внутренней территории. Сессии сочетают философский диалог с направленной рефлексией.',
  es:'Cyrus se apoya en la tradición sufí, la filosofía vedántica y la psicología junguiana — no como creencias a adoptar, sino como mapas de territorio interior.',
  it:'Cyrus si basa sulla tradizione sufi, la filosofia vedantica e la psicologia junghiana — non come credenze da adottare, ma come mappe di territorio interiore.',
  he:'קירוס מסתמך על המסורת הסופית, הפילוסופיה הוודנטית ובפסיכולוגיה יונגיאנית — לא כאמונות לאמץ, אלא כמפות של שטח פנימי.'},
 responses:{
  en:["What you're experiencing has a name in every wisdom tradition — and that naming itself carries healing. In the Sufi tradition, this is *fana*: the dissolution of the constructed self before *baqa* — subsistence in something larger. In Vedanta, it's the moment before *prajna* when the mind exhausts its categories. What feels like loss is actually a loosening. The question I sit with you in is not 'what does this mean?' but 'what is this pointing toward?'",
      "Spiritual crisis is not malfunction — it's an upgrade process that looks catastrophic from the inside. Every tradition I've studied has a map for this territory. The map doesn't make the journey easier, but it makes it legible. You are not breaking down. You are breaking through a specific layer of your constructed reality. What you believed about yourself that no longer fits — that's what deserves examination.",
      "There's a difference between spiritual experience and spiritual integration. Many people have profound experiences — then return to the same psychological architecture, trying to fit a galaxy into a teacup. What you're describing is an integration challenge. The experience gave you data. Now we need to redesign the containers that hold it. What would change in your daily life if this experience were actually true?"],
  ru:["То, что вы переживаете, имеет имя в каждой мудрой традиции — и само это называние несёт исцеление. В суфийской традиции это фана: растворение сконструированного «я» перед бака. Что ощущается как потеря — на самом деле ослабление. Вопрос, с которым я сижу рядом с вами: не 'что это значит?', а 'на что это указывает?'",
      "Духовный кризис — не сбой, это процесс обновления, который изнутри выглядит катастрофически. У каждой традиции есть карта этой территории. Вы не ломаетесь. Вы прорываетесь сквозь конкретный слой сконструированной реальности.",
      "Есть разница между духовным переживанием и духовной интеграцией. Многие люди имеют глубокий опыт — и возвращаются к той же психологической архитектуре. Что изменилось бы в вашей повседневной жизни, если бы этот опыт был действительно правдой?"],
  es:["Lo que experimentas tiene un nombre en cada tradición de sabiduría — y ese nombramiento en sí mismo trae sanación. Lo que se siente como pérdida es en realidad un aflojamiento. La pregunta que comparto contigo no es '¿qué significa esto?' sino '¿hacia qué está apuntando?'",
      "La crisis espiritual no es un mal funcionamiento — es un proceso de actualización que parece catastrófico desde adentro. No estás rompiéndote. Estás atravesando una capa específica de tu realidad construida. ¿Qué creías sobre ti mismo que ya no encaja?",
      "Hay una diferencia entre experiencia espiritual e integración espiritual. Muchas personas tienen experiencias profundas — y regresan a la misma arquitectura psicológica. ¿Qué cambiaría en tu vida diaria si esta experiencia fuera realmente verdadera?"],
  it:["Quello che stai vivendo ha un nome in ogni tradizione di saggezza — e quella denominazione stessa porta guarigione. Quello che sembra una perdita è in realtà un allentamento. La domanda che condivido con te non è 'cosa significa questo?' ma 'verso cosa sta puntando?'",
      "La crisi spirituale non è un malfunzionamento — è un processo di aggiornamento che sembra catastrofico dall'interno. Non ti stai rompendo. Stai attraversando uno strato specifico della tua realtà costruita. Cosa credevi di te stesso che non si adatta più?",
      "C'è una differenza tra esperienza spirituale e integrazione spirituale. Molte persone hanno esperienze profonde — e tornano alla stessa architettura psicologica. Cosa cambierebbe nella tua vita quotidiana se questa esperienza fosse davvero vera?"],
  he:["מה שאתה חווה יש לו שם בכל מסורת חוכמה — וההגדרה עצמה נושאת ריפוי. מה שנרגש כאובדן הוא בעצם שחרור. השאלה שאני יושב איתה לצדך אינה 'מה זה אומר?' אלא 'לאן זה מצביע?'",
      "משבר רוחני אינו תקלה — הוא תהליך עדכון שנראה קטסטרופלי מבפנים. אתה לא נשבר. אתה פורץ דרך שכבה ספציפית של המציאות הבנויה שלך. מה האמנת על עצמך שכבר לא מתאים?",
      "יש הבדל בין חוויה רוחנית לאינטגרציה רוחנית. אנשים רבים חווים חוויות עמוקות — ושבים לאותה ארכיטקטורה פסיכולוגית. מה היה משתנה בחיי היומיום שלך אם החוויה הזו הייתה אמיתית?"]}
},
{id:'mila',color:'#A0C8A0',accent:'#6AA06A',
 name:{en:'Mila Sato',ru:'Мила Сато',es:'Mila Sato',it:'Mila Sato',he:'מילה סאטו'},
 title:{en:'Somatic & Embodiment Guide',ru:'Проводник Соматики и Телесного Воплощения',es:'Guía de Somática y Embodiment',it:'Guida Somatica e di Embodiment',he:'מדריכת סומטיקה וגילום'},
 tagline:{en:'The body is not a vehicle for the mind. It is the mind.',ru:'Тело — не транспортное средство для разума. Оно и есть разум.',es:'El cuerpo no es un vehículo para la mente. Es la mente.',it:'Il corpo non è un veicolo per la mente. È la mente.',he:'הגוף אינו כלי עבור הנפש. הוא הנפש.'},
 bio:{en:'Trained in Continuum Movement, Zen somatic practice, and trauma-informed bodywork. Mila spent 8 years in Kyoto studying the embodied wisdom traditions before bringing her practice to Europe. She works at the frontier of where ancient body intelligence meets contemporary neuroscience.',
  ru:'Прошла подготовку в Continuum Movement, дзен-соматической практике и травма-информированной телесной работе. Мила провела 8 лет в Киото, изучая воплощённые мудрые традиции.',
  es:'Formada en Movimiento Continuum, práctica somática Zen y trabajo corporal informado sobre trauma. Mila pasó 8 años en Kioto estudiando las tradiciones de sabiduría encarnada.',
  it:'Formata nel Movimento Continuum, pratica somatica Zen e bodywork informato sul trauma. Mila ha trascorso 8 anni a Kyoto a studiare le tradizioni di saggezza incarnata.',
  he:'הוכשרה ב-Continuum Movement, פרקטיקה סומטית זן ועבודת גוף מיודעת טראומה. מילה בילתה 8 שנים בקיוטו בלימוד מסורות חוכמה מגולמות.'},
 specialties:{en:['Somatic Awareness','Trauma-Informed Practice','Body-Mind Integration','Movement as Medicine','Chronic Tension Release','Nervous System Regulation'],
  ru:['Соматическое осознание','Травма-информированная практика','Интеграция тела и разума','Движение как лекарство','Освобождение от хронического напряжения','Регуляция нервной системы'],
  es:['Conciencia Somática','Práctica Informada sobre Trauma','Integración Cuerpo-Mente','Movimiento como Medicina','Liberación de Tensión Crónica','Regulación del Sistema Nervioso'],
  it:['Consapevolezza Somatica','Pratica Informata sul Trauma','Integrazione Corpo-Mente','Movimento come Medicina','Rilascio della Tensione Cronica','Regolazione del Sistema Nervioso'],
  he:['מודעות סומטית','פרקטיקה מיודעת טראומה','אינטגרציה גוף-נפש','תנועה כרפואה','שחרור מתח כרוני','ויסות מערכת עצבים']},
 philosophy:{en:'When we stop listening to the body, it finds louder ways to speak. Healing is learning to listen before it shouts.',
  ru:'Когда мы перестаём слушать тело, оно находит более громкие способы говорить. Исцеление — научиться слушать до того, как оно начнёт кричать.',
  es:'Cuando dejamos de escuchar al cuerpo, encuentra formas más fuertes de hablar. Sanar es aprender a escuchar antes de que grite.',
  it:'Quando smettiamo di ascoltare il corpo, trova modi più forti di parlare. Guarire è imparare ad ascoltare prima che urli.',
  he:'כשאנחנו מפסיקים להקשיב לגוף, הוא מוצא דרכים רועשות יותר לדבר. ריפוי הוא ללמוד להקשיב לפני שהוא צועק.'},
 approach:{en:"Mila's sessions begin with body awareness before any verbal content — because the body's report is the most honest data available. She uses somatic inquiry, breath awareness, and movement exploration to access what intellectual processing cannot reach.",
  ru:'Сессии Милы начинаются с телесного осознания до любого вербального содержания — потому что сообщение тела является наиболее честными данными. Она использует соматическое исследование, осознание дыхания и исследование движения.',
  es:'Las sesiones de Mila comienzan con la conciencia corporal antes de cualquier contenido verbal — porque el reporte del cuerpo es el dato más honesto disponible.',
  it:"Le sessioni di Mila iniziano con la consapevolezza corporea prima di qualsiasi contenuto verbale — perché il report del corpo è il dato più onesto disponibile.",
  he:'הסשנים של מילה מתחילים במודעות גוף לפני כל תוכן מילולי — כי הדיווח של הגוף הוא הנתון הכנה ביותר הזמין.'},
 responses:{
  en:["Let's start where all my work starts: with the body's report. Right now, as you read this — what's actually happening in your physical body? Not what you think about your situation. What your body is *doing*. The tension in your shoulders, the pace of your breath, the weight in your chest. This body-state is not incidental to your challenge — it *is* your challenge, expressed in the language the body speaks best.",
      "Chronic patterns of tension are not flaws in your body's design — they are protective intelligence that outlived its threat. Your nervous system learned something at some point about what's dangerous, and it has been faithful to that learning ever since. The therapeutic question is not 'how do I relax this?' but 'what is this tension protecting?' When you meet it with genuine curiosity — something begins to soften.",
      "Movement is not exercise. Movement is listening. When we move in ways that are responsive rather than goal-oriented — slow, explorative, curious — the body reveals its own intelligence. I want to offer you a practice: close your eyes and let your body move however it wants for three minutes. No goal, no correctness. Just listening. What does it want?"],
  ru:["Начнём с того, с чего начинается вся моя работа: с сообщения тела. Прямо сейчас — что происходит в вашем физическом теле? Не то, что вы думаете о своей ситуации. Что тело делает. Напряжение в плечах, темп дыхания. Это состояние тела — не случайность по отношению к вашему вызову. Это и есть ваш вызов.",
      "Хронические паттерны напряжения — не дефекты тела. Это защитный интеллект, переживший свою угрозу. Терапевтический вопрос не «как мне расслабиться?», а «что это напряжение защищает?». Когда вы встречаете его с настоящим любопытством — что-то начинает смягчаться.",
      "Движение — не упражнение. Движение — слушание. Закройте глаза и позвольте телу двигаться как хочет три минуты. Никаких целей, никакой правильности. Просто слушание. Чего оно хочет?"],
  es:["Comencemos donde comienza todo mi trabajo: con el informe del cuerpo. Ahora mismo — ¿qué está pasando realmente en tu cuerpo físico? No lo que piensas sobre tu situación. Lo que tu cuerpo está *haciendo*. La tensión en tus hombros, el ritmo de tu respiración. Este estado corporal *es* tu desafío, expresado en el lenguaje que el cuerpo habla mejor.",
      "Los patrones crónicos de tensión no son defectos del cuerpo — son inteligencia protectora que sobrevivió a su amenaza. La pregunta terapéutica no es '¿cómo me relajo?' sino '¿qué está protegiendo esta tensión?' Cuando la encuentras con genuina curiosidad — algo comienza a suavizarse.",
      "El movimiento no es ejercicio. El movimiento es escuchar. Cierra los ojos y deja que tu cuerpo se mueva como quiera durante tres minutos. Sin meta, sin corrección. Solo escuchando. ¿Qué quiere?"],
  it:["Iniziamo da dove inizia tutto il mio lavoro: con il rapporto del corpo. Proprio adesso — cosa sta accadendo davvero nel tuo corpo fisico? Non cosa pensi della tua situazione. Cosa il tuo corpo sta *facendo*. La tensione nelle spalle, il ritmo del respiro. Questo stato corporeo *è* la tua sfida, espressa nel linguaggio che il corpo parla meglio.",
      "I pattern cronici di tensione non sono difetti del corpo — sono intelligenza protettiva che è sopravvissuta alla sua minaccia. La domanda terapeutica non è 'come mi rilasso?' ma 'cosa sta proteggendo questa tensione?' Quando la incontri con genuina curiosità — qualcosa inizia ad ammorbidirsi.",
      "Il movimento non è esercizio. Il movimento è ascolto. Chiudi gli occhi e lascia che il tuo corpo si muova come vuole per tre minuti. Nessun obiettivo, nessuna correttezza. Solo ascolto. Cosa vuole?"],
  he:["נתחיל מהמקום שבו מתחילה כל עבודתי: עם דוח הגוף. עכשיו ממש — מה קורה בפועל בגוף הפיזי שלך? לא מה שאתה חושב על המצב שלך. מה הגוף שלך *עושה*. המתח בכתפיים, קצב הנשימה. מצב הגוף הזה *הוא* האתגר שלך, מבוטא בשפה שהגוף מדבר הכי טוב.",
      "דפוסי מתח כרוני אינם פגמים של הגוף — הם אינטליגנציה מגוננת ששרדה את האיום שלה. השאלה הטיפולית אינה 'איך אני נרגע?' אלא 'מה המתח הזה מגן עליו?' כשאתה פוגש אותו בסקרנות אמיתית — משהו מתחיל להתרכך.",
      "תנועה אינה פעילות גופנית. תנועה היא הקשבה. עצום עיניים ותן לגוף שלך לנוע כרצונו שלוש דקות. ללא מטרה, ללא נכונות. פשוט הקשבה. מה הוא רוצה?"]}
}];

const RUNES=[
  {name:'Fehu',sym:'ᚠ',pos:{en:'Past',ru:'Прошлое',es:'Pasado',it:'Passato',he:'עבר'},meaning:{en:'Abundance flowing toward you. Wealth, new beginnings, material and spiritual fortune.',ru:'Изобилие течёт к вам. Богатство, новые начинания, материальная и духовная удача.',es:'Abundancia que fluye hacia ti. Riqueza, nuevos comienzos, fortuna material y espiritual.',it:'Abbondanza che fluisce verso di te. Ricchezza, nuovi inizi, fortuna materiale e spirituale.',he:'שפע זורם אליך. עושר, התחלות חדשות, מזל חומרי ורוחני.'}},
  {name:'Uruz',sym:'ᚢ',meaning:{en:'Primal strength awakening. The ox-force within you stirs — raw vitality and untamed potential.',ru:'Первобытная сила пробуждается. Сила быка внутри вас шевелится — жизненность и необузданный потенциал.',es:'Fuerza primordial despertando. La fuerza del buey dentro de ti se agita — vitalidad cruda y potencial salvaje.',it:'Forza primordiale che si risveglia. La forza del bue dentro di te si agita — vitalità grezza e potenziale selvaggio.',he:'כוח ראשוני מתעורר. כוח השור בתוכך מתנוע — חיוניות גולמית ופוטנציאל פרוע.'}},
  {name:'Thurisaz',sym:'ᚦ',meaning:{en:'A challenge initiating transformation. Gateway guardian — this friction exists to forge you.',ru:'Вызов, инициирующий трансформацию. Страж врат — это трение существует, чтобы закалить вас.',es:'Un desafío que inicia la transformación. Guardián del umbral — esta fricción existe para forjarte.',it:'Una sfida che avvia la trasformazione. Guardiano della soglia — questa frizione esiste per temprare.',he:'אתגר שמתחיל טרנספורמציה. שומר הסף — חיכוך זה קיים כדי לצרף אותך.'}},
  {name:'Ansuz',sym:'ᚨ',meaning:{en:'Divine message arriving. Listen deeply — wisdom is speaking through coincidence and signal.',ru:'Приходит божественное послание. Слушайте глубоко — мудрость говорит через совпадение и сигнал.',es:'Mensaje divino llegando. Escucha profundamente — la sabiduría habla a través de la coincidencia y la señal.',it:'Messaggio divino in arrivo. Ascolta profondamente — la saggezza parla attraverso la coincidenza e il segnale.',he:'מסר אלוהי מגיע. הקשב עמוקות — חוכמה מדברת דרך צירוף מקרים ואות.'}},
  {name:'Raidho',sym:'ᚱ',meaning:{en:'Right action aligned with cosmic rhythm. Your journey is in perfect timing.',ru:'Правильное действие согласовано с космическим ритмом. Ваше путешествие в совершенном времени.',es:'Acción correcta alineada con el ritmo cósmico. Tu viaje está en el momento perfecto.',it:'Azione giusta allineata con il ritmo cosmico. Il tuo viaggio è al momento perfetto.',he:'פעולה נכונה מיושרת עם הקצב הקוסמי. המסע שלך בתזמון מושלם.'}},
  {name:'Kenaz',sym:'ᚲ',meaning:{en:'Inner light illuminates the hidden. Creative fire ignites — revelation clarifies your path.',ru:'Внутренний свет освещает скрытое. Творческий огонь зажигается — откровение проясняет ваш путь.',es:'La luz interior ilumina lo oculto. El fuego creativo se enciende — la revelación clarifica tu camino.',it:'La luce interiore illumina il nascosto. Il fuoco creativo si accende — la rivelazione chiarisce il tuo cammino.',he:'אור פנימי מאיר את הנסתר. אש יוצרת מתלקחת — התגלות מבהירה את דרכך.'}},
  {name:'Gebo',sym:'ᚷ',meaning:{en:'Sacred exchange — what you give returns multiplied. Honour the gift by receiving fully.',ru:'Священный обмен — то, что вы даёте, возвращается умноженным. Чтите дар, принимая полностью.',es:'Intercambio sagrado — lo que das regresa multiplicado. Honra el don recibiéndolo plenamente.',it:'Scambio sacro — ciò che dai ritorna moltiplicato. Onora il dono ricevendolo pienamente.',he:'חילופין קדושים — מה שאתה נותן חוזר מוכפל. כבד את המתנה על ידי קבלה מלאה.'}},
  {name:'Wunjo',sym:'ᚹ',meaning:{en:'Joy and harmony as your natural state. The clouds are parting — radiance is your inheritance.',ru:'Радость и гармония как ваше естественное состояние. Облака расходятся — сияние ваше наследство.',es:'Alegría y armonía como tu estado natural. Las nubes se disipan — la radiancia es tu herencia.',it:'Gioia e armonia come tuo stato naturale. Le nuvole si disperdono — la radianza è la tua eredità.',he:'שמחה והרמוניה כמצב הטבעי שלך. העננים מתפזרים — הזוהר הוא ירושתך.'}},
  {name:'Hagalaz',sym:'ᚺ',meaning:{en:'Necessary disruption. What breaks was not built to last — from hailstorm comes fertile ground.',ru:'Необходимое разрушение. То, что ломается, не было создано длиться — из града возникает плодородная почва.',es:'Interrupción necesaria. Lo que se rompe no fue construido para durar — del granizo surge tierra fértil.',it:'Interruzione necessaria. Ciò che si rompe non era costruito per durare — dalla grandine emerge terra fertile.',he:'שיבוש הכרחי. מה שנשבר לא נבנה לשרוד — מברד צומחת קרקע פורייה.'}},
  {name:'Nauthiz',sym:'ᚾ',meaning:{en:'Resistance is the forge. Friction and constraint are shaping you precisely as needed.',ru:'Сопротивление — кузница. Трение и ограничение формируют вас именно так, как нужно.',es:'La resistencia es la forja. La fricción y la restricción te están moldeando exactamente como se necesita.',it:'La resistenza è la fucina. La frizione e il vincolo ti stanno plasmando esattamente come necessario.',he:'התנגדות היא הכור. חיכוך ומגבלה מעצבים אותך בדיוק כפי שנדרש.'}},
  {name:'Isa',sym:'ᛁ',meaning:{en:'Stillness and crystallisation. Pause is not stagnation — it is gathering before the movement.',ru:'Тишина и кристаллизация. Пауза — не застой, это собирание перед движением.',es:'Quietud y cristalización. La pausa no es estancamiento — es reunión antes del movimiento.',it:'Quiete e cristallizzazione. La pausa non è stagnazione — è raccoglimento prima del movimento.',he:'דממה וגיבוש. הפסקה אינה קיפאון — היא איסוף לפני התנועה.'}},
  {name:'Jera',sym:'ᛃ',meaning:{en:'Harvest of patient effort. The seeds you planted in darkness now yield their fruit.',ru:'Урожай терпеливых усилий. Семена, посеянные в темноте, теперь дают свои плоды.',es:'Cosecha del esfuerzo paciente. Las semillas que plantaste en la oscuridad ahora dan sus frutos.',it:'Raccolto dello sforzo paziente. I semi che hai piantato nell\'oscurità ora danno i loro frutti.',he:'קציר מאמץ סבלני. הזרעים שזרעת בחשכה עכשיו נותנים פרי.'}},
  {name:'Eihwaz',sym:'ᛇ',meaning:{en:'The World Tree — endurance through trials. You are the bridge between what was and what will be.',ru:'Мировое дерево — стойкость в испытаниях. Вы — мост между тем, что было, и тем, что будет.',es:'El Árbol del Mundo — resistencia ante las pruebas. Eres el puente entre lo que fue y lo que será.',it:"L'Albero del Mondo — resistenza attraverso le prove. Sei il ponte tra ciò che era e ciò che sarà.",he:'עץ העולם — סיבולת בניסיונות. אתה הגשר בין מה שהיה לבין מה שיהיה.'}},
  {name:'Perthro',sym:'ᛈ',meaning:{en:'The hidden well of fate. Mystery and revelation — not all is meant to be known before it arrives.',ru:'Скрытый источник судьбы. Тайна и откровение — не всё предназначено для знания до прибытия.',es:'El pozo oculto del destino. Misterio y revelación — no todo está destinado a conocerse antes de llegar.',it:'Il pozzo nascosto del destino. Mistero e rivelazione — non tutto è destinato ad essere conosciuto prima di arrivare.',he:'הבאר הנסתרת של הגורל. סוד והתגלות — לא כל דבר מיועד להיות ידוע לפני שמגיע.'}},
  {name:'Algiz',sym:'ᛉ',meaning:{en:'Divine protection surrounds you. Walk forward with confidence — you are not navigating this alone.',ru:'Божественная защита окружает вас. Идите вперёд с уверенностью — вы не навигируете это в одиночку.',es:'La protección divina te rodea. Avanza con confianza — no estás navegando esto solo.',it:'La protezione divina ti circonda. Avanza con fiducia — non stai navigando questo da solo.',he:'הגנה אלוהית מקיפה אותך. לך קדימה בביטחון — אינך מנווט זאת לבד.'}},
  {name:'Sowilo',sym:'ᛊ',meaning:{en:'Victory and wholeness. The sun lights your way — and that same light lives within you.',ru:'Победа и целостность. Солнце освещает ваш путь — и тот же свет живёт внутри вас.',es:'Victoria y plenitud. El sol ilumina tu camino — y esa misma luz vive dentro de ti.',it:'Vittoria e completezza. Il sole illumina il tuo cammino — e quella stessa luce vive dentro di te.',he:'ניצחון ושלמות. השמש מאירה את דרכך — ואותו אור חי בתוכך.'}},
  {name:'Tiwaz',sym:'ᛏ',meaning:{en:"Warrior's justice and sacrifice. What you are willing to lose defines the integrity of your victory.",ru:'Справедливость и жертва воина. То, чем вы готовы пожертвовать, определяет целостность вашей победы.',es:'Justicia y sacrificio del guerrero. Lo que estás dispuesto a perder define la integridad de tu victoria.',it:"Giustizia e sacrificio del guerriero. Ciò che sei disposto a perdere definisce l'integrità della tua vittoria.",he:'צדק והקרבה של הלוחם. מה שאתה מוכן להפסיד מגדיר את יושרת הניצחון שלך.'}},
  {name:'Berkano',sym:'ᛒ',meaning:{en:'New birth gestating within you. Protect this tender beginning with patience and gentleness.',ru:'Новое рождение вынашивается внутри вас. Защитите это нежное начало терпением и нежностью.',es:'Nuevo nacimiento gestándose dentro de ti. Protege este tierno comienzo con paciencia y ternura.',it:'Nuova nascita in gestazione dentro di te. Proteggi questo tenero inizio con pazienza e delicatezza.',he:'לידה חדשה מתפתחת בתוכך. הגן על התחלה עדינה זו בסבלנות ועדינות.'}},
  {name:'Ehwaz',sym:'ᛖ',meaning:{en:'Partnership and trust in motion. The horse and rider — when trust is complete, flight becomes possible.',ru:'Партнёрство и доверие в движении. Лошадь и всадник — когда доверие полно, полёт становится возможным.',es:'Asociación y confianza en movimiento. El caballo y el jinete — cuando la confianza es completa, el vuelo se vuelve posible.',it:'Partnership e fiducia in movimento. Il cavallo e il cavaliere — quando la fiducia è completa, il volo diventa possibile.',he:'שותפות ואמון בתנועה. הסוס והרוכב — כשהאמון שלם, הטיסה הופכת אפשרית.'}},
  {name:'Mannaz',sym:'ᛗ',meaning:{en:'Self-knowledge and humanity. You are both the observer and the observed — know yourself fully.',ru:'Самопознание и человечество. Вы одновременно наблюдатель и наблюдаемый — познайте себя полностью.',es:'Autoconocimiento y humanidad. Eres tanto el observador como el observado — conócete plenamente.',it:'Autoconoscenza e umanità. Sei sia l\'osservatore che l\'osservato — conosciti pienamente.',he:'הכרה עצמית ואנושות. אתה גם המסתכל וגם הנצפה — הכר את עצמך במלואו.'}},
  {name:'Laguz',sym:'ᛚ',meaning:{en:'Flow and intuition. Stop fighting the current — it knows the direction.',ru:'Поток и интуиция. Перестаньте бороться с течением — оно знает направление.',es:'Flujo e intuición. Deja de luchar contra la corriente — sabe la dirección.',it:'Flusso e intuizione. Smetti di combattere la corrente — sa la direzione.',he:'זרימה ואינטואיציה. הפסק להילחם בזרם — הוא יודע את הכיוון.'}},
  {name:'Ingwaz',sym:'ᛜ',meaning:{en:'Completion and fertile potential. The inner work done in darkness now bears fruit in the world.',ru:'Завершение и плодородный потенциал. Внутренняя работа, сделанная в темноте, теперь приносит плоды в мире.',es:'Finalización y potencial fértil. El trabajo interior hecho en la oscuridad ahora da frutos en el mundo.',it:'Completamento e potenziale fertile. Il lavoro interiore fatto nell\'oscurità ora porta frutti nel mondo.',he:'השלמה ופוטנציאל פורה. העבודה הפנימית שנעשתה בחשכה עכשיו נושאת פרי בעולם.'}},
  {name:'Othala',sym:'ᛟ',meaning:{en:'Ancestral wisdom and roots. Your lineage carries strength you have not yet fully claimed.',ru:'Мудрость предков и корни. Ваша родословная несёт силу, которую вы ещё не полностью присвоили.',es:'Sabiduría ancestral y raíces. Tu linaje lleva una fuerza que aún no has reclamado completamente.',it:'Saggezza ancestrale e radici. Il tuo lignaggio porta una forza che non hai ancora pienamente rivendicato.',he:'חוכמת אבות ושורשים. שושלתך נושאת כוח שעדיין לא תבעת במלואו.'}},
  {name:'Dagaz',sym:'ᛞ',meaning:{en:'Dawn and breakthrough. You stand at the exact moment where night becomes day — step through.',ru:'Рассвет и прорыв. Вы стоите в точный момент, когда ночь становится днём — войдите.',es:'Amanecer y avance. Estás en el momento exacto en que la noche se convierte en día — da el paso.',it:'Alba e svolta. Ti trovi nell\'esatto momento in cui la notte diventa giorno — varca la soglia.',he:'שחר ופריצת דרך. אתה עומד ברגע המדויק שבו הלילה הופך ליום — עבור דרכו.'}}
];

const ARCHETYPES=[
  {id:'sage',name:{en:'The Sage',ru:'Мудрец',es:'El Sabio',it:'Il Saggio',he:'החכם'},color:'#7E8EC8',sym:'◈',
   desc:{en:"Truth is your highest value. Your superpower is clarity of understanding — you see what others miss. Your shadow: analysis paralysis. The Sage's gift is wisdom that sets others free.",ru:'Истина — ваша высшая ценность. Ваша суперсила — ясность понимания. Ваша тень — паралич анализа. Дар Мудреца — мудрость, освобождающая других.',es:'La verdad es tu valor supremo. Tu superpoder es la claridad de comprensión. Tu sombra: la parálisis del análisis. El don del Sabio es la sabiduría que libera a otros.',it:'La verità è il tuo valore supremo. Il tuo superpotere è la chiarezza di comprensione. La tua ombra: la paralisi da analisi. Il dono del Saggio è la saggezza che libera gli altri.',he:'אמת היא הערך הגבוה שלך. כוח העל שלך הוא בהירות ההבנה. הצל שלך: שיתוק מניתוח. מתנת החכם היא חוכמה שמשחררת אחרים.'}},
  {id:'hero',name:{en:'The Hero',ru:'Герой',es:'El Héroe',it:'L\'Eroe',he:'הגיבור'},color:'#D4B27A',sym:'⚔',
   desc:{en:'Challenge is your fuel. Your courage transforms obstacles into proving grounds. Your shadow: ego needing to be seen as capable. The Hero\'s gift is courage that inspires others to act.',ru:'Вызов — ваше топливо. Ваше мужество превращает препятствия в испытательные площадки. Ваша тень — эго, нуждающееся в том, чтобы его видели способным. Дар Героя — мужество, вдохновляющее других.',es:'El desafío es tu combustible. Tu coraje transforma los obstáculos en campos de prueba. Tu sombra: el ego que necesita ser visto como capaz. El don del Héroe es el valor que inspira a otros a actuar.',it:'La sfida è il tuo carburante. Il tuo coraggio trasforma gli ostacoli in campi di prova. La tua ombra: l\'ego che ha bisogno di essere visto come capace. Il dono dell\'Eroe è il coraggio che ispira gli altri ad agire.',he:'אתגר הוא הדלק שלך. אומץ לבך הופך מכשולים לשטחי הוכחה. הצל שלך: אגו שצריך להיות נראה מסוגל. מתנת הגיבור היא אומץ שמעורר אחרים לפעולה.'}},
  {id:'lover',name:{en:'The Lover',ru:'Влюблённый',es:'El Amante',it:'L\'Amante',he:'האוהב'},color:'#C8946E',sym:'♡',
   desc:{en:'You live for depth, beauty, and connection. Your gift is the capacity to love fully and passionately. Your shadow: losing yourself in others. The Lover\'s gift is passion that beautifies the world.',ru:'Вы живёте ради глубины, красоты и связи. Ваш дар — способность любить полностью и страстно. Ваша тень — терять себя в других. Дар Влюблённого — страсть, украшающая мир.',es:'Vives para la profundidad, la belleza y la conexión. Tu don es la capacidad de amar plena y apasionadamente. Tu sombra: perderte en otros. El don del Amante es la pasión que embellece el mundo.',it:'Vivi per la profondità, la bellezza e la connessione. Il tuo dono è la capacità di amare pienamente e appassionatamente. La tua ombra: perderti negli altri. Il dono dell\'Amante è la passione che abbellisce il mondo.',he:'אתה חי למען עומק, יופי וקשר. מתנתך היא יכולת לאהוב במלואו ובלהט. הצל שלך: לאבד את עצמך באחרים. מתנת האוהב היא תשוקה שמיפה את העולם.'}},
  {id:'creator',name:{en:'The Creator',ru:'Творец',es:'El Creador',it:'Il Creatore',he:'היוצר'},color:'#6EB89A',sym:'✦',
   desc:{en:'You must make. Ideas and visions flow through you as natural expression. Your shadow: perfectionism that never ships. The Creator\'s gift is vision that reshapes reality.',ru:'Вы должны творить. Идеи и видения текут через вас как естественное выражение. Ваша тень — перфекционизм, который ничего не завершает. Дар Творца — видение, меняющее реальность.',es:'Debes crear. Ideas y visiones fluyen a través de ti como expresión natural. Tu sombra: el perfeccionismo que nunca lanza. El don del Creador es la visión que transforma la realidad.',it:'Devi creare. Idee e visioni fluiscono attraverso di te come espressione naturale. La tua ombra: il perfezionismo che non lancia mai. Il dono del Creatore è la visione che trasforma la realtà.',he:'עליך ליצור. רעיונות וחזיונות זורמים דרכך כביטוי טבעי. הצל שלך: שלמנות שלא משחררת לעולם. מתנת היוצר היא חזון שמשנה מציאות.'}},
  {id:'ruler',name:{en:'The Ruler',ru:'Правитель',es:'El Gobernante',it:'Il Sovrano',he:'השליט'},color:'#D4B27A',sym:'♛',
   desc:{en:'You are built to lead and create order from chaos. Your gift is the capacity to build enduring structures. Your shadow: control as compensation for fear. The Ruler\'s gift is authority that genuinely serves.',ru:'Вы созданы для лидерства и создания порядка из хаоса. Ваш дар — способность строить долговечные структуры. Ваша тень — контроль как компенсация страха. Дар Правителя — авторитет, который искренне служит.',es:'Estás construido para liderar y crear orden del caos. Tu don es la capacidad de construir estructuras duraderas. Tu sombra: el control como compensación del miedo. El don del Gobernante es la autoridad que genuinamente sirve.',it:"Sei fatto per guidare e creare ordine dal caos. Il tuo dono è la capacità di costruire strutture durature. La tua ombra: il controllo come compensazione della paura. Il dono del Sovrano è l'autorità che genuinamente serve.",he:'אתה בנוי להנהיג וליצור סדר מתוך כאוס. מתנתך היא יכולת לבנות מבנים מתמשכים. הצל שלך: שליטה כפיצוי על פחד. מתנת השליט היא סמכות שמשרתת באמת.'}},
  {id:'magician',name:{en:'The Magician',ru:'Маг',es:'El Mago',it:'Il Mago',he:'הקוסם'},color:'#B07ECC',sym:'⊛',
   desc:{en:'You transform reality. You see patterns others miss and catalyse profound change. Your shadow: manipulation — using gifts for power rather than truth. The Magician\'s gift is transformation itself.',ru:'Вы трансформируете реальность. Вы видите паттерны, которые другие упускают. Ваша тень — манипуляция, использование даров для власти, а не для истины. Дар Мага — сама трансформация.',es:'Transformas la realidad. Ves patrones que otros pierden y catalizas cambios profundos. Tu sombra: la manipulación — usar dones para el poder en lugar de la verdad. El don del Mago es la transformación misma.',it:'Trasformi la realtà. Vedi pattern che gli altri mancano e catalizza cambiamenti profondi. La tua ombra: la manipolazione — usare i doni per il potere piuttosto che per la verità. Il dono del Mago è la trasformazione stessa.',he:'אתה מטמיר מציאות. אתה רואה דפוסים שאחרים מפספסים. הצל שלך: מניפולציה — שימוש במתנות לכוח ולא לאמת. מתנת הקוסם היא הטרנספורמציה עצמה.'}},
  {id:'caregiver',name:{en:'The Caregiver',ru:'Опекун',es:'El Cuidador',it:'Il Custode',he:'המטפל'},color:'#A0C8A0',sym:'❤',

function scoreArchetype(a){
  const mp=[[['sage','magician'],['hero','ruler'],['explorer','creator'],['caregiver','lover']],[['sage','magician'],['explorer','creator'],['lover','caregiver'],['ruler','hero']],[['sage','creator'],['hero','ruler'],['magician','explorer'],['caregiver','lover']]];
  const t={};
  a.forEach((v,i)=>{(mp[i][v]||[]).forEach(id=>{t[id]=(t[id]||0)+1})});
  const best=Object.entries(t).sort((a,b)=>b[1]-a[1])[0];
  const id=best?best[0]:'sage';
  return ARCHETYPES.find(x=>x.id===id)||ARCHETYPES[0];
}

/* utilities */
function sumD(n){const s=String(Math.abs(n)).split('').reduce((a,c)=>a+parseInt(c),0);return s>9?sumD(s):s;}
function calcPytha(dob){
  const parts=dob.split('.');
  if(parts.length!==3)return null;
  const [d,m,y]=[parseInt(parts[0]),parseInt(parts[1]),parseInt(parts[2])];
  if(!d||!m||!y||y<1900||y>2100||m<1||m>12||d<1||d>31)return null;
  const n1=sumD(d),n2=sumD(m),n3=sumD(y),n4=sumD(n1+n2+n3);
  const all=[...String(d),...String(m),...String(y),...String(n1),...String(n2),...String(n3),...String(n4)].map(Number).filter(x=>x>0);
  const cnt={};for(let i=1;i<=9;i++)cnt[i]=all.filter(x=>x===i).length;
  return{cnt,n1,n2,n3,n4};
}
function numFromName(name){
  const mp={a:1,b:2,c:3,d:4,e:5,f:8,g:3,h:5,i:1,j:1,k:2,l:3,m:4,n:5,o:7,p:8,q:1,r:2,s:3,t:4,u:6,v:6,w:6,x:5,y:1,z:7};
  const vow='aeiou';
  const ls=name.toLowerCase().replace(/[^a-z]/g,'').split('');
  return{dest:sumD(ls.reduce((a,c)=>a+(mp[c]||0),0)),soul:sumD(ls.filter(c=>vow.includes(c)).reduce((a,c)=>a+(mp[c]||0),0)),persona:sumD(ls.filter(c=>!vow.includes(c)).reduce((a,c)=>a+(mp[c]||0),0))};
}
function zodiacSign(dob,lang){
  const [d,m]=dob.split('.').map(Number);
  if(!d||!m)return'';
  const s=[['♈','Aries','Овен','Aries','Ariete','טלה'],['♉','Taurus','Телец','Tauro','Toro','שור'],['♊','Gemini','Близнецы','Géminis','Gemelli','תאומים'],['♋','Cancer','Рак','Cáncer','Cancro','סרטן'],['♌','Leo','Лев','Leo','Leone','אריה'],['♍','Virgo','Дева','Virgo','Vergine','בתולה'],['♎','Libra','Весы','Libra','Bilancia','מאזניים'],['♏','Scorpio','Скорпион','Escorpio','Scorpione','עקרב'],['♐','Sagittarius','Стрелец','Sagitario','Sagittario','קשת'],['♑','Capricorn','Козерог','Capricornio','Capricorno','גדי'],['♒','Aquarius','Водолей','Aquario','Acquario','דלי'],['♓','Pisces','Рыбы','Piscis','Pesci','דגים']];
  const cut=[[21,3],[20,4],[21,5],[21,6],[23,7],[23,8],[23,9],[23,10],[22,11],[22,12],[20,1],[19,2]];
  let idx=0;for(let i=0;i<12;i++){const[dd,mm]=cut[i];if(m===mm&&d>=dd||m===(mm%12+1)&&d<dd){idx=i;break}}
  const langI={en:1,ru:2,es:3,it:4,he:5}[lang]||1;
  return s[idx][0]+' '+s[idx][langI];
}
function useReveal(deps){
  useEffect(()=>{
    const ob=new IntersectionObserver(es=>{
      es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');ob.unobserve(e.target);}});
    },{threshold:.08,rootMargin:'0px 0px -10% 0px'});
    // Run on next frame so React has flushed the DOM
    const id=requestAnimationFrame(()=>{
      document.querySelectorAll('.rv:not(.in)').forEach(el=>{
        const r=el.getBoundingClientRect();
        if(r.top<window.innerHeight){el.classList.add('in');}
        else ob.observe(el);
      });
    });
    return()=>{cancelAnimationFrame(id);ob.disconnect();};
  },deps||[]);
}

    es:["El movimiento es medicina — pero el tipo importa. Tu perfil sugiere un exceso de compromiso con resultados de alta intensidad y un déficit de movimiento restaurador. Añade yoga nidra o yin yoga 3 veces por semana. No son pasivos — son recalibración activa del sistema nervioso respaldada por investigación sólida.",
        "Tu cuerpo ha estado cargando más tensión de la que procesa. La fascia almacena contenido emocional no resuelto como patrones crónicos de tensión. El trabajo corporal diario — incluso 10 minutos de automasaje o estiramiento consciente — comienza a liberar lo que el procesamiento intelectual no puede alcanzar."],
    it:["Il movimento è medicina — ma il tipo conta. Il tuo profilo suggerisce un eccessivo coinvolgimento con output ad alta intensità e un insufficiente coinvolgimento con il movimento rigenerativo. Aggiungi yoga nidra o yin yoga 3 volte a settimana. Non sono passivi — sono ricalibrazione attiva del sistema nervioso con forte supporto della ricerca.",
        "Il tuo corpo ha portato più tensione di quella che elabora. La fascia memorizza contenuto emotivo irrisolto come schemi cronici di tensione. Il lavoro corporeo quotidiano — anche solo 10 minuti di automassaggio o stretching consapevole — inizia a liberare ciò che l'elaborazione intellettuale non riesce a raggiungere."],
    he:["תנועה היא תרופה — אבל הסוג חשוב. הפרופיל שלך מרמז על מעורבות יתר בתפוקה בעצימות גבוהה ומעורבות חסרה בתנועה משחזרת. הוסף יוגה נידרה או יין יוגה 3 פעמים בשבוע. אלה לא פסיביים — הם כיול פעיל מחדש של מערכת העצבים עם גיבוי מחקרי חזק.",
        "גופך נשא יותר מתח ממה שהוא מעבד. הפשייה מאחסנת תוכן רגשי לא פתור כדפוסי אחיזה כרוניים. עבודת גוף יומית — אפילו 10 דקות של עיסוי עצמי או מתיחה מודעת — מתחילה לשחרר מה שעיבוד אינטלקטואלי לא יכול להגיע אליו."]

  karma:{
    en:["At the karmic level, you are completing a cycle that began several years ago. What feels like struggle is not punishment — it is the final contraction before expansion. The soul curriculum for this phase is trust: not naive trust, but earned trust in your own resilience and capacity to navigate what arises.",
        "Karma is not fate — it is pattern. And patterns can be interrupted. The recurring dynamic you're experiencing is asking to be consciously completed rather than unconsciously repeated. Bring full awareness to the moment of choice within the pattern. The instant you see it clearly, you are no longer entirely run by it."],
    ru:["На кармическом уровне вы завершаете цикл, начавшийся несколько лет назад. То, что ощущается как борьба — не наказание, это финальное сжатие перед расширением. Программа души для этой фазы — доверие: не наивное, а заработанное.",
        "Карма — не судьба, это паттерн. И паттерны можно прервать. Повторяющаяся динамика, которую вы переживаете, просит быть сознательно завершённой. Принесите полное осознание к моменту выбора внутри паттерна."],
    es:["A nivel kármico, estás completando un ciclo que comenzó hace varios años. Lo que se siente como lucha no es un castigo — es la contracción final antes de la expansión. El currículo del alma para esta fase es la confianza: no la confianza ingenua, sino la confianza ganada en tu propia resiliencia y capacidad para navegar lo que surge.",
        "El karma no es destino — es patrón. Y los patrones pueden interrumpirse. La dinámica recurrente que estás experimentando pide ser completada conscientemente en lugar de repetida inconscientemente. Lleva plena conciencia al momento de elección dentro del patrón."],
    it:["A livello karmico, stai completando un ciclo iniziato diversi anni fa. Ciò che sembra lotta non è punizione — è la contrazione finale prima dell'espansione. Il curriculum dell'anima per questa fase è la fiducia: non la fiducia ingenua, ma la fiducia guadagnata nella propria resilienza.",
        "Il karma non è destino — è schema. E gli schemi possono essere interrotti. La dinamica ricorrente che stai vivendo chiede di essere completata consciamente piuttosto che ripetuta inconsciamente. Porta piena consapevolezza al momento della scelta all'interno dello schema."],
    he:["ברמה הקרמית, אתה משלים מחזור שהתחיל לפני מספר שנים. מה שמרגיש כמאבק הוא לא עונש — זו ההתכווצות הסופית לפני ההתרחבות. תכנית הלימודים של הנשמה לשלב זה היא אמון: לא אמון נאיבי, אלא אמון שהושג ביכולת ובחוסן שלך.",
        "קרמה היא לא גורל — זה דפוס. ודפוסים יכולים להיקטע. הדינמיקה החוזרת שאתה חווה מבקשת להיות מושלמת בצורה מודעת ולא לחזור על עצמה ללא מודעות. הבא מודעות מלאה לרגע הבחירה בתוך הדפוס."]

function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}

/* markdown: **bold** → <strong>; plain strings get stripped */
function renderMD(text){
  if(!text)return null;
  return text.split(/\*\*([^*]+)\*\*/g).map((p,i)=>
    i%2===1?<strong key={i} style={{fontWeight:600,color:'var(--text-1)'}}>{p}</strong>:p
  );
}
function stripMD(text){return text?text.replace(/\*\*([^*]+)\*\*/g,'$1'):''}function generateSvarga(input,lang){
  const dims=['nutrition','breathing','energy','mental','body','karma'];
  return dims.map(d=>({dim:d,text:pick(SVARGA_POOL[d][lang]||SVARGA_POOL[d].en)}));
}
function coachReply(id,lang,idx){
  const c=COACHES.find(x=>x.id===id);
  if(!c)return'...';
  const r=c.responses[lang in c.responses?lang:'en'];
  return r[idx%r.length];
}

  solar:{

    es:["Tu carta de Revolución Solar para este año revela un Sol ubicado en la Casa 10 de los logros públicos y la vocación — una señal poderosa de que este año está destinado a mayor visibilidad y reconocimiento en tu campo elegido. La Luna de la Revolución Solar en Piscis añade una capa de profundidad espiritual a lo que podría ser un año puramente de logros externos: el cosmos te pide que tengas éxito *y* que lo hagas de una manera que nutra tu vida interior. Lo que crees este año será recordado.",

    it:["La tua carta del Ritorno Solare per quest'anno rivela un Sole posizionato nella Casa 10 dei successi pubblici e della vocazione — un segnale potente che quest'anno è destinato a maggiore visibilità e riconoscimento nel tuo campo scelto. La Luna del Ritorno Solare in Pesci aggiunge uno strato di profondità spirituale. La caratteristica più sorprendente: Venere congiunta al Medio Cielo del Ritorno Solare. Ciò che crei quest'anno sarà ricordato.",

  destiny:{
    en:["The destiny axis in your chart points toward a life purpose connected to illuminating what others cannot yet see. The North Node's placement, combined with the prominent outer planetary contacts, describes a soul that has come to bridge worlds — the intuitive and the rational, the personal and the collective, the known and the emerging. Your karmic South Node indicates a history of working in service to others' visions. This life is asking for something different: for you to originate rather than support. The transition from background to foreground will feel uncomfortable at first. Do it anyway.",
        "Your chart carries the signature of what astrologers call a 'generational bridge' — your personal planets form a bridge between the slow-moving outer planets that define your generation and the personal lived experience of daily life. This is an unusual and demanding configuration. It means you will often feel caught between what is and what could be. It also means you carry the rare capacity to translate collective evolution into personal transformation — first in yourself, then in the people around you."],

function getAstroReading(mode,lang){
  const pool=ASTRO_POOL[mode]||ASTRO_POOL.natal;
  return pick(pool[lang]||pool.en);
}

/* ═══════════════ VALIDATION UTILITIES ═══════════════════════════════════ */
function validateDOB(v){
  if(!v||!v.trim())return{ok:false,err:'Required'};
  const m=v.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
  if(!m)return{ok:false,err:'Format: DD.MM.YYYY'};
  const d=+m[1],mo=+m[2],y=+m[3];
  if(y<1900||y>2025)return{ok:false,err:'Year must be 1900–2025'};
  if(mo<1||mo>12)return{ok:false,err:'Invalid month (01–12)'};
  const maxD=[31,y%4===0&&(y%100!==0||y%400===0)?29:28,31,30,31,30,31,31,30,31,30,31][mo-1];
  if(d<1||d>maxD)return{ok:false,err:`Day must be 01–${maxD} for this month`};
  return{ok:true,err:''};
}
function validateTime(v){
  if(!v||!v.trim())return{ok:true,err:''};
  if(!/^\d{1,2}:\d{2}$/.test(v.trim()))return{ok:false,err:'Format: HH:MM (e.g. 14:30)'};
  const[h,m]=v.split(':').map(Number);
  if(h>23)return{ok:false,err:'Hour must be 00–23'};
  if(m>59)return{ok:false,err:'Minute must be 00–59'};
  return{ok:true,err:''};
}

  }else if(mode==='transit'){
    const d=new Date();

function StarRating({rating}){
  const stars=[];
  for(let i=1;i<=5;i++){
    const fill=Math.min(1,Math.max(0,rating-i+1));
    stars.push(
      <span key={i} style={{position:'relative',display:'inline-block',color:'var(--border-md)',fontSize:'1rem',lineHeight:1}}>
        ★
        <span style={{position:'absolute',left:0,top:0,overflow:'hidden',
          width:`${fill*100}%`,color:'var(--gold)',whiteSpace:'nowrap'}}>★</span>
      </span>
    );
  }
  return <span style={{display:'inline-flex',gap:1}}>{stars}</span>;
}

/* ═══════════════ SEGMENTED DATE INPUT ══════════════════════════════════ */
function DateInput({value,onChange,lang}){
  const r0=useRef(null),r1=useRef(null),r2=useRef(null);
  const refs=[r0,r1,r2];
  const L={en:['DD','MM','YYYY'],ru:['ДД','ММ','ГГГГ'],es:['DD','MM','AAAA'],it:['GG','MM','AAAA'],he:['DD','MM','YYYY']}[lang]||['DD','MM','YYYY'];
  const parse=v=>{
    if(v&&/^\d{2}\.\d{2}\.\d{4}$/.test(v)){const[a,b,c]=v.split('.');return[a,b,c];}
    return['','',''];
  };
  const [pts,setPts]=useState(()=>parse(value));
  const [foc,setFoc]=useState([false,false,false]);
  useEffect(()=>{setPts(parse(value));},[value]);
  function emit(p){
    if(p[0].length===2&&p[1].length===2&&p[2].length===4)onChange(p[0]+'.'+p[1]+'.'+p[2]);
    else onChange('');
  }
  function handleChange(i,maxLen,e){
    const v=e.target.value.replace(/\D/g,'').slice(0,maxLen);
    const next=[...pts];next[i]=v;setPts(next);emit(next);
    if(v.length===maxLen&&refs[i+1]?.current)refs[i+1].current.focus();
  }
  function handleKey(i,e){
    if(e.key==='Backspace'&&pts[i]===''&&i>0)refs[i-1].current?.focus();
    if(e.key==='ArrowRight'&&i<2)refs[i+1].current?.focus();
    if(e.key==='ArrowLeft'&&i>0)refs[i-1].current?.focus();
  }
  function handlePaste(e){
    const t=e.clipboardData.getData('text');
    const m=t.match(/(\d{1,2})[.\-\/](\d{1,2})[.\-\/](\d{2,4})/);
    if(m){e.preventDefault();const d=m[1].padStart(2,'0'),mo=m[2].padStart(2,'0'),y=m[3].length===2?'20'+m[3]:m[3];const p=[d,mo,y];setPts(p);onChange(d+'.'+mo+'.'+y);refs[2].current?.focus();}
  }
  const seg=(i)=>({flex:i===2?2:1,minWidth:0});
  const inp=(active)=>({width:'100%',padding:'11px 6px',background:'var(--surface-2)',
    border:`1px solid ${active?'var(--gold)':'var(--border-md)'}`,borderRadius:8,
    color:'var(--text-1)',fontSize:16,outline:'none',textAlign:'center',fontFamily:'var(--font-b)',

/* ═══════════════ SEGMENTED TIME INPUT ══════════════════════════════════ */
function TimeInput({value,onChange,lang}){
  const r0=useRef(null),r1=useRef(null);
  const refs=[r0,r1];
  const PH={en:['HH','MM'],ru:['ЧЧ','ММ'],es:['HH','MM'],it:['OO','MM'],he:['שש','דד']}[lang]||['HH','MM'];
  const parse=v=>{
    if(v&&/^\d{2}:\d{2}$/.test(v)){const[h,m]=v.split(':');return[h,m];}
    return['',''];
  };
  const [pts,setPts]=useState(()=>parse(value));
  const [foc,setFoc]=useState([false,false]);
  useEffect(()=>{setPts(parse(value));},[value]);
  function emit(p){if(p[0].length===2&&p[1].length===2)onChange(p[0]+':'+p[1]);else onChange('');}
  function handleChange(i,e){
    const v=e.target.value.replace(/\D/g,'').slice(0,2);
    const next=[...pts];next[i]=v;setPts(next);emit(next);
    if(v.length===2&&i===0)refs[1].current?.focus();
  }
  function handleKey(i,e){
    if(e.key==='Backspace'&&pts[i]===''&&i>0)refs[0].current?.focus();
    if(e.key==='ArrowRight'&&i===0)refs[1].current?.focus();
    if(e.key==='ArrowLeft'&&i===1)refs[0].current?.focus();
  }
  const inp=(active)=>({width:'100%',padding:'11px 6px',background:'var(--surface-2)',
    border:`1px solid ${active?'var(--gold)':'var(--border-md)'}`,borderRadius:8,
    color:'var(--text-1)',fontSize:16,outline:'none',textAlign:'center',fontFamily:'var(--font-b)',
    caretColor:'var(--gold)',transition:'border-color .2s,box-shadow .2s',
    boxShadow:active?'0 0 0 3px rgba(212,178,122,.12)':'none'});
  const sep={color:'var(--text-3)',fontSize:'1.2rem',padding:'0 4px',lineHeight:'44px',flexShrink:0,fontWeight:500,userSelect:'none'};
  return(
    <div style={{display:'flex',gap:0,alignItems:'center'}}>
      {[0,1].map(i=>(
        <React.Fragment key={i}>
          {i>0&&<span style={sep}>:</span>}
          <div style={{flex:1}}>
            <input ref={refs[i]} value={pts[i]}
              onChange={e=>handleChange(i,e)}
              onKeyDown={e=>handleKey(i,e)}
              onFocus={e=>{setFoc(f=>{const n=[...f];n[i]=true;return n;});e.target.select();}}
              onBlur={()=>setFoc(f=>{const n=[...f];n[i]=false;return n;})}
              inputMode="numeric" maxLength={2}
              placeholder={PH[i]} style={inp(foc[i])}/>
          </div>
        </React.Fragment>
      ))}
    </div>
  );
}

/* ═══════════════ LABELED DATE / TIME FIELDS ════════════════════════════ */
function DateField({label,value,onChange,lang,errFn,required}){
  const [touched,setTouched]=useState(false);
  const err=errFn?errFn(value):(!required||value?'':'Required');
  const invalid=touched&&!!err;
  return(
    <div className="form-field" onBlur={()=>setTouched(true)}>
      <label className="form-label">{label}{required&&<span style={{color:'#C85050',marginLeft:3}}>*</span>}</label>
      <DateInput value={value} onChange={v=>{onChange(v);}} lang={lang}/>
      {invalid&&<p style={{fontSize:'.68rem',color:'#C85050',marginTop:4}}>{err}</p>}
    </div>
  );
}
function TimeField({label,value,onChange,lang}){
  return(
    <div className="form-field">
      <label className="form-label">{label}</label>
      <TimeInput value={value} onChange={onChange} lang={lang}/>
    </div>
  );
}

function Field({label,value,onChange,placeholder,errFn,required,type='text',inputMode}){
  const [touched,setTouched]=useState(false);
  const err=errFn?errFn(value):(!required||value.trim()?'':'Required');
  const invalid=touched&&!!err;
  const isNumeric=placeholder&&(placeholder.includes('DD')||placeholder.includes('ДД')||placeholder.includes('GG')||placeholder.includes('HH'));
  return(
    <div className="form-field">
      <label className="form-label">{label}{required&&<span style={{color:'#C85050',marginLeft:3}}>*</span>}</label>
      <input
        type={type}
        inputMode={inputMode||(isNumeric?'numeric':undefined)}
        value={value}
        onChange={e=>onChange(e.target.value)}
        onBlur={()=>setTouched(true)}
        placeholder={placeholder||'—'}
        style={{width:'100%',padding:'11px 14px',background:'var(--surface-2)',
          border:`1px solid ${invalid?'#C85050':'var(--border-md)'}`,borderRadius:10,
          color:'var(--text-1)',fontSize:'.88rem',outline:'none',fontFamily:'var(--font-b)',
          boxShadow:invalid?'0 0 0 3px rgba(200,80,80,.1)':'none',transition:'border-color .2s,box-shadow .2s'}}/>
      {invalid&&<p style={{fontSize:'.68rem',color:'#C85050',marginTop:4}}>{err}</p>}
    </div>
  );
}

function ArchetypeTool({lang}){
  const t=T[lang];

    {q:t.arch_q1, opts:t.arch_a1},
    {q:t.arch_q2, opts:t.arch_a2},
    {q:t.arch_q3, opts:t.arch_a3},
  ];
  const [answers,setAnswers]=useState([]);

}

function SvargaLayer({lang}){
  const t=T[lang];
  const dims=t.svarga_dims||[];
  const dimIcons=['🌿','🌬','⚡','🧠','🏃','✨'];

  const [results,setResults]=useState(null);
  function analyze(){
    if(!input.trim())return;
    setLoading(true);
    setTimeout(()=>{
      setResults(generateSvarga(input,lang));
      setLoading(false);
    },1800+Math.random()*600);
  }
  function reset(){setResults(null);setInput('');}
  return(
    <div className="sp2">
      <div className="mw">

          <div className="svarga-input-wrap rv">

                  background:'var(--surface-2)',border:'1px solid var(--border-md)',
                  borderRadius:10,color:'var(--text-1)',width:'100%',padding:'12px 16px',
                  fontFamily:'var(--font-b)',fontSize:'.9rem',outline:'none',resize:'vertical'}}/>
              <button className="cta-btn" style={{justifyContent:'center',background:'linear-gradient(135deg,var(--purple),#7E8EC8)',width:'100%'}}
                onClick={analyze} disabled={!input.trim()}>

          </div>
        )}
        {results&&(
          <div>
            <div className="svarga-result">
              {results.map((block,i)=>(
                <div key={i} className="svarga-block glass">
                  <div className="svarga-block-head">
                    <div className="svarga-block-icon">{dimIcons[i]||'✦'}</div>
                    <div>
                      <div className="svarga-block-title">{dims[i]||block.dim}</div>
                    </div>
                  </div>
                  <div className="svarga-block-body">{renderMD(block.text)}</div>
                </div>
              ))}
            </div>
            <div style={{textAlign:'center',marginTop:28}}>
              <button className="btn-g" onClick={reset}>↺ {t.svarga_new}</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════ SCROLL TO TOP ══════════════════════════════════════════ */
function ScrollTop(){
  const [vis,setVis]=useState(false);
  useEffect(()=>{
    const h=()=>setVis(window.scrollY>320);
    window.addEventListener('scroll',h,{passive:true});
    return()=>window.removeEventListener('scroll',h);
  },[]);
  if(!vis)return null;
  return(
    <button onClick={()=>window.scrollTo({top:0,behavior:'smooth'})}
      aria-label="Scroll to top"
      style={{position:'fixed',bottom:28,right:28,zIndex:90,width:44,height:44,
        borderRadius:'50%',background:'var(--gold)',color:'#0A0907',border:'none',
        cursor:'pointer',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center',
        boxShadow:'0 4px 20px rgba(212,178,122,.4)',transition:'all .25s',fontWeight:700}}
      onMouseEnter={e=>e.currentTarget.style.transform='translateY(-3px)'}
      onMouseLeave={e=>e.currentTarget.style.transform='none'}>↑</button>
  );
}

      he:`LifeForge AI מחויבת להגן על פרטיותך. מדיניות פרטיות זו מסבירה כיצד אנו אוספים, משתמשים ומגנים על המידע האישי שלך.\n\n**מידע שאנו אוספים**\nאנו עשויים לאסוף מידע שאתה מספק ישירות, כגון שמך, תאריך לידה ופרטים אחרים שהוזנו בכלים האנליטיים שלנו.\n\n**זכויות תחת GDPR (משתמשי האיחוד האירופי)**\nאם אתה נמצא באיחוד האירופי, יש לך זכות לגשת, לתקן, למחוק ולהעביר את הנתונים האישיים שלך.\n\nעדכון אחרון: מאי 2025`
    }
