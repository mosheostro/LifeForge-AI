  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0D0B08;
      --bg-alt:    #141108;
      --surface:   #1B1710;
      --surface-2: #232018;
      --text-1:    #EDE9E2;
      --text-2:    #A8A49C;
      --text-3:    #6B6762;
      --border:    rgba(237,233,226,.09);
      --border-md: rgba(237,233,226,.17);
      --gold:      #C8A86E;
      --gold-h:    #DDBB7E;
      --gold-dim:  #9A7E4A;
      --gold-f:    rgba(200,168,110,.10);
      --sage:      #6EA080;
      --shadow:    rgba(0,0,0,.65);
      --nav-bg:    rgba(13,11,8,.94);
      --font-d: 'Cormorant Garamond', Georgia, serif;
      --font-b: 'DM Sans', system-ui, sans-serif;
      --r: 4px;
    }
    [data-theme="light"] {
      --bg:        #FAF7F0;
      --bg-alt:    #F2EFE7;
      --surface:   #FFFFFF;
      --surface-2: #EDE9E0;
      --text-1:    #1C1810;
      --text-2:    #5A5650;
      --text-3:    #9A9590;
      --border:    rgba(28,24,16,.09);
      --border-md: rgba(28,24,16,.18);
      --gold:      #8B6520;
      --gold-h:    #724F12;
      --gold-dim:  #B08030;
      --gold-f:    rgba(139,101,32,.09);
      --sage:      #3A7556;
      --shadow:    rgba(0,0,0,.10);
      --nav-bg:    rgba(250,247,240,.96);
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-b);
      background: var(--bg);
      color: var(--text-1);
      line-height: 1.65;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      transition: background .3s, color .3s;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }
    ::selection { background: rgba(200,168,110,.22); }
    img { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }
    button { font-family: var(--font-b); }

    .sp  { padding: clamp(72px,10vw,130px) clamp(24px,7vw,100px); }
    .sp2 { padding: clamp(48px,7vw,96px) clamp(24px,7vw,100px); }
    .mw  { max-width: 1280px; margin: 0 auto; }

    .rv  { opacity:0; transform:translateY(20px); transition:opacity .8s cubic-bezier(.2,0,.2,1),transform .8s cubic-bezier(.2,0,.2,1); }
    .rvl { opacity:0; transform:translateX(-20px);transition:opacity .8s cubic-bezier(.2,0,.2,1),transform .8s cubic-bezier(.2,0,.2,1); }
    .rvr { opacity:0; transform:translateX(20px); transition:opacity .8s cubic-bezier(.2,0,.2,1),transform .8s cubic-bezier(.2,0,.2,1); }
    .rv.in,.rvl.in,.rvr.in { opacity:1; transform:none; }
    .d1{transition-delay:.10s}.d2{transition-delay:.22s}.d3{transition-delay:.34s}
    .d4{transition-delay:.46s}.d5{transition-delay:.58s}.d6{transition-delay:.70s}

    .eyebrow {
      font-family:var(--font-b); font-size:.64rem; font-weight:500;
      letter-spacing:.22em; text-transform:uppercase; color:var(--gold);
    }

    .btn-p {
      display:inline-flex; align-items:center; gap:8px;
      padding:13px 34px; background:var(--gold); color:#0D0B08;
      font-size:.76rem; font-weight:500; letter-spacing:.13em; text-transform:uppercase;
      border:none; border-radius:var(--r); cursor:pointer;
      transition:background .3s,transform .25s,box-shadow .3s;
    }
    .btn-p:hover { background:var(--gold-h); transform:translateY(-2px); box-shadow:0 14px 40px rgba(200,168,110,.28); }
    .btn-g {
      display:inline-flex; align-items:center; gap:8px;
      padding:12px 32px; background:transparent; color:var(--text-2);
      font-size:.76rem; font-weight:400; letter-spacing:.09em; text-transform:uppercase;
      border:1px solid var(--border-md); border-radius:var(--r); cursor:pointer;
      transition:border-color .3s,color .3s;
    }
    .btn-g:hover { border-color:var(--gold); color:var(--gold); }

    /* NAV */
    .nav-wrap {
      position:fixed; top:0; left:0; right:0; z-index:100;
      display:flex; align-items:center; justify-content:space-between;
      padding:0 clamp(20px,5.5vw,72px); height:68px;
      background:transparent;
      transition:background .4s,border-color .4s,backdrop-filter .4s;
    }
    .nav-wrap.scrolled {
      background:var(--nav-bg);
      backdrop-filter:blur(22px); -webkit-backdrop-filter:blur(22px);
      border-bottom:1px solid var(--border);
    }
    .nav-logo { display:flex; align-items:center; gap:10px; cursor:pointer; background:none; border:none; }
    .nav-logo img { width:34px; height:34px; border-radius:50%; object-fit:cover; border:1px solid rgba(200,168,110,.30); }
    .nav-logo-name { font-family:var(--font-d); font-size:1rem; font-weight:400; color:var(--text-1); letter-spacing:.03em; display:block; }
    .nav-logo-sub  { font-size:.56rem; color:var(--gold); letter-spacing:.20em; text-transform:uppercase; display:block; }
    .nav-right { display:flex; align-items:center; gap:10px; }

    .ctrl-btn {
      background:none; border:1px solid var(--border-md); border-radius:var(--r);
      padding:6px 12px; cursor:pointer;
      font-size:.66rem; font-weight:500; letter-spacing:.10em; color:var(--text-3);
      transition:border-color .2s,color .2s; white-space:nowrap;
      display:flex; align-items:center; gap:5px;
    }
    .ctrl-btn:hover { border-color:var(--gold); color:var(--gold); }

    .lang-wrap { position:relative; }
    .lang-drop {
      position:absolute; top:calc(100% + 7px); right:0;
      background:var(--surface); border:1px solid var(--border-md);
      border-radius:var(--r); min-width:110px; overflow:hidden;
      box-shadow:0 14px 40px var(--shadow);
      opacity:0; pointer-events:none; transform:translateY(-4px);
      transition:opacity .2s,transform .2s;
    }
    .lang-drop.open { opacity:1; pointer-events:all; transform:none; }
    .lang-opt {
      display:block; width:100%; padding:9px 14px; background:none; border:none;
      text-align:left; cursor:pointer; font-size:.73rem; color:var(--text-2);
      transition:background .15s,color .15s;
    }
    .lang-opt:hover { background:var(--gold-f); color:var(--gold); }
    .lang-opt.active { color:var(--gold); font-weight:500; }

    .mob-drawer {
      position:fixed; inset:0; z-index:200;
      background:rgba(13,11,8,.97); backdrop-filter:blur(20px);
      display:flex; flex-direction:column; padding:80px 36px 48px;
      opacity:0; pointer-events:none; transition:opacity .3s;
    }
    [data-theme="light"] .mob-drawer { background:rgba(250,247,240,.97); }
    .mob-drawer.open { opacity:1; pointer-events:all; }

    /* PORTAL HERO */
    @keyframes hfade { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }
    .hl1{animation:hfade 1s cubic-bezier(.2,0,.2,1) .25s both}
    .hl2{animation:hfade 1s cubic-bezier(.2,0,.2,1) .45s both}
    .hl3{animation:hfade 1s cubic-bezier(.2,0,.2,1) .65s both}
    .hl4{animation:hfade 1s cubic-bezier(.2,0,.2,1) .85s both}

    .portal-hero {
      min-height:62vh; display:flex; align-items:center; justify-content:center;
      text-align:center; position:relative; overflow:hidden;
      padding:clamp(110px,15vw,170px) clamp(24px,6vw,80px) clamp(56px,8vw,100px);
    }
    .portal-hero::before {
      content:''; position:absolute; inset:0; z-index:0;
      background:radial-gradient(ellipse 80% 60% at 50% 40%, rgba(200,168,110,.10) 0%, transparent 70%);
    }
    .portal-hero-content { position:relative; z-index:1; max-width:780px; }

    /* CARDS GRID */
    .cards-section { padding:0 clamp(24px,7vw,100px) clamp(80px,10vw,130px); }
    .cards-grid {
      max-width:1280px; margin:0 auto;
      display:grid; grid-template-columns:repeat(2,1fr); gap:20px;
    }
    @media(max-width:840px){ .cards-grid { grid-template-columns:1fr; } }

    .s-card {
      position:relative; overflow:hidden;
      background:var(--surface); border:1px solid var(--border);
      border-radius:8px; padding:38px 32px 32px;
      cursor:pointer; transition:transform .35s,border-color .35s,box-shadow .35s;
      display:flex; flex-direction:column;
    }
    .s-card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:3px;
      background:var(--card-accent, var(--gold)); opacity:.75; transition:opacity .35s;
    }
    .s-card:hover { transform:translateY(-7px); border-color:var(--border-md); box-shadow:0 24px 64px var(--shadow); }
    .s-card:hover::before { opacity:1; }

    .s-card-num {
      position:absolute; top:24px; right:26px;
      font-family:var(--font-d); font-size:2.8rem; font-weight:300;
      color:var(--border-md); line-height:1; user-select:none;
    }
    .s-card-tag  { font-size:.60rem; font-weight:500; letter-spacing:.18em; text-transform:uppercase; color:var(--card-accent,var(--gold)); margin-bottom:16px; }
    .s-card-name { font-family:var(--font-d); font-size:clamp(26px,3.2vw,34px); font-weight:400; color:var(--text-1); line-height:1.1; margin-bottom:5px; }
    .s-card-ttl  { font-size:.79rem; color:var(--text-2); font-weight:400; letter-spacing:.03em; margin-bottom:20px; }
    .s-card-tl   { font-family:var(--font-d); font-size:1.05rem; font-style:italic; color:var(--text-2); line-height:1.6; margin-bottom:22px; flex:1; }
    .s-card-pills{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:26px; }
    .s-card-pill { font-size:.59rem; letter-spacing:.10em; text-transform:uppercase; padding:5px 11px; background:var(--gold-f); color:var(--text-2); border-radius:20px; border:1px solid var(--border); }
    .s-card-cta  {
      display:inline-flex; align-items:center; gap:8px;
      font-size:.72rem; font-weight:500; letter-spacing:.12em; text-transform:uppercase;
      color:var(--card-accent,var(--gold)); background:none; border:none; cursor:pointer; padding:0;
      transition:gap .2s;
    }
    .s-card-cta:hover { gap:13px; }

    /* SPECIALIST DETAIL */
    .sp-back {
      position:fixed; top:18px; left:clamp(18px,4vw,56px); z-index:400;
      display:flex; align-items:center; gap:7px;
      background:var(--surface); border:1px solid var(--border-md);
      border-radius:20px; padding:8px 16px; cursor:pointer;
      font-size:.70rem; font-weight:500; letter-spacing:.09em; text-transform:uppercase;
      color:var(--text-2); transition:border-color .2s,color .2s; white-space:nowrap;
    }
    .sp-back:hover { border-color:var(--gold); color:var(--gold); }

    .sp-hero {
      min-height:52vh; display:flex; align-items:flex-end;
      padding:clamp(110px,14vw,170px) clamp(24px,7vw,100px) clamp(48px,6vw,80px);
      position:relative; overflow:hidden;
    }
    .sp-hero::before {
      content:''; position:absolute; inset:0;
      background:radial-gradient(ellipse 90% 70% at 15% 80%, var(--hero-glow,rgba(200,168,110,.13)) 0%, transparent 60%);

    .sp-hero-content { position:relative; z-index:1; max-width:820px; }

    .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:clamp(36px,5vw,80px); align-items:start; }
    @media(max-width:768px){ .detail-grid { grid-template-columns:1fr; } }

    .prog-card {
      padding:30px 26px; border-radius:8px; border:1px solid var(--border);
      background:var(--surface); transition:border-color .3s,transform .3s;
    }
    .prog-card:hover { border-color:var(--border-md); transform:translateY(-3px); }
    .prog-num { font-family:var(--font-d); font-size:2rem; font-weight:300; line-height:1; margin-bottom:14px; }

    .stat-row { display:flex; gap:clamp(22px,4vw,52px); flex-wrap:wrap; }
    .stat-num { font-family:var(--font-d); font-size:clamp(28px,3.5vw,38px); font-weight:400; line-height:1; display:block; }
    .stat-lbl { font-size:.66rem; color:var(--text-3); letter-spacing:.12em; text-transform:uppercase; display:block; margin-top:3px; }

    .tcard {
      padding:28px; border-radius:8px; border:1px solid var(--border);
      background:var(--gold-f); margin-bottom:16px;
    }
    .tcard:last-child { margin-bottom:0; }
    .tcard-name { font-size:.78rem; font-weight:500; color:var(--text-1); }
    .tcard-city { font-size:.65rem; color:var(--text-3); letter-spacing:.08em; }
    .tcard-text { font-family:var(--font-d); font-size:1.05rem; font-style:italic; color:var(--text-2); line-height:1.68; margin-top:14px; }

    .cta-strip {
      text-align:center; padding:clamp(72px,10vw,120px) clamp(24px,7vw,100px);
      background:var(--bg-alt); position:relative; overflow:hidden;
    }
    .cta-strip::before {
      content:''; position:absolute; inset:0;
      background:radial-gradient(ellipse 60% 80% at 50% 100%, rgba(200,168,110,.10),transparent);
    }

    .footer-bar {
      padding:clamp(36px,5vw,64px) clamp(24px,7vw,100px);
      border-top:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between; gap:20px; flex-wrap:wrap;
    }
    .f-links { display:flex; gap:22px; flex-wrap:wrap; }
    .f-link {
      background:none; border:none; cursor:pointer;
      font-size:.67rem; color:var(--text-3); letter-spacing:.07em;
      transition:color .2s;
    }
    .f-link:hover { color:var(--gold); }

    .wa-float {
      position:fixed; bottom:26px; right:26px; z-index:150;
      width:54px; height:54px; border-radius:50%;
      background:#25D366; border:none; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 8px 28px rgba(37,211,102,.35);
      transition:transform .25s,box-shadow .25s; text-decoration:none;
    }
    .wa-float:hover { transform:scale(1.08) translateY(-2px); }

    @media(max-width:768px){
      .dsk{ display:none!important; }
      .mob-center{ text-align:center!important; align-items:center!important; }
      .mob-col{ flex-direction:column!important; }
    }
    @media(min-width:769px){ .mob-only{ display:none!important; } }

    @keyframes glow-pulse {
      0%,100% { box-shadow:0 0 26px rgba(200,168,110,.15); }
      50%      { box-shadow:0 0 50px rgba(200,168,110,.36); }
    }
    .glow { animation:glow-pulse 3.2s ease-in-out infinite; }
  </style>
</head>

  /* ─── Scroll reveal hook ─── */
  function useReveal(dep) {
    React.useEffect(() => {
      const obs = new IntersectionObserver(
        es => es.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); }),
        { threshold: 0.07 }
      );
      const timer = setTimeout(() => {
        document.querySelectorAll('.rv,.rvl,.rvr').forEach(el => { el.classList.remove('in'); obs.observe(el); });
      }, 80);
      return () => { clearTimeout(timer); obs.disconnect(); };
    }, [dep]);
  }

    React.useEffect(() => {
      const fn = () => setScrolled(window.scrollY > 50);
      window.addEventListener('scroll', fn, { passive:true });
      return () => window.removeEventListener('scroll', fn);
    }, []);

    React.useEffect(() => {
      if (!langOpen) return;
      const close = () => setLangOpen(false);
      setTimeout(() => document.addEventListener('click', close), 0);
      return () => document.removeEventListener('click', close);

    const LANGS = [{c:'en',l:'English'},{c:'ru',l:'Русский'},{c:'de',l:'Deutsch'}];

    return (

                <h2 className="rv d1" style={{fontFamily:'var(--font-d)',fontWeight:400,fontSize:'clamp(26px,3.5vw,42px)',color:'var(--text-1)',letterSpacing:'-.01em'}}>{s.framework.h2}</h2>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(220px,1fr))',gap:18}}>
                {s.framework.pillars.map((p,i)=>(
                  <div key={p.n} className={`prog-card rv d${i+1}`}>
                    <div style={{fontSize:'.58rem',letterSpacing:'.16em',textTransform:'uppercase',color:s.accent,marginBottom:12}}>{p.n}</div>
                    <div style={{fontFamily:'var(--font-d)',fontSize:'1.2rem',fontWeight:400,color:'var(--text-1)',marginBottom:12}}>{p.title}</div>
                    <div style={{fontSize:'.83rem',color:'var(--text-2)',lineHeight:1.78,fontWeight:300}}>{p.desc}</div>
                  </div>
                ))}
              </div>
            </div>
          </section>
        )}

        {/* Programs */}
        <section className="sp2" style={{background:s.framework?'var(--bg-alt)':'var(--bg)'}}>
          <div className="mw">
            <div className="eyebrow rv" style={{color:s.accent,marginBottom:36}}>{ui.programs}</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))',gap:18}}>
              {s.programs.map((p,i)=>(
                <div key={p.num} className={`prog-card rv d${i+1}`}>
                  <div className="prog-num" style={{color:s.accent}}>{p.num}</div>
                  <div style={{fontFamily:'var(--font-d)',fontSize:'1.2rem',fontWeight:400,color:'var(--text-1)',marginBottom:10,lineHeight:1.3}}>{p.title}</div>
                  <div style={{fontSize:'.84rem',color:'var(--text-2)',lineHeight:1.78,fontWeight:300,marginBottom:16}}>{p.desc}</div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                    {p.tags.map(t=>(
                      <span key={t} style={{fontSize:'.58rem',letterSpacing:'.09em',textTransform:'uppercase',padding:'4px 10px',background:'var(--gold-f)',border:'1px solid var(--border)',borderRadius:20,color:'var(--text-3)'}}>{t}</span>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>

        {/* Testimonials */}
        <section className="sp2" style={{background:s.framework?'var(--bg)':'var(--bg-alt)'}}>
          <div className="mw">
            <div className="eyebrow rv" style={{color:s.accent,marginBottom:36}}>{ui.testimonials}</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))',gap:16}}>
              {s.testimonials.map((tm,i)=>(
                <div key={tm.name} className={`tcard rv d${i+1}`}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                    <div><div className="tcard-name">{tm.name}</div><div className="tcard-city">{tm.city}</div></div>
                    <div style={{fontFamily:'var(--font-d)',fontSize:'2.2rem',color:s.accent,lineHeight:1,opacity:.35}}>"</div>
                  </div>
                  <div className="tcard-text">{tm.text}</div>
                </div>
              ))}
            </div>
          </div>
        </section>

        {/* CTA */}
        <section className="cta-strip">
          <div style={{position:'relative',zIndex:1}}>
            <h2 className="rv" style={{fontFamily:'var(--font-d)',fontWeight:400,fontSize:'clamp(28px,5vw,54px)',color:'var(--text-1)',lineHeight:1.1,marginBottom:14,letterSpacing:'-.01em'}}>
              {ui.cta.title}
            </h2>
            <p className="rv d1" style={{fontSize:'.89rem',color:'var(--text-2)',marginBottom:34,lineHeight:1.7,maxWidth:440,margin:'0 auto 34px'}}>
              {ui.cta.sub}
            </p>
            <div className="rv d2" style={{display:'flex',gap:14,justifyContent:'center',flexWrap:'wrap'}}>
              <a href={WHATSAPP} target="_blank" rel="noopener" className="btn-p">{ui.cta.wa}</a>
              <a href={TELEGRAM} target="_blank" rel="noopener" className="btn-g"><IcoTG s={16}/> {ui.cta.tg}</a>
            </div>
          </div>
        </section>
      </div>
    );
  }

  /* ─── Footer ─── */
  function Footer({ lang }) {
    const t = UI[lang].footer;
    return (
      <footer className="footer-bar">
        <span style={{fontSize:'.67rem',color:'var(--text-3)',letterSpacing:'.04em'}}>{t.copy}</span>
        <div className="f-links">{t.links.map(l=><button key={l} className="f-link">{l}</button>)}</div>
      </footer>
    );
  }

  /* ─── App ─── */
  function App() {
    const [lang,  setLang]  = React.useState('en');
    const [theme, setTheme] = React.useState('dark');
    const [view,  setView]  = React.useState('portal');

    React.useEffect(() => { document.documentElement.setAttribute('data-theme', theme); }, [theme]);
    const toggleTheme = () => setTheme(t => t==='dark'?'light':'dark');

    const handleLang = (l) => { setLang(l); document.documentElement.lang = l; };

    const openSpec = (id) => { setView(id); window.scrollTo({top:0,behavior:'instant'}); };
    const goPortal = ()   => { setView('portal'); window.scrollTo({top:0,behavior:'instant'}); };

    const isPortal = view === 'portal';

    return (
      <>
        <Nav lang={lang} setLang={handleLang} theme={theme} toggleTheme={toggleTheme} isPortal={isPortal} onBack={goPortal}/>
        {isPortal
          ? <Portal lang={lang} onSelect={openSpec}/>
          : <SpecDetail lang={lang} specId={view} onBack={goPortal}/>
        }
        <Footer lang={lang}/>
        <a href={WHATSAPP} target="_blank" rel="noopener" className="wa-float" aria-label="WhatsApp"><IcoWA s={26}/></a>
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
